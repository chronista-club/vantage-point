# cargo-audit 設定
# 既知の脆弱性を許容リストに入れ、新規脆弱性のみ検出する
#
# macOS専用アプリのため、GTK3系（Linux GUI）は影響なし
# 定期的にレビューし、依存の更新で解消できるものは解消する

[advisories]
ignore = [
    # --- GTK3 bindings（メンテナンス終了） ---
    # tao（ウィンドウライブラリ）の推移的依存、macOSでは未使用
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    "RUSTSEC-2024-0429", # glib VariantStrIter unsoundness

    # --- メンテナンス終了クレート ---
    "RUSTSEC-2024-0370", # proc-macro-error（推移的依存）
    "RUSTSEC-2025-0057", # fxhash（推移的依存）
    "RUSTSEC-2025-0134", # rustls-pemfile（推移的依存）
    "RUSTSEC-2025-0141", # bincode（推移的依存）

    # --- 暗号系 ---
    "RUSTSEC-2023-0071", # rsa Marvin Attack（quinn/rustls経由、ローカル通信のみで影響軽微）
]
