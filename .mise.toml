# Vantage Point - mise Configuration
# https://mise.jdx.dev/

[tools]
rust = "1.94.0"
node = "22"
bun = "latest"

[env]
VANTAGE_ROOT = "{{config_root}}"
_.file = ".env"

[tasks.build]
description = "Build Rust crates"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.mac]
description = "Build & run macOS native app (VantagePoint.app) via xcodebuild"
run = """
set -euo pipefail
ROOT="$(pwd)"

echo "🔨 Building vp-bridge (staticlib)..."
cargo build --release -p vp-bridge

echo "🔧 Regenerating xcodeproj via xcodegen (project.yml → .xcodeproj)..."
(cd "$ROOT/apple/VantagePoint" && xcodegen generate --spec project.yml -q)

echo "🔨 Building VantagePoint (xcodebuild)..."
xcodebuild build \
  -project "$ROOT/apple/VantagePoint/VantagePoint.xcodeproj" \
  -scheme VantagePoint \
  -configuration Release \
  -derivedDataPath "$ROOT/.build/DerivedData" \
  ARCHS=arm64 \
  ONLY_ACTIVE_ARCH=YES \
  -quiet

echo "🔄 既存プロセスを停止..."
pkill -f 'VantagePoint$' 2>/dev/null && sleep 1 || true

BUILD_APP="$ROOT/.build/DerivedData/Build/Products/Release/VantagePoint.app"
INSTALL_APP="/Applications/VantagePoint.app"

echo "📦 /Applications に反映..."
# 古い /Applications バージョンを削除（ditto は上書きを完全サポートしないため）
rm -rf "$INSTALL_APP"
# ditto でメタデータ（codesign 含む）ごとコピー
ditto "$BUILD_APP" "$INSTALL_APP"

echo "🚀 Launching $INSTALL_APP ..."
exec open "$INSTALL_APP"
"""

[tasks."daemon:build"]
description = "Build daemon binary (vp-cli の vp) — vp-app の locate_vp_binary が target/release/vp を見れる構成"
run = """
set -euo pipefail
echo "🔨 Building vp-cli (daemon = vp world)..."
cargo build --release -p vp-cli
echo "✅ Built: $(pwd)/target/release/vp"
"""

[tasks.daemon]
description = "Run daemon (vp world) standalone in foreground — log は VP_DAEMON_LOG_FILE で file 直書き、stdout にも出る"
depends = ["daemon:build"]
run = """
set -euo pipefail
ROOT="$(pwd)"
LOG_DIR="${VP_LOG_DIR:-$HOME/Library/Logs/Vantage}"
mkdir -p "$LOG_DIR"
LOG_FILE="$LOG_DIR/vp-world.kdl.log"

# 既存 daemon を kill (新 binary 反映、ping は失敗するので app から auto-launch されないよう先に kill)
# pkill -f は cmdline 全体に regex match。実 cmdline は `/path/to/vp world ...` なので anchor は付けない。
# port-based kill も二段で (lsof で listen 占有 PID を取得 → SIGTERM)、pattern 漏れの保険。
echo "🔄 既存 daemon を停止..."
pkill -f 'vp world' 2>/dev/null || true
pkill -f 'vp daemon' 2>/dev/null || true
PIDS=$(lsof -ti:32000 -sTCP:LISTEN 2>/dev/null || true)
if [ -n "$PIDS" ]; then
  kill -TERM $PIDS 2>/dev/null || true
fi
sleep 2

# tracing-appender が log file 直書きできるよう環境変数を渡す
export VP_DAEMON_LOG_FILE="$LOG_FILE"

VP_BIN="$ROOT/target/release/vp"
if [ ! -x "$VP_BIN" ]; then
  echo "❌ daemon binary not found: $VP_BIN" >&2
  echo "   先に 'mise run daemon:build' を実行してください" >&2
  exit 1
fi

echo ""
echo "📝 daemon log: $LOG_FILE"
echo "🚀 Launching $VP_BIN world (foreground、Ctrl+C で停止)..."
echo "─────────────────────────────────────────────────"
# foreground で exec、Ctrl+C で daemon stop
exec "$VP_BIN" world
"""

[tasks.logs]
description = "Tail VP logs (daemon + vp-app + project) — terminal で常時 stream 表示"
run = """
set -euo pipefail
LOG_DIR="${VP_LOG_DIR:-$HOME/Library/Logs/Vantage}"
mkdir -p "$LOG_DIR"

# 必要な log file が無くてもエラーにならないように先に touch
# (新規 process が立ち上がる前に tail -F が file を見つけられるように)
touch "$LOG_DIR/vp-world.kdl.log" "$LOG_DIR/vp-app.kdl.log"

echo "📝 Tailing: $LOG_DIR/*.kdl.log"
echo "─────────────────────────────────────────────────"
exec tail -F "$LOG_DIR"/*.kdl.log
"""

[tasks.app]
description = "Build & run vp-app (Rust GUI: wry+tao+creo-ui) — Mac 主軸版、xcodebuild 不要"
run = """
set -euo pipefail
ROOT="$(pwd)"

# Mac 主軸切替 (2026-04-26 決定、mem_1CaSjEz55wBuy3JdU14LCS, Phase A 補強):
# Swift app (apple/VantagePoint) ではなく vp-app crate (Rust + wry + xterm.js + creo-ui)
# を起動する。xcodebuild / xcodegen / ditto / codesign 不要 → build がぐっと速い。
# log_dir は crates/vp-app/src/app.rs:961 で ~/Library/Logs/Vantage/ に既に統一済み。
LOG_DIR="${VP_LOG_DIR:-$HOME/Library/Logs/Vantage}"
mkdir -p "$LOG_DIR"
LOG_FILE="${VP_APP_LOG:-$LOG_DIR/vp-app.stdout.log}"

# 子プロセス (TheWorld daemon) に inherit させる
export VP_DAEMON_LOG_FILE="$LOG_DIR/vp-world.kdl.log"

echo "🔨 Building vp-app (Rust: wry+tao+creo-ui)..."
cargo build --release -p vp-app

VP_APP_BIN="$ROOT/target/release/vp-app"
if [ ! -x "$VP_APP_BIN" ]; then
  echo "❌ vp-app binary not found at $VP_APP_BIN" >&2
  exit 1
fi

# 既存プロセスを停止
# - vp-app は **必ず** kill (新 binary 反映 + 古い app から daemon spawn 防止)
# - TheWorld は **default では kill しない** (state を持つので毎回再起動すると Started がゼロに戻る)
#   VP_FORCE_RESTART_DAEMON=1 を渡したときだけ kill する
echo ""
echo "🔄 既存 vp-app を停止..."
pkill -f "${VP_APP_BIN}\\$" 2>/dev/null || true

if [ "${VP_FORCE_RESTART_DAEMON:-0}" = "1" ]; then
  echo "🔄 VP_FORCE_RESTART_DAEMON=1 → TheWorld も停止..."
  pkill -f 'vp world' 2>/dev/null || true
  pkill -f 'vp daemon' 2>/dev/null || true
  PIDS=$(lsof -ti:32000 -sTCP:LISTEN 2>/dev/null || true)
  if [ -n "$PIDS" ]; then
    kill -TERM $PIDS 2>/dev/null || true
  fi
else
  echo "ℹ️  TheWorld は kill せず既存を再利用 (state 永続化)。fresh start したい場合は VP_FORCE_RESTART_DAEMON=1 mise run app"
fi
sleep 1

# tail -F が file を見つけられるよう touch (空 file でも -F なら follow 開始)
touch "$LOG_DIR/vp-world.kdl.log" "$LOG_DIR/vp-app.kdl.log"

echo ""
echo "📝 ログ出力先:"
echo "   daemon (TheWorld): $VP_DAEMON_LOG_FILE"
echo "   vp-app (Rust):     $LOG_DIR/vp-app.kdl.log (tracing-appender 直書き)"
echo "   stdout/stderr:     $LOG_FILE"
echo ""
echo "🚀 Launching $VP_APP_BIN (background) ..."

# vp-app を background 起動、stdout/stderr は file に流す (tail で後追い)
"$VP_APP_BIN" > "$LOG_FILE" 2>&1 &
APP_PID=$!

# Ctrl+C で vp-app と tail を同時停止 (1 terminal 完結 UX)
trap 'echo ""; echo "📴 stopping vp-app (PID=$APP_PID) + tail..."; kill $APP_PID 2>/dev/null; exit 0' INT TERM

echo "✅ vp-app launched (PID=$APP_PID)"
echo "📝 Tailing all logs (Ctrl+C で全停止)..."
echo "─────────────────────────────────────────────────"

# build/起動 完了後、そのまま全 log multiplex tail (`mise run logs` 同等)
exec tail -F "$LOG_DIR/vp-world.kdl.log" "$LOG_DIR/vp-app.kdl.log" "$LOG_FILE"
"""

[tasks."app:swift"]
description = "[deprecated 2026-04-26] 旧 Swift VantagePoint.app — Mac 主軸は `mise run app` (Rust GUI) に移行"
run = """
set -euo pipefail
echo "⚠️  Swift app (apple/VantagePoint) は Mac 主軸から外れました。"
echo "    新主軸は vp-app crate (Rust + wry + xterm.js)。'mise run app' を使ってください。"
echo "    Swift 経路を使い続ける場合は 'mise run mac' を呼んでください。"
exit 1
"""

[tasks."mac:build"]
description = "Build macOS native app without launching"
run = """
cargo build --release -p vp-bridge
cd apple/VantagePoint && swift build -c release
echo "✅ Built: apple/VantagePoint/.build/release/VantagePoint"
"""

[tasks.win]
description = "Build & run vp-app + vp (standalone) on Windows host — WSL2 mingw cross-compile → Windows exec"
run = '''
set -euo pipefail
ROOT="$(pwd)"

# 前提チェック
if ! command -v x86_64-w64-mingw32-gcc >/dev/null 2>&1; then
  echo "❌ mingw-w64 が未インストール: brew install mingw-w64" >&2
  exit 1
fi
if ! command -v wslpath >/dev/null 2>&1; then
  echo "❌ WSL 環境でのみ実行可能 (wslpath が必要)" >&2
  exit 1
fi
if ! command -v nasm >/dev/null 2>&1; then
  echo "❌ nasm が未インストール (aws-lc-sys で必須): brew install nasm" >&2
  exit 1
fi
if ! rustup target list --installed 2>/dev/null | grep -q "x86_64-pc-windows-gnu"; then
  echo "📦 rustup target 追加: x86_64-pc-windows-gnu"
  rustup target add x86_64-pc-windows-gnu
fi

if [ "${VP_SKIP_DAEMON_BUILD:-}" = "1" ]; then
  echo "🔨 vp-app のみ Windows 向けクロスビルド (VP_SKIP_DAEMON_BUILD=1)..."
  CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
    cargo build --target x86_64-pc-windows-gnu -p vp-app
else
  echo "🔨 vp-app + vp (vp-cli) を Windows 向けにクロスビルド..."
  # vp-app: GUI app (tao + wry + WebView2)
  # vp (= vp-cli): TheWorld daemon 本体。Windows では GUI/MIDI feature を落とす
  #   (gui feature は macOS/Linux の tao/muda、midi は ALSA 依存で Windows 経路と相性悪い)
  CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
    cargo build --target x86_64-pc-windows-gnu -p vp-app -p vp-cli --no-default-features
fi

VP_APP_EXE="$ROOT/target/x86_64-pc-windows-gnu/debug/vp-app.exe"
VP_EXE="$ROOT/target/x86_64-pc-windows-gnu/debug/vp.exe"
WEBVIEW2_DLL=$(find "$ROOT/target/x86_64-pc-windows-gnu/debug/build" -path "*/webview2-com-sys-*/out/x64/WebView2Loader.dll" -print -quit)
if [ -z "$WEBVIEW2_DLL" ] || [ ! -f "$VP_APP_EXE" ]; then
  echo "❌ build 成果物が見つからない (vp-app.exe / WebView2Loader.dll)" >&2
  exit 1
fi

# Windows 側のインストール先 (user-scope、LOCALAPPDATA 配下)
WIN_LOCALAPPDATA=$(cmd.exe /c "echo %LOCALAPPDATA%" 2>/dev/null | tr -d '\r')
INSTALL_DIR=$(wslpath -u "$WIN_LOCALAPPDATA")/VantagePoint-dev

echo "🔄 既存プロセスを停止 (vp-app / vp の exe ロック解放)..."
powershell.exe -NoProfile -Command "Get-Process -Name vp-app,vp -ErrorAction SilentlyContinue | Stop-Process -Force" 2>/dev/null | tr -d '\r' || true
sleep 1

echo "📦 $INSTALL_DIR に vp-app.exe + WebView2Loader.dll$([ -f "$VP_EXE" ] && echo ' + vp.exe') を配置..."
mkdir -p "$INSTALL_DIR"
cp "$VP_APP_EXE" "$INSTALL_DIR/vp-app.exe"
cp "$WEBVIEW2_DLL" "$INSTALL_DIR/WebView2Loader.dll"
# vp.exe は VP_SKIP_DAEMON_BUILD=1 時にはビルドされていないので存在確認して copy
if [ -f "$VP_EXE" ]; then
  cp "$VP_EXE" "$INSTALL_DIR/vp.exe"
fi

INSTALL_DIR_WIN="$WIN_LOCALAPPDATA\\VantagePoint-dev"
INSTALL_EXE_WIN="$INSTALL_DIR_WIN\\vp-app.exe"

# 任意 override (VP_SHELL 系 / VP_TERMINAL_MODE=local への明示切替など)
VP_SHELL_VAL="${VP_SHELL:-}"
VP_SHELL_ARGS_VAL="${VP_SHELL_ARGS:-}"
RUST_LOG_VAL="${RUST_LOG:-vp_app=info,vantage_point=info}"
VP_TERMINAL_MODE_VAL="${VP_TERMINAL_MODE:-}"
VP_WORLD_URL_VAL="${VP_WORLD_URL:-}"

# vp-app + vp.exe (daemon) は tracing-appender 経由で file に直接書く。
# - vp-app:  $LOCALAPPDATA\VantagePoint-dev\Logs\vp-app.kdl.log (tracing-appender)
# - vp.exe:  $LOCALAPPDATA\VantagePoint-dev\Logs\vp-world.kdl.log (VP_DAEMON_LOG_FILE 経由)
# Start-Process redirect は使わず (Win GUI subsystem では非機能)、各 process の file writer が source。
LOG_APP_WSL="$INSTALL_DIR/Logs/vp-app.kdl.log"
LOG_DAEMON_WSL="$INSTALL_DIR/Logs/vp-world.kdl.log"
LOG_DAEMON_WIN="$INSTALL_DIR_WIN\\Logs\\vp-world.kdl.log"
mkdir -p "$INSTALL_DIR/Logs" 2>/dev/null || true
: > "$LOG_APP_WSL" 2>/dev/null || true
: > "$LOG_DAEMON_WSL" 2>/dev/null || true

echo "🚀 Launching $INSTALL_EXE_WIN ..."
WIN_PID=$(powershell.exe -NoProfile -Command "\$env:VP_SHELL='$VP_SHELL_VAL'; \$env:VP_SHELL_ARGS='$VP_SHELL_ARGS_VAL'; \$env:RUST_LOG='$RUST_LOG_VAL'; \$env:VP_TERMINAL_MODE='$VP_TERMINAL_MODE_VAL'; \$env:VP_WORLD_URL='$VP_WORLD_URL_VAL'; \$env:VP_DAEMON_LOG_FILE='$LOG_DAEMON_WIN'; Start-Process -FilePath '$INSTALL_EXE_WIN' -WorkingDirectory '$INSTALL_DIR_WIN' -PassThru | Select-Object -ExpandProperty Id" 2>&1 | tr -d '\r' | tr -d '[:space:]')
echo "✅ 起動完了 (PID=$WIN_PID)"
echo "   app log:    $LOG_APP_WSL"
echo "   daemon log: $LOG_DAEMON_WSL"
echo ""
echo "📺 ログを stdout に流します (Ctrl+C で tail 停止、vp-app は継続)..."
echo "─────────────────────────────────────────────────"

# tracing-appender が file に直書きするので、tail -F で follow。
# WSL2 /mnt/c/ inotify が Win-native プロセスの書込で発火しないケースに備えて
# polling 間隔を short に設定 (`---disable-inotify` で stat-based polling 強制)。
# vp-app + vp.exe (daemon) の 2 file を同時 tail。
tail -F --sleep-interval=0.5 ---disable-inotify "$LOG_APP_WSL" "$LOG_DAEMON_WSL" &
TAIL_PID=$!

# vp-app プロセス (Win-side PID) を tasklist.exe で監視、終了したら tail 止めて抜ける。
trap 'kill $TAIL_PID 2>/dev/null; echo ""; echo "📴 tail 停止 (vp-app は継続中)。再度開始: mise run win:logs"' EXIT INT TERM

while [ -n "$WIN_PID" ] && tasklist.exe /FI "PID eq $WIN_PID" 2>/dev/null | grep -q "$WIN_PID"; do
  sleep 1
done
echo ""
echo "🏁 vp-app (PID=$WIN_PID) 終了"
'''

[tasks."win:logs"]
description = "実行中の vp-app + vp.exe (daemon) の log を tail -F で stdout 表示"
run = '''
set -euo pipefail
WIN_LOCALAPPDATA=$(cmd.exe /c "echo %LOCALAPPDATA%" 2>/dev/null | tr -d '\r')
INSTALL_DIR=$(wslpath -u "$WIN_LOCALAPPDATA")/VantagePoint-dev
LOG_APP="$INSTALL_DIR/Logs/vp-app.kdl.log"
LOG_DAEMON="$INSTALL_DIR/Logs/vp-world.kdl.log"

echo "📺 tail -F: $LOG_APP + $LOG_DAEMON"
echo "─────────────────────────────────────────────────"
exec tail -F --sleep-interval=0.5 ---disable-inotify "$LOG_APP" "$LOG_DAEMON"
'''

[tasks."win:build"]
description = "Build vp-app + vp for Windows without launching (cross-compile from WSL2)"
run = """
set -euo pipefail
if ! command -v x86_64-w64-mingw32-gcc >/dev/null 2>&1; then
  echo "❌ mingw-w64 が未インストール: brew install mingw-w64" >&2
  exit 1
fi
if ! command -v nasm >/dev/null 2>&1; then
  echo "❌ nasm が未インストール (aws-lc-sys で必須): brew install nasm" >&2
  exit 1
fi
if ! rustup target list --installed 2>/dev/null | grep -q "x86_64-pc-windows-gnu"; then
  rustup target add x86_64-pc-windows-gnu
fi

CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
  cargo build --target x86_64-pc-windows-gnu -p vp-app -p vp-cli --no-default-features
echo "✅ Built: target/x86_64-pc-windows-gnu/debug/{vp-app,vp}.exe"
"""

[tasks."win:wsl"]
description = "vp-app on Windows で WSL (Arch) を terminal に立ち上げる (local PTY mode)"
# bash -i で interactive shell、~/.bashrc (PATH 設定含む) を適切に読み込む
# VP_TERMINAL_MODE=local: Windows native vp.exe world の PTY ではなく vp-app 内 portable-pty で
# WSL bash を直接 spawn したいので daemon auto-launch を回避する
env = { VP_TERMINAL_MODE = "local", VP_SHELL = "wsl.exe", VP_SHELL_ARGS = "--cd /home/mito/repos/vantage-point -- bash -i" }
run = "mise run win"

[tasks."win:claude"]
description = "vp-app on Windows で WSL 上の claude code を terminal で起動 (local PTY mode、claude --continue 優先、失敗で claude フォールバック)"
# $HOME/.bun/bin を PATH に明示追加 (bash -l は .bashrc early-return で PATH が効かないため)
env = { VP_TERMINAL_MODE = "local", VP_SHELL = "wsl.exe", VP_SHELL_ARGS = '--cd /home/mito/repos/vantage-point -- bash -lc "export PATH=$HOME/.bun/bin:$PATH; claude --continue || claude"' }
run = "mise run win"

[tasks."win:claude-yolo"]
description = "win:claude + bypass permissions ON (--dangerously-skip-permissions) — 信頼するセッションのみ"
# 意図的に bypass を有効化。script や lint / format / test / git を prompt なしで走らせたい時に。
env = { VP_TERMINAL_MODE = "local", VP_SHELL = "wsl.exe", VP_SHELL_ARGS = '--cd /home/mito/repos/vantage-point -- bash -lc "export PATH=$HOME/.bun/bin:$PATH; claude --dangerously-skip-permissions --continue || claude --dangerously-skip-permissions"' }
run = "mise run win"

[tasks."win:daemon"]
description = "[dev] WSL 側 daemon + Windows vp-app の混成経路。vp.exe 再ビルド時間を回避したい時用"
# standalone は `mise run win` (vp-app + vp.exe 同梱 + auto-launch) がデフォルト。
# こちらは vp-app 側だけ Windows に cross-build し、daemon は WSL 上の `vp world` に繋ぐ。
# daemon コードを触っていない iteration 時に vp-cli の ~3 分再ビルドを省ける。
depends = ["win:daemon:up"]
run = "bash scripts/win-daemon-launch.sh"

[tasks."win:daemon:up"]
description = "(helper) WSL で TheWorld daemon を起動し :32000 が ready になるまで待つ"
run = "bash scripts/win-daemon-up.sh"

[tasks."win:release"]
description = "Build vp-app + vp release for Windows (MSI/署名/winget は Phase W4 で追加予定)"
run = """
set -euo pipefail
if ! command -v x86_64-w64-mingw32-gcc >/dev/null 2>&1; then
  echo "❌ mingw-w64 が未インストール: brew install mingw-w64" >&2
  exit 1
fi
if ! command -v nasm >/dev/null 2>&1; then
  echo "❌ nasm が未インストール (aws-lc-sys で必須): brew install nasm" >&2
  exit 1
fi
if ! rustup target list --installed 2>/dev/null | grep -q "x86_64-pc-windows-gnu"; then
  rustup target add x86_64-pc-windows-gnu
fi

CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
  cargo build --release --target x86_64-pc-windows-gnu -p vp-app -p vp-cli --no-default-features

VP_APP="target/x86_64-pc-windows-gnu/release/vp-app.exe"
VP_BIN="target/x86_64-pc-windows-gnu/release/vp.exe"
ls -lh "$VP_APP" "$VP_BIN"
echo "✅ Release built: $VP_APP + $VP_BIN"
echo "ℹ️  WiX MSI + Authenticode 署名 + winget manifest は Phase W4 (VP-90) で追加予定"
"""

[tasks."mac:release"]
description = "Build, sign, notarize & package VantagePoint.app as DMG"
run = """
set -euo pipefail

TEAM_ID="3EQKG4B352"
SIGN_ID="Developer ID Application: Anycreative Inc. ($TEAM_ID)"
KEYCHAIN_PROFILE="vp-notarize"
VERSION=$(grep 'CFBundleShortVersionString' apple/VantagePoint/Resources/Info.plist -A1 | grep '<string>' | sed 's/.*<string>//;s/<\\/string>//')
ARCHIVE_PATH="/tmp/VantagePoint.xcarchive"
DMG_DIR="/tmp/vp-dmg"
DMG_PATH="dist/VantagePoint-${VERSION}.dmg"

echo "📦 Vantage Point v${VERSION} リリースビルド"
echo "==========================================="

# 1. Rust ライブラリビルド
echo ""
echo "🔨 [1/6] vp-bridge ビルド..."
cargo build --release -p vp-bridge

# 2. Xcode Archive
echo ""
echo "🔨 [2/6] Xcode Archive..."
rm -rf "$ARCHIVE_PATH"
cd apple/VantagePoint
xcodebuild archive \
  -scheme VantagePoint \
  -archivePath "$ARCHIVE_PATH" \
  -configuration Release \
  CODE_SIGN_IDENTITY="$SIGN_ID" \
  CODE_SIGN_STYLE=Manual \
  DEVELOPMENT_TEAM="$TEAM_ID" \
  ARCHS=arm64 \
  ONLY_ACTIVE_ARCH=YES \
  -quiet
cd ../..

# 3. 署名検証
echo ""
echo "🔏 [3/6] 署名検証..."
codesign -vvv "$ARCHIVE_PATH/Products/Applications/VantagePoint.app"

# 4. DMG 作成
echo ""
echo "📀 [4/6] DMG 作成..."
rm -rf "$DMG_DIR"
mkdir -p "$DMG_DIR" "dist"
cp -R "$ARCHIVE_PATH/Products/Applications/VantagePoint.app" "$DMG_DIR/"
ln -s /Applications "$DMG_DIR/Applications"
rm -f "$DMG_PATH"
hdiutil create -volname "Vantage Point" \
  -srcfolder "$DMG_DIR" \
  -ov -format UDZO \
  "$DMG_PATH"

# 5. DMG 署名 + Notarize
echo ""
echo "🔏 [5/6] DMG 署名 + Notarize..."
codesign --force --sign "$SIGN_ID" "$DMG_PATH"
