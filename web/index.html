<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Point</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .header {
            background: #16213e;
            padding: 12px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 500;
        }
        .status {
            font-size: 12px;
            color: #888;
        }
        .status.connected {
            color: #4ade80;
        }
        .status.disconnected {
            color: #f87171;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: calc(100vh - 50px);
        }
        .pane {
            padding: 20px;
            overflow: auto;
            background: #1a1a2e;
        }
        .pane-content {
            max-width: 800px;
            margin: 0 auto;
        }
        /* Markdown styles */
        .pane-content h1, .pane-content h2, .pane-content h3 {
            margin: 1em 0 0.5em;
            color: #fff;
        }
        .pane-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }
        .pane-content code {
            background: #0f3460;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        .pane-content pre {
            background: #0f3460;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1em 0;
        }
        .pane-content pre code {
            background: none;
            padding: 0;
        }
        .pane-content img {
            max-width: 100%;
            border-radius: 8px;
        }
        .pane-content ul, .pane-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }
        .log-entry {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid #0f3460;
        }
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .welcome h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #888;
        }

        /* Chat Panel Styles */
        .chat-panel {
            display: flex;
            flex-direction: column;
            border-left: 1px solid #0f3460;
            background: #16213e;
        }
        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid #0f3460;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
        }
        .chat-header-actions {
            display: flex;
            gap: 8px;
        }
        .header-btn {
            background: transparent;
            border: 1px solid #0f3460;
            color: #888;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-btn:hover {
            background: #0f3460;
            color: #eee;
        }
        .header-btn.danger:hover {
            background: #dc2626;
            border-color: #dc2626;
            color: #fff;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-message {
            max-width: 90%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
        }
        .chat-message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #fff;
        }
        .chat-message.assistant {
            align-self: flex-start;
            background: #1a1a2e;
            color: #eee;
            border: 1px solid #0f3460;
        }
        .chat-message.system {
            align-self: center;
            background: transparent;
            color: #888;
            font-size: 12px;
            padding: 4px 8px;
        }
        .chat-message.assistant .content {
            white-space: pre-wrap;
        }
        .chat-message.assistant .content p {
            margin: 0.3em 0;
        }
        .chat-message.assistant .content code {
            background: #0f3460;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 13px;
        }
        .chat-message.assistant .content pre {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .chat-message.assistant .content pre code {
            background: none;
            padding: 0;
        }
        .chat-typing {
            align-self: flex-start;
            padding: 10px 14px;
            color: #888;
            font-size: 14px;
        }
        .chat-typing::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .chat-input-container {
            padding: 12px;
            border-top: 1px solid #0f3460;
        }
        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            background: #1a1a2e;
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid #0f3460;
        }
        .chat-input-wrapper:focus-within {
            border-color: #667eea;
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #eee;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            font-family: inherit;
        }
        .chat-input::placeholder {
            color: #666;
        }
        .chat-send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .chat-send-btn:hover {
            opacity: 0.9;
        }
        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chat-send-btn svg {
            width: 16px;
            height: 16px;
        }
        .chat-cancel-btn {
            background: #dc2626;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .chat-cancel-btn:hover {
            opacity: 0.9;
        }
        .chat-cancel-btn.visible {
            display: flex;
        }
        .chat-cancel-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Debug Panel Styles */
        .debug-panel {
            background: #0d1117;
            border-top: 1px solid #0f3460;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            display: none;
        }
        .debug-panel.visible {
            display: block;
        }
        .debug-header {
            position: sticky;
            top: 0;
            background: #0d1117;
            padding: 6px 12px;
            border-bottom: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8b949e;
        }
        .debug-header span {
            font-weight: 500;
        }
        .debug-clear-btn {
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 10px;
        }
        .debug-clear-btn:hover {
            color: #c9d1d9;
        }
        .debug-entries {
            padding: 8px 12px;
        }
        .debug-entry {
            padding: 2px 0;
            color: #8b949e;
            display: flex;
            gap: 8px;
        }
        .debug-entry .timestamp {
            color: #6e7681;
            min-width: 80px;
        }
        .debug-entry .category {
            color: #58a6ff;
            min-width: 70px;
        }
        .debug-entry .message {
            color: #c9d1d9;
        }
        .debug-entry.error .category {
            color: #f85149;
        }
        .debug-entry.error .message {
            color: #f85149;
        }
        .debug-entry .data {
            color: #7ee787;
            margin-left: 158px;
            word-break: break-all;
        }

        /* Debug mode indicator */
        .debug-indicator {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 8px;
        }
        .debug-indicator.simple {
            background: #3b82f6;
            color: white;
        }
        .debug-indicator.detail {
            background: #f59e0b;
            color: black;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 300px;
            }
            .chat-panel {
                border-left: none;
                border-top: 1px solid #0f3460;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Vantage Point</h1>
        <span id="status" class="status disconnected">Disconnected</span>
        <span id="debug-indicator" class="debug-indicator" style="display: none;"></span>
    </div>
    <div class="container">
        <div id="pane-main" class="pane">
            <div class="pane-content">
                <div class="welcome">
                    <h2>Vantage Point</h2>
                    <p>Waiting for content from daemon...</p>
                </div>
            </div>
        </div>
        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-header-icon"></div>
                    <span>Agent Chat</span>
                </div>
                <div class="chat-header-actions">
                    <button id="reset-btn" class="header-btn danger" title="Reset Session">Reset</button>
                    <button id="debug-toggle-btn" class="header-btn" title="Toggle Debug Panel">Debug</button>
                </div>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="chat-message system">
                    Connected to Vantage Point Agent
                </div>
            </div>
            <div id="debug-panel" class="debug-panel">
                <div class="debug-header">
                    <span>Debug Log</span>
                    <button id="debug-clear-btn" class="debug-clear-btn">Clear</button>
                </div>
                <div id="debug-entries" class="debug-entries"></div>
            </div>
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea
                        id="chat-input"
                        class="chat-input"
                        placeholder="Message the agent..."
                        rows="1"
                    ></textarea>
                    <button id="chat-cancel-btn" class="chat-cancel-btn" title="Cancel Request">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 6l12 12M6 18L18 6"/>
                        </svg>
                    </button>
                    <button id="chat-send-btn" class="chat-send-btn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${location.host}/ws`;
        let ws = null;
        let reconnectTimer = null;
        let isTyping = false;
        let currentStreamContent = '';
        let debugMode = 'none';
        let isComposing = false; // IME変換中フラグ
        let justFinishedComposing = false; // IME確定直後フラグ

        // Chat elements
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const chatCancelBtn = document.getElementById('chat-cancel-btn');
        const resetBtn = document.getElementById('reset-btn');
        const debugToggleBtn = document.getElementById('debug-toggle-btn');
        const debugPanel = document.getElementById('debug-panel');
        const debugEntries = document.getElementById('debug-entries');
        const debugClearBtn = document.getElementById('debug-clear-btn');
        const debugIndicator = document.getElementById('debug-indicator');

        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log('Connected to vantaged');
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status connected';
                chatSendBtn.disabled = false;
                ws.send(JSON.stringify({ type: 'ready' }));
            };

            ws.onclose = () => {
                console.log('Disconnected from vantaged');
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = 'status disconnected';
                chatSendBtn.disabled = true;
                // Auto reconnect
                reconnectTimer = setTimeout(connect, 2000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        function handleMessage(msg) {
            console.log('Received:', msg);

            switch (msg.type) {
                case 'show':
                    showContent(msg.pane_id || 'main', msg.content, msg.append);
                    break;
                case 'clear':
                    clearPane(msg.pane_id || 'main');
                    break;
                case 'ping':
                    ws.send(JSON.stringify({ type: 'pong' }));
                    break;
                case 'chat_message':
                    addChatMessage(msg.message.role, msg.message.content);
                    break;
                case 'chat_chunk':
                    handleChatChunk(msg.content, msg.done);
                    break;
                case 'debug_info':
                    handleDebugInfo(msg);
                    break;
                case 'debug_mode_changed':
                    setDebugMode(msg.mode);
                    break;
            }
        }

        function setDebugMode(mode) {
            debugMode = mode;
            if (mode === 'none') {
                debugIndicator.style.display = 'none';
                debugPanel.classList.remove('visible');
            } else {
                debugIndicator.style.display = 'inline';
                debugIndicator.textContent = mode === 'simple' ? 'DEBUG' : 'DEBUG (detail)';
                debugIndicator.className = `debug-indicator ${mode}`;
                debugPanel.classList.add('visible');
            }
        }

        function handleDebugInfo(msg) {
            if (debugMode === 'none') return;

            const entry = document.createElement('div');
            entry.className = `debug-entry ${msg.category === 'error' ? 'error' : ''}`;

            const timestamp = new Date().toLocaleTimeString('ja-JP', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            entry.innerHTML = `
                <span class="timestamp">${timestamp}</span>
                <span class="category">[${msg.category}]</span>
                <span class="message">${escapeHtml(msg.message)}</span>
            `;

            if (msg.data && debugMode === 'detail') {
                const dataEl = document.createElement('div');
                dataEl.className = 'data';
                dataEl.textContent = JSON.stringify(msg.data, null, 2);
                entry.appendChild(dataEl);
            }

            debugEntries.appendChild(entry);
            debugEntries.scrollTop = debugEntries.scrollHeight;
        }

        function getPane(paneId) {
            let pane = document.getElementById(`pane-${paneId}`);
            if (!pane) {
                // Create new pane if doesn't exist
                pane = document.createElement('div');
                pane.id = `pane-${paneId}`;
                pane.className = 'pane';
                pane.innerHTML = '<div class="pane-content"></div>';
                document.querySelector('.container').appendChild(pane);
            }
            return pane.querySelector('.pane-content');
        }

        function showContent(paneId, content, append) {
            const paneContent = getPane(paneId);
            let html = '';

            if (content.log) {
                html = `<div class="log-entry">${escapeHtml(content.log)}</div>`;
            } else if (content.markdown) {
                html = marked.parse(content.markdown);
            } else if (content.image_base64) {
                html = `<img src="data:${content.image_base64.mime_type};base64,${content.image_base64.data}" alt="Image">`;
            } else if (content.html) {
                html = content.html;
            }

            if (append) {
                paneContent.innerHTML += html;
            } else {
                paneContent.innerHTML = html;
            }

            // Scroll to bottom
            paneContent.parentElement.scrollTop = paneContent.parentElement.scrollHeight;
        }

        function clearPane(paneId) {
            const paneContent = getPane(paneId);
            paneContent.innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Chat functions
        function addChatMessage(role, content) {
            // Remove typing indicator if present
            removeTypingIndicator();

            const messageEl = document.createElement('div');
            messageEl.className = `chat-message ${role}`;

            if (role === 'assistant') {
                const contentEl = document.createElement('div');
                contentEl.className = 'content';
                contentEl.innerHTML = marked.parse(content);
                messageEl.appendChild(contentEl);
            } else {
                messageEl.textContent = content;
            }

            chatMessages.appendChild(messageEl);
            scrollChatToBottom();
        }

        function handleChatChunk(content, done) {
            // Remove typing indicator when first chunk arrives
            removeTypingIndicator();

            if (!isTyping && content) {
                // Start new streaming message
                isTyping = true;
                currentStreamContent = '';
                chatCancelBtn.classList.add('visible');

                const messageEl = document.createElement('div');
                messageEl.className = 'chat-message assistant';
                messageEl.id = 'streaming-message';

                const contentEl = document.createElement('div');
                contentEl.className = 'content';
                messageEl.appendChild(contentEl);

                chatMessages.appendChild(messageEl);
            }

            if (content) {
                currentStreamContent += content;

                const streamingEl = document.getElementById('streaming-message');
                if (streamingEl) {
                    const contentEl = streamingEl.querySelector('.content');
                    contentEl.innerHTML = marked.parse(currentStreamContent);
                }

                scrollChatToBottom();
            }

            if (done) {
                isTyping = false;
                currentStreamContent = '';
                chatCancelBtn.classList.remove('visible');
                const streamingEl = document.getElementById('streaming-message');
                if (streamingEl) {
                    streamingEl.removeAttribute('id');
                }
            }
        }

        function showTypingIndicator() {
            if (!document.getElementById('typing-indicator')) {
                const typingEl = document.createElement('div');
                typingEl.id = 'typing-indicator';
                typingEl.className = 'chat-typing';
                typingEl.textContent = 'Agent is thinking';
                chatMessages.appendChild(typingEl);
                scrollChatToBottom();
            }
        }

        function removeTypingIndicator() {
            const typingEl = document.getElementById('typing-indicator');
            if (typingEl) {
                typingEl.remove();
            }
        }

        function scrollChatToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;

            // Add user message to chat
            addChatMessage('user', message);

            // Send to daemon
            ws.send(JSON.stringify({
                type: 'chat',
                message: message
            }));

            // Clear input
            chatInput.value = '';
            autoResizeTextarea();

            // Show typing indicator
            showTypingIndicator();
            chatCancelBtn.classList.add('visible');
        }

        function cancelChatRequest() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({ type: 'cancel_chat' }));
            removeTypingIndicator();
            chatCancelBtn.classList.remove('visible');

            // If streaming, mark it as done
            if (isTyping) {
                isTyping = false;
                currentStreamContent = '';
                const streamingEl = document.getElementById('streaming-message');
                if (streamingEl) {
                    streamingEl.removeAttribute('id');
                    // Add cancelled indicator
                    const contentEl = streamingEl.querySelector('.content');
                    if (contentEl) {
                        contentEl.innerHTML += '<div style="color: #888; font-size: 12px; margin-top: 8px;">[Cancelled]</div>';
                    }
                }
            }
        }

        function resetSession() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            if (confirm('Reset session? This will start a new conversation.')) {
                ws.send(JSON.stringify({ type: 'reset_session' }));
            }
        }

        function autoResizeTextarea() {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
        }

        // Event listeners
        chatInput.addEventListener('input', autoResizeTextarea);

        // IME変換中の追跡
        chatInput.addEventListener('compositionstart', (e) => {
            console.log('[IME] compositionstart', { data: e.data });
            isComposing = true;
        });

        chatInput.addEventListener('compositionupdate', (e) => {
            console.log('[IME] compositionupdate', { data: e.data, isComposing });
        });

        chatInput.addEventListener('compositionend', (e) => {
            console.log('[IME] compositionend', { data: e.data });
            isComposing = false;
            // IME確定直後のEnterを無視するためのフラグ
            justFinishedComposing = true;
            // 少し遅延してフラグをリセット（確定のEnterキーイベントが先に来るため）
            setTimeout(() => {
                console.log('[IME] Resetting justFinishedComposing flag');
                justFinishedComposing = false;
            }, 100);
        });

        chatInput.addEventListener('keydown', (e) => {
            console.log('[KEY] keydown', {
                key: e.key,
                code: e.code,
                isComposing: e.isComposing,
                isComposingFlag: isComposing,
                justFinishedComposing: justFinishedComposing,
                keyCode: e.keyCode,
                shiftKey: e.shiftKey
            });

            // IME変換中または確定直後はEnterを無視
            // e.isComposing: ブラウザネイティブのIME状態チェック
            // isComposing: フォールバック用のフラグ
            // justFinishedComposing: IME確定直後（compositionend直後）のEnterを無視
            // keyCode 229: IME処理中を示す特殊なキーコード
            if (e.key === 'Enter' && !e.shiftKey) {
                if (e.isComposing || isComposing || justFinishedComposing || e.keyCode === 229) {
                    console.log('[KEY] Ignoring Enter (IME or just finished)');
                    return; // デフォルト動作を許可（IME確定）
                }
                console.log('[KEY] Sending message!');
                e.preventDefault();
                sendChatMessage();
            }
        });

        chatSendBtn.addEventListener('click', sendChatMessage);
        chatCancelBtn.addEventListener('click', cancelChatRequest);
        resetBtn.addEventListener('click', resetSession);

        debugToggleBtn.addEventListener('click', () => {
            debugPanel.classList.toggle('visible');
        });

        debugClearBtn.addEventListener('click', () => {
            debugEntries.innerHTML = '';
        });

        // Start connection
        connect();
    </script>
</body>
</html>
