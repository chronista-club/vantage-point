# Vantage Point - mise Configuration
# https://mise.jdx.dev/

[tools]
rust = "1.94.0"
node = "22"
bun = "latest"

[env]
VANTAGE_ROOT = "{{config_root}}"
_.file = ".env"

[tasks.build]
description = "Build Rust crates"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.mac]
description = "Build & run macOS native app (VantagePoint.app) via xcodebuild"
run = """
set -euo pipefail
ROOT="$(pwd)"

echo "🔨 Building vp-bridge (staticlib)..."
cargo build --release -p vp-bridge

echo "🔧 Regenerating xcodeproj via xcodegen (project.yml → .xcodeproj)..."
(cd "$ROOT/apple/VantagePoint" && xcodegen generate --spec project.yml -q)

echo "🔨 Building VantagePoint (xcodebuild)..."
xcodebuild build \
  -project "$ROOT/apple/VantagePoint/VantagePoint.xcodeproj" \
  -scheme VantagePoint \
  -configuration Release \
  -derivedDataPath "$ROOT/.build/DerivedData" \
  ARCHS=arm64 \
  ONLY_ACTIVE_ARCH=YES \
  -quiet

echo "🔄 既存プロセスを停止..."
pkill -f 'VantagePoint$' 2>/dev/null && sleep 1 || true

BUILD_APP="$ROOT/.build/DerivedData/Build/Products/Release/VantagePoint.app"
INSTALL_APP="/Applications/VantagePoint.app"

echo "📦 /Applications に反映..."
# 古い /Applications バージョンを削除（ditto は上書きを完全サポートしないため）
rm -rf "$INSTALL_APP"
# ditto でメタデータ（codesign 含む）ごとコピー
ditto "$BUILD_APP" "$INSTALL_APP"

echo "🚀 Launching $INSTALL_APP ..."
exec open "$INSTALL_APP"
"""

[tasks."mac:build"]
description = "Build macOS native app without launching"
run = """
cargo build --release -p vp-bridge
cd apple/VantagePoint && swift build -c release
echo "✅ Built: apple/VantagePoint/.build/release/VantagePoint"
"""

[tasks.win]
description = "Build & run vp-app + vp (standalone) on Windows host — WSL2 mingw cross-compile → Windows exec"
run = '''
set -euo pipefail
ROOT="$(pwd)"

# 前提チェック
if ! command -v x86_64-w64-mingw32-gcc >/dev/null 2>&1; then
  echo "❌ mingw-w64 が未インストール: brew install mingw-w64" >&2
  exit 1
fi
if ! command -v wslpath >/dev/null 2>&1; then
  echo "❌ WSL 環境でのみ実行可能 (wslpath が必要)" >&2
  exit 1
fi
if ! command -v nasm >/dev/null 2>&1; then
  echo "❌ nasm が未インストール (aws-lc-sys で必須): brew install nasm" >&2
  exit 1
fi
if ! rustup target list --installed 2>/dev/null | grep -q "x86_64-pc-windows-gnu"; then
  echo "📦 rustup target 追加: x86_64-pc-windows-gnu"
  rustup target add x86_64-pc-windows-gnu
fi

if [ "${VP_SKIP_DAEMON_BUILD:-}" = "1" ]; then
  echo "🔨 vp-app のみ Windows 向けクロスビルド (VP_SKIP_DAEMON_BUILD=1)..."
  CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
    cargo build --target x86_64-pc-windows-gnu -p vp-app
else
  echo "🔨 vp-app + vp (vp-cli) を Windows 向けにクロスビルド..."
  # vp-app: GUI app (tao + wry + WebView2)
  # vp (= vp-cli): TheWorld daemon 本体。Windows では GUI/MIDI feature を落とす
  #   (gui feature は macOS/Linux の tao/muda、midi は ALSA 依存で Windows 経路と相性悪い)
  CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
    cargo build --target x86_64-pc-windows-gnu -p vp-app -p vp-cli --no-default-features
fi

VP_APP_EXE="$ROOT/target/x86_64-pc-windows-gnu/debug/vp-app.exe"
VP_EXE="$ROOT/target/x86_64-pc-windows-gnu/debug/vp.exe"
WEBVIEW2_DLL=$(find "$ROOT/target/x86_64-pc-windows-gnu/debug/build" -path "*/webview2-com-sys-*/out/x64/WebView2Loader.dll" -print -quit)
if [ -z "$WEBVIEW2_DLL" ] || [ ! -f "$VP_APP_EXE" ]; then
  echo "❌ build 成果物が見つからない (vp-app.exe / WebView2Loader.dll)" >&2
  exit 1
fi

# Windows 側のインストール先 (user-scope、LOCALAPPDATA 配下)
WIN_LOCALAPPDATA=$(cmd.exe /c "echo %LOCALAPPDATA%" 2>/dev/null | tr -d '\r')
INSTALL_DIR=$(wslpath -u "$WIN_LOCALAPPDATA")/VantagePoint-dev

echo "🔄 既存プロセスを停止 (vp-app / vp の exe ロック解放)..."
powershell.exe -NoProfile -Command "Get-Process -Name vp-app,vp -ErrorAction SilentlyContinue | Stop-Process -Force" 2>/dev/null | tr -d '\r' || true
sleep 1

echo "📦 $INSTALL_DIR に vp-app.exe + WebView2Loader.dll$([ -f "$VP_EXE" ] && echo ' + vp.exe') を配置..."
mkdir -p "$INSTALL_DIR"
cp "$VP_APP_EXE" "$INSTALL_DIR/vp-app.exe"
cp "$WEBVIEW2_DLL" "$INSTALL_DIR/WebView2Loader.dll"
# vp.exe は VP_SKIP_DAEMON_BUILD=1 時にはビルドされていないので存在確認して copy
if [ -f "$VP_EXE" ]; then
  cp "$VP_EXE" "$INSTALL_DIR/vp.exe"
fi

INSTALL_DIR_WIN="$WIN_LOCALAPPDATA\\VantagePoint-dev"
INSTALL_EXE_WIN="$INSTALL_DIR_WIN\\vp-app.exe"

# 任意 override (VP_SHELL 系 / VP_TERMINAL_MODE=local への明示切替など)
VP_SHELL_VAL="${VP_SHELL:-}"
VP_SHELL_ARGS_VAL="${VP_SHELL_ARGS:-}"
RUST_LOG_VAL="${RUST_LOG:-vp_app=info,vantage_point=info}"
VP_TERMINAL_MODE_VAL="${VP_TERMINAL_MODE:-}"
VP_WORLD_URL_VAL="${VP_WORLD_URL:-}"

LOG_FILE_WIN="$INSTALL_DIR_WIN\\vp-app.log"
LOG_ERR_WIN="$INSTALL_DIR_WIN\\vp-app.err.log"
LOG_ERR_WSL="$INSTALL_DIR/vp-app.err.log"
LOG_OUT_WSL="$INSTALL_DIR/vp-app.log"

# 前回 log を truncate (新 run を切り分けやすく)
: > "$LOG_ERR_WSL" 2>/dev/null || true
: > "$LOG_OUT_WSL" 2>/dev/null || true

echo "🚀 Launching $INSTALL_EXE_WIN (daemon auto-launch → vp.exe world を同ディレクトリから spawn)..."
powershell.exe -NoProfile -Command "\$env:VP_SHELL='$VP_SHELL_VAL'; \$env:VP_SHELL_ARGS='$VP_SHELL_ARGS_VAL'; \$env:RUST_LOG='$RUST_LOG_VAL'; \$env:VP_TERMINAL_MODE='$VP_TERMINAL_MODE_VAL'; \$env:VP_WORLD_URL='$VP_WORLD_URL_VAL'; Start-Process -FilePath '$INSTALL_EXE_WIN' -WorkingDirectory '$INSTALL_DIR_WIN' -RedirectStandardOutput '$LOG_FILE_WIN' -RedirectStandardError '$LOG_ERR_WIN'" 2>&1 | tr -d '\r' || true
echo "✅ 起動リクエスト送信。log: $LOG_OUT_WSL / $LOG_ERR_WSL"
'''

[tasks."win:build"]
description = "Build vp-app + vp for Windows without launching (cross-compile from WSL2)"
run = """
set -euo pipefail
if ! command -v x86_64-w64-mingw32-gcc >/dev/null 2>&1; then
  echo "❌ mingw-w64 が未インストール: brew install mingw-w64" >&2
  exit 1
fi
if ! command -v nasm >/dev/null 2>&1; then
  echo "❌ nasm が未インストール (aws-lc-sys で必須): brew install nasm" >&2
  exit 1
fi
if ! rustup target list --installed 2>/dev/null | grep -q "x86_64-pc-windows-gnu"; then
  rustup target add x86_64-pc-windows-gnu
fi

CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
  cargo build --target x86_64-pc-windows-gnu -p vp-app -p vp-cli --no-default-features
echo "✅ Built: target/x86_64-pc-windows-gnu/debug/{vp-app,vp}.exe"
"""

[tasks."win:wsl"]
description = "vp-app on Windows で WSL (Arch) を terminal に立ち上げる (local PTY mode)"
# bash -i で interactive shell、~/.bashrc (PATH 設定含む) を適切に読み込む
# VP_TERMINAL_MODE=local: Windows native vp.exe world の PTY ではなく vp-app 内 portable-pty で
# WSL bash を直接 spawn したいので daemon auto-launch を回避する
env = { VP_TERMINAL_MODE = "local", VP_SHELL = "wsl.exe", VP_SHELL_ARGS = "--cd /home/mito/repos/vantage-point -- bash -i" }
run = "mise run win"

[tasks."win:claude"]
description = "vp-app on Windows で WSL 上の claude code を terminal で起動 (local PTY mode、claude --continue 優先、失敗で claude フォールバック)"
# $HOME/.bun/bin を PATH に明示追加 (bash -l は .bashrc early-return で PATH が効かないため)
env = { VP_TERMINAL_MODE = "local", VP_SHELL = "wsl.exe", VP_SHELL_ARGS = '--cd /home/mito/repos/vantage-point -- bash -lc "export PATH=$HOME/.bun/bin:$PATH; claude --continue || claude"' }
run = "mise run win"

[tasks."win:claude-yolo"]
description = "win:claude + bypass permissions ON (--dangerously-skip-permissions) — 信頼するセッションのみ"
# 意図的に bypass を有効化。script や lint / format / test / git を prompt なしで走らせたい時に。
env = { VP_TERMINAL_MODE = "local", VP_SHELL = "wsl.exe", VP_SHELL_ARGS = '--cd /home/mito/repos/vantage-point -- bash -lc "export PATH=$HOME/.bun/bin:$PATH; claude --dangerously-skip-permissions --continue || claude --dangerously-skip-permissions"' }
run = "mise run win"

[tasks."win:daemon"]
description = "[dev] WSL 側 daemon + Windows vp-app の混成経路。vp.exe 再ビルド時間を回避したい時用"
# standalone は `mise run win` (vp-app + vp.exe 同梱 + auto-launch) がデフォルト。
# こちらは vp-app 側だけ Windows に cross-build し、daemon は WSL 上の `vp world` に繋ぐ。
# daemon コードを触っていない iteration 時に vp-cli の ~3 分再ビルドを省ける。
depends = ["win:daemon:up"]
run = "bash scripts/win-daemon-launch.sh"

[tasks."win:daemon:up"]
description = "(helper) WSL で TheWorld daemon を起動し :32000 が ready になるまで待つ"
run = "bash scripts/win-daemon-up.sh"

[tasks."win:release"]
description = "Build vp-app + vp release for Windows (MSI/署名/winget は Phase W4 で追加予定)"
run = """
set -euo pipefail
if ! command -v x86_64-w64-mingw32-gcc >/dev/null 2>&1; then
  echo "❌ mingw-w64 が未インストール: brew install mingw-w64" >&2
  exit 1
fi
if ! command -v nasm >/dev/null 2>&1; then
  echo "❌ nasm が未インストール (aws-lc-sys で必須): brew install nasm" >&2
  exit 1
fi
if ! rustup target list --installed 2>/dev/null | grep -q "x86_64-pc-windows-gnu"; then
  rustup target add x86_64-pc-windows-gnu
fi

CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
  cargo build --release --target x86_64-pc-windows-gnu -p vp-app -p vp-cli --no-default-features

VP_APP="target/x86_64-pc-windows-gnu/release/vp-app.exe"
VP_BIN="target/x86_64-pc-windows-gnu/release/vp.exe"
ls -lh "$VP_APP" "$VP_BIN"
echo "✅ Release built: $VP_APP + $VP_BIN"
echo "ℹ️  WiX MSI + Authenticode 署名 + winget manifest は Phase W4 (VP-90) で追加予定"
"""

[tasks."mac:release"]
description = "Build, sign, notarize & package VantagePoint.app as DMG"
run = """
set -euo pipefail

TEAM_ID="3EQKG4B352"
SIGN_ID="Developer ID Application: Anycreative Inc. ($TEAM_ID)"
KEYCHAIN_PROFILE="vp-notarize"
VERSION=$(grep 'CFBundleShortVersionString' apple/VantagePoint/Resources/Info.plist -A1 | grep '<string>' | sed 's/.*<string>//;s/<\\/string>//')
ARCHIVE_PATH="/tmp/VantagePoint.xcarchive"
DMG_DIR="/tmp/vp-dmg"
DMG_PATH="dist/VantagePoint-${VERSION}.dmg"

echo "📦 Vantage Point v${VERSION} リリースビルド"
echo "==========================================="

# 1. Rust ライブラリビルド
echo ""
echo "🔨 [1/6] vp-bridge ビルド..."
cargo build --release -p vp-bridge

# 2. Xcode Archive
echo ""
echo "🔨 [2/6] Xcode Archive..."
rm -rf "$ARCHIVE_PATH"
cd apple/VantagePoint
xcodebuild archive \
  -scheme VantagePoint \
  -archivePath "$ARCHIVE_PATH" \
  -configuration Release \
  CODE_SIGN_IDENTITY="$SIGN_ID" \
  CODE_SIGN_STYLE=Manual \
  DEVELOPMENT_TEAM="$TEAM_ID" \
  ARCHS=arm64 \
  ONLY_ACTIVE_ARCH=YES \
  -quiet
cd ../..

# 3. 署名検証
echo ""
echo "🔏 [3/6] 署名検証..."
codesign -vvv "$ARCHIVE_PATH/Products/Applications/VantagePoint.app"

# 4. DMG 作成
echo ""
echo "📀 [4/6] DMG 作成..."
rm -rf "$DMG_DIR"
mkdir -p "$DMG_DIR" "dist"
cp -R "$ARCHIVE_PATH/Products/Applications/VantagePoint.app" "$DMG_DIR/"
ln -s /Applications "$DMG_DIR/Applications"
rm -f "$DMG_PATH"
hdiutil create -volname "Vantage Point" \
  -srcfolder "$DMG_DIR" \
  -ov -format UDZO \
  "$DMG_PATH"

# 5. DMG 署名 + Notarize
echo ""
echo "🔏 [5/6] DMG 署名 + Notarize..."
codesign --force --sign "$SIGN_ID" "$DMG_PATH"
xcrun notarytool submit "$DMG_PATH" --keychain-profile "$KEYCHAIN_PROFILE" --wait

# 6. Staple
echo ""
echo "📎 [6/6] Staple..."
xcrun stapler staple "$DMG_PATH"

# クリーンアップ
rm -rf "$DMG_DIR" "$ARCHIVE_PATH"

echo ""
echo "==========================================="
echo "✅ リリース完了: $DMG_PATH"
echo "   Version: $VERSION"
echo "   Signed:  $SIGN_ID"
echo "   Notarized + Stapled"
ls -lh "$DMG_PATH"
"""
