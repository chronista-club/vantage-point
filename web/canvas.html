        }

        // Lane モード用メッセージハンドラー
        function handleLaneMessage(data) {
            switch (data.type) {
                case 'lanes': {
                    // Lane 一覧の更新
                    for (const lane of data.lanes) {
                        laneState.lanes.set(lane.name, lane);
                    }
                    // 起動元プロジェクトが後から現れた場合も切り替え
                    if (!preferredLaneSwitched && PREFERRED_LANE) {
                        const preferred = data.lanes.find(l => l.name === PREFERRED_LANE);
                        if (preferred) {
                            preferredLaneSwitched = true;
                            switchLane(preferred.name);
                            renderLaneBar();
                            break;
                        }
                    }
                    // 初回: まだ Lane が未選択なら最初の Lane を自動選択
                    if (!laneState.activeLane && data.lanes.length > 0) {
                        switchLane(data.lanes[0].name);
                    }
                    renderLaneBar();
                    break;
                }
                case 'lane_status_changed': {
                    // Lane の接続状態変更
                    const existing = laneState.lanes.get(data.lane);
                    if (existing) {
                        existing.status = data.status;
                    } else {
                        laneState.lanes.set(data.lane, {
                            name: data.lane,
                            port: data.port,
                            status: data.status,
                        });
                    }
                    renderLaneBar();
                    break;
                }
                case 'lane_message': {
                    const laneName = data.lane;
                    if (laneName === laneState.activeLane) {
                        handleMessage(data.message);
                    } else {
                        // 非アクティブ Lane のメッセージをキューに蓄積
                        if (!laneState.messageQueues) laneState.messageQueues = {};
                        if (!laneState.messageQueues[laneName]) laneState.messageQueues[laneName] = [];
                        laneState.messageQueues[laneName].push(data.message);
                    }
                    break;
                }
                // Canvas レベルのメッセージ（Lane ラップなし）は直接 handleMessage に委譲
                case 'screenshot_request':
                case 'ping':
                    handleMessage(data);
                    break;
                default:
                    console.debug('Lane WS:', data.type, data);
            }
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'ping':
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'pong' }));
                    }
                    break;

                case 'show': {
                    const tabId = msg.tab_id || '_default';
                    const paneId = msg.pane_id || 'main';

                    // タブが存在しなければ作成
                    if (!tabState.tabs.has(tabId)) {
                        createTab(tabId, msg.tab_title || tabId);
                    } else if (msg.tab_title) {
                        // タイトル更新
                        tabState.tabs.get(tabId).title = msg.tab_title;
                        updateTabBar();
                    }

                    // ペイン作成 → タブ切替の順（empty-state フラッシュ防止）
                    const card = getOrCreatePane(paneId, msg.title, tabId);
                    switchToTab(tabId);

                    const body = card.querySelector('.pane-card-body');
                    if (body) renderContent(body, msg.content, msg.append || false);
                    break;
                }

                case 'clear': {
                    const tabId = msg.tab_id || '_default';
                    const paneId = msg.pane_id || 'main';
                    const tab = tabState.tabs.get(tabId);
                    if (tab) {
                        const card = tab.panes.get(paneId);
                        if (card) {
                            const body = card.querySelector('.pane-card-body');
                            if (body) body.textContent = '';
                        }
                    }
                    break;
                }

                case 'close': {
                    if (msg.tab_id && !msg.pane_id) {
                        // タブごと close
                        closeTab(msg.tab_id);
                    } else if (msg.pane_id) {
                        // ペイン close（tab_id 指定 or 全タブ検索）
                        if (msg.tab_id) {
                            const tab = tabState.tabs.get(msg.tab_id);
                            if (tab) removePaneFromTab(tab, msg.pane_id);
                        } else {
                            // 後方互換: 全タブから検索
                            for (const tab of tabState.tabs.values()) {
                                if (tab.panes.has(msg.pane_id)) {
                                    removePaneFromTab(tab, msg.pane_id);
                                    break;
                                }
                            }
                        }
                    }
                    break;
                }

                case 'split': {
                    const tabId = msg.tab_id || tabState.activeTab || '_default';
                    let tab = tabState.tabs.get(tabId);
                    if (!tab) {
                        createTab(tabId, tabId);
                        tab = tabState.tabs.get(tabId);
                    }

                    const sourcePaneId = msg.pane_id;
                    const direction = msg.direction;
                    const newPaneId = msg.new_pane_id;

                    if (!sourcePaneId || !newPaneId || !['horizontal', 'vertical'].includes(direction)) {
                        console.warn('split: 必須フィールドが不正です', msg);
                        break;
                    }

                    // ソースペインがまだなければ作成
                    if (!tab.panes.has(sourcePaneId)) {
                        const card = createPaneCard(sourcePaneId, sourcePaneId);
                        tab.panes.set(sourcePaneId, card);
                    }

                    // 新ペインカード作成
                    if (!tab.panes.has(newPaneId)) {
                        const card = createPaneCard(newPaneId, newPaneId);
                        tab.panes.set(newPaneId, card);
                    }

                    emptyState.style.display = 'none';

                    // ツリーにソースペインを組み込み、split ノードに置換
                    const sourceLeaf = { type: 'leaf', paneId: sourcePaneId };
                    const newLeaf = { type: 'leaf', paneId: newPaneId };

                    if (!tab.root) {
                        // ルートがない → split コンテナをルートに
                        tab.root = { type: 'split', direction, first: sourceLeaf, second: newLeaf, ratio: 0.5 };
                    } else if (!isInTree(tab.root, sourcePaneId)) {
                        // ソースがツリーにない → ルートを wrap
                        tab.root = { type: 'split', direction, first: tab.root, second: newLeaf, ratio: 0.5 };
                    } else {
                        // ソースがツリー内 → 該当 leaf を split に置換
                        tab.root = replaceLeafWithSplit(tab.root, sourcePaneId, direction, newPaneId);
                    }

                    renderTabLayout(tab);
                    break;
                }

                // スクリーンショットリクエスト（SVG foreignObject 方式）
                case 'screenshot_request':
                    (async () => {
                        const sendError = (errMsg) => {
                            ws.send(JSON.stringify({
                                type: 'screenshot_response',
                                request_id: msg.request_id,
                                data: '',
                                width: 0,
                                height: 0,
                            }));
                            console.error('Screenshot failed:', errMsg);
                        };
                        try {
                            // tab_id + pane_id → 特定タブの特定ペイン
                            // pane_id のみ → 全タブから検索（後方互換）
                            // 両方なし → アクティブタブ全体
                            let target;
                            if (msg.pane_id) {
                                if (msg.tab_id) {
                                    const tab = tabState.tabs.get(msg.tab_id);
                                    target = tab?.panes.get(msg.pane_id)?.querySelector('.pane-card-body');
                                } else {
                                    // 全タブから Map 検索（セレクタインジェクション防止）
                                    for (const tab of tabState.tabs.values()) {
                                        const card = tab.panes.get(msg.pane_id);
                                        if (card) {
                                            target = card.querySelector('.pane-card-body');
                                            break;
                                        }
                                    }
                                }
                            } else {
                                // pane_id なし → ウィンドウ全体をキャプチャ
                                target = document.body;
                            }
                            if (!target) {
                                sendError('Screenshot target not found: ' + msg.pane_id);
                                return;
                            }

                            // pane_id なし（全体キャプチャ）は window サイズを使用
                            const fullWindow = !msg.pane_id;
                            const rect = target.getBoundingClientRect();
                            const scale = 2;
                            const w = fullWindow ? window.innerWidth : Math.ceil(rect.width);
                            const h = fullWindow ? window.innerHeight : Math.ceil(rect.height);

                            // DOM clone + computed style 焼き付け
                            const clone = target.cloneNode(true);
                            function inlineStyles(src, dst) {
                                const cs = window.getComputedStyle(src);
                                for (const prop of cs) {
                                    try { dst.style.setProperty(prop, cs.getPropertyValue(prop)); } catch {}
                                }
                                for (let i = 0; i < src.children.length && i < dst.children.length; i++) {
                                    inlineStyles(src.children[i], dst.children[i]);
                                }
                            }
                            inlineStyles(target, clone);

                            // SVG foreignObject でキャプチャ
                            const svgNs = 'http://www.w3.org/2000/svg';
                            const xhtmlNs = 'http://www.w3.org/1999/xhtml';
                            const svg = document.createElementNS(svgNs, 'svg');
                            svg.setAttribute('width', w);
                            svg.setAttribute('height', h);
                            svg.setAttribute('xmlns', svgNs);
                            const fo = document.createElementNS(svgNs, 'foreignObject');
                            fo.setAttribute('width', '100%');
                            fo.setAttribute('height', '100%');
                            const wrapper = document.createElementNS(xhtmlNs, 'div');
                            wrapper.setAttribute('xmlns', xhtmlNs);
                            wrapper.style.width = w + 'px';
                            wrapper.style.height = h + 'px';
                            wrapper.style.overflow = 'hidden';
                            wrapper.appendChild(clone);
                            fo.appendChild(wrapper);
                            svg.appendChild(fo);

                            const svgData = new XMLSerializer().serializeToString(svg);
                            // data URI を使用（blob URL は WKWebView で onload が発火しない）
                            const dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);

                            // Promise でラップして img.onload/onerror を待つ
                            const result = await new Promise((resolve, reject) => {
                                const img = new Image();
                                img.onload = () => {
                                    const c = document.createElement('canvas');
                                    c.width = w * scale;
                                    c.height = h * scale;
                                    const ctx = c.getContext('2d');
                                    ctx.scale(scale, scale);
                                    ctx.drawImage(img, 0, 0);
                                    resolve({
                                        data: c.toDataURL('image/png').split(',')[1],
                                        width: c.width,
                                        height: c.height,
                                    });
                                };
                                img.onerror = (e) => {
                                    reject(new Error('SVG image rendering failed: ' + (e.message || 'unknown')));
                                };
                                img.src = dataUrl;
                            });

                            ws.send(JSON.stringify({
                                type: 'screenshot_response',
                                request_id: msg.request_id,
                                ...result,
                            }));
                        } catch (e) {
                            sendError(String(e));
                        }
                    })();
                    break;

                // ペイン表示/非表示トグル
                case 'toggle_pane': {
                    const paneId = msg.pane_id;
                    if (!paneId) break;

                    let targetTab = null;
                    if (msg.tab_id) {
                        targetTab = tabState.tabs.get(msg.tab_id);
                    } else {
                        // 後方互換: 全タブから検索
                        for (const tab of tabState.tabs.values()) {
                            if (tab.panes.has(paneId)) { targetTab = tab; break; }
                        }
                    }

                    if (!targetTab) break;
                    const card = targetTab.panes.get(paneId);
                    if (!card) break;

                    const shouldShow = msg.visible === undefined || msg.visible === null
                        ? card.style.display === 'none'
                        : msg.visible;
                    card.style.display = shouldShow ? '' : 'none';

                    // スプリットレイアウト内の場合は DOM を再構築してハンドルを整合させる
                    if (targetTab.root && isInTree(targetTab.root, paneId)) {
                        renderTabLayout(targetTab);
                    }
                    break;
                }

                // トレースログ → ログビュワーに追加
                case 'trace_log':
                    addLogEntry(msg);
                    break;

                // ターミナル系メッセージは無視
                case 'terminal_output':
                case 'terminal_ready':
                    break;

                default:
                    console.debug('Canvas WS:', msg.type, msg);
                    break;
            }
        }

        // ===== Canvas レイアウト永続化 =====
        const LAYOUT_SAVE_INTERVAL = 10000; // 10秒間隔で自動保存
        let layoutDirty = false;

        // レイアウト変更をマーク（実際の保存は定期バッチ）
        function markLayoutDirty() {
            layoutDirty = true;
        }

        // レイアウト状態を収集
        function collectLayoutState() {
            const layout = {
                activeLane: laneState.activeLane,
                laneMode: LANE_MODE,
                activeTab: tabState.activeTab,
                tabs: [],
            };

            // タブ一覧（ペインIDと分割構造）
            for (const [tabId, tab] of tabState.tabs) {
                const paneIds = [];
                for (const paneId of tab.panes.keys()) {
                    paneIds.push(paneId);
                }
                layout.tabs.push({
                    id: tabId,
                    title: tab.title,
                    paneIds,
                });
            }

            // Lane ごとのタブ状態
            if (LANE_MODE) {
                layout.laneTabStates = {};
                for (const [laneName, lts] of laneState.laneTabStates) {
                    const tabIds = [];
                    for (const [tid] of lts.tabs) {
                        tabIds.push(tid);
                    }
                    layout.laneTabStates[laneName] = {
                        activeTab: lts.activeTab,
                        tabIds,
                    };
                }
            }

            return layout;
        }

        // レイアウト保存（POST /api/canvas/layout）
        async function saveLayout() {
            if (!layoutDirty) return;
            layoutDirty = false;

            try {
                const layout = collectLayoutState();
                await fetch(`/api/canvas/layout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(layout),
                });
            } catch (e) {
                console.debug('Layout save failed:', e);
            }
        }

        // 定期保存タイマー
        setInterval(saveLayout, LAYOUT_SAVE_INTERVAL);

        // ページ離脱時に最終保存
        window.addEventListener('beforeunload', () => {
            if (layoutDirty) {
                const layout = collectLayoutState();
                // sendBeacon で確実に送信
                navigator.sendBeacon(
                    `/api/canvas/layout`,
                    new Blob([JSON.stringify(layout)], { type: 'application/json' })
                );
            }
        });

        // Lane モード時の初期ローディング表示
        if (LANE_MODE) {
            const loadingDiv = document.createElement('div');
            loadingDiv.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:14px;';
            loadingDiv.textContent = 'Connecting to processes...';
            document.getElementById('canvas-content').appendChild(loadingDiv);
        }

        connect();
    </script>
</body>
</html>
