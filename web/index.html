<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Point</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Header ===== */
        .header {
            background: #16213e;
            padding: 8px 16px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 44px;
        }
        .header h1 {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            color: #e94560;
            cursor: pointer;
        }
        .header h1:hover {
            color: #ff6b6b;
        }
        .header h1 svg {
            width: 24px;
            height: 24px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status {
            font-size: 12px;
            color: #888;
        }
        .status.connected {
            color: #4ade80;
        }
        .status.disconnected {
            color: #f87171;
        }
        .project-name {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
            padding: 4px 10px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 4px;
            display: none;
        }
        .project-name.visible {
            display: inline-block;
        }
        .debug-indicator {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            display: none;
        }
        .debug-indicator.visible {
            display: inline-block;
        }
        .debug-indicator.simple {
            background: #3b82f6;
            color: white;
        }

        /* Panel Toggle Buttons */
        .panel-toggle {
            background: transparent;
            border: 1px solid #0f3460;
            color: #888;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .panel-toggle:hover {
            background: #0f3460;
            color: #eee;
        }
        .panel-toggle.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        .panel-toggle svg {
            width: 16px;
            height: 16px;
        }

        /* ===== Main Container ===== */
        .main-container {
            display: flex;
            height: calc(100vh - 44px);
        }

        /* ===== Side Panels ===== */
        .side-panel {
            width: 300px;
            min-width: 200px;
            max-width: 500px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            transition: width 0.2s, margin 0.2s;
            overflow: hidden;
        }
        .side-panel.right {
            border-right: none;
            border-left: 1px solid #0f3460;
        }
        .side-panel.collapsed {
            width: 0;
            min-width: 0;
            border: none;
        }
        .side-panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid #0f3460;
            font-weight: 500;
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .side-panel-content {
            flex: 1;
            overflow: auto;
            padding: 12px;
        }

        /* Resize Handle */
        .resize-handle {
            width: 4px;
            background: transparent;
            cursor: col-resize;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .resize-handle:hover,
        .resize-handle.dragging {
            background: #667eea;
        }

        /* ===== Center Panel (Chat) ===== */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 400px;
            background: #1a1a2e;
            overflow: hidden;
        }

        /* ===== New Chat Layout ===== */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }

        /* Context Area - 入力欄の上（自動切替） */
        .response-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            padding: 16px 0;
            min-height: 100px;
            position: relative;
        }

        /* Context Mode Indicator */
        .context-mode-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(22, 33, 62, 0.8);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #8b949e;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .context-mode-bar.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .context-mode-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8b949e;
            animation: pulse-soft 2s infinite;
        }
        .context-mode-indicator.thinking { background: #3b82f6; }
        .context-mode-indicator.responding { background: #22c55e; }
        .context-mode-indicator.permission { background: #f59e0b; }
        .context-mode-indicator.prompt { background: #6366f1; }
        .context-mode-indicator.todo { background: #06b6d4; }
        .context-mode-indicator.idle { background: #64748b; animation: none; }

        .context-mode-label {
            font-weight: 500;
        }
        .context-mode-detail {
            color: #64748b;
            margin-left: auto;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Context Content Stack */
        .context-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow: hidden;
            justify-content: flex-end;
        }
        .context-item {
            animation: contextSlideIn 0.25s ease-out;
        }
        .context-item.exiting {
            animation: contextSlideOut 0.2s ease-in forwards;
        }
        @keyframes contextSlideIn {
            from { opacity: 0; transform: translateY(-15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes contextSlideOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(10px) scale(0.98); }
        }
        .current-response {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            animation: slideDown 0.3s ease-out;
            max-height: 100%;
            overflow-y: auto;
        }
        .current-response.empty {
            display: none;
        }
        .current-response .content {
            line-height: 1.6;
            font-size: 14px;
        }
        .current-response .content p {
            margin: 0.3em 0;
        }
        .current-response .content code {
            background: #0f3460;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 13px;
        }
        .current-response .content pre {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .current-response .content pre code {
            background: none;
            padding: 0;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* System message in response area */
        .system-message {
            text-align: center;
            color: #666;
            font-size: 13px;
            padding: 8px;
        }

        /* Input Area - ドラッグ可能 */
        .input-area {
            padding: 16px 0;
            border-top: 1px solid #0f3460;
            border-bottom: 1px solid #0f3460;
            background: #16213e;
            margin: 0 -16px;
            padding-left: 16px;
            padding-right: 16px;
            position: relative;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .input-area.dragging {
            opacity: 0.9;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }
        .drag-handle {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 12px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .drag-handle:hover {
            opacity: 0.8;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .drag-handle::before {
            content: '';
            width: 30px;
            height: 4px;
            background: #667eea;
            border-radius: 2px;
        }
        .drop-zone {
            position: relative;
        }
        .drop-zone.drag-over::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: #667eea;
            border-radius: 2px;
            z-index: 10;
        }
        .drop-zone.drag-over-top::before {
            top: 0;
        }
        .drop-zone.drag-over-bottom::before {
            bottom: 0;
        }
        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            background: #1a1a2e;
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid #0f3460;
        }
        .chat-input-wrapper:focus-within {
            border-color: #667eea;
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #eee;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            font-family: inherit;
        }
        .chat-input::placeholder {
            color: #666;
        }
        .chat-send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .chat-send-btn:hover {
            opacity: 0.9;
        }
        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chat-send-btn svg {
            width: 16px;
            height: 16px;
        }
        .chat-cancel-btn {
            background: #dc2626;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .chat-cancel-btn.visible {
            display: flex;
        }
        .chat-cancel-btn svg {
            width: 16px;
            height: 16px;
        }

        /* History Area - 入力欄の下 */
        .history-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .history-message {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.3s ease-out;
        }
        .history-message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #fff;
            max-width: 85%;
        }
        .history-message.assistant {
            background: #1e293b;
            color: #e0e0e0;
            border: 1px solid #334155;
            opacity: 0.85;
        }
        .history-message.assistant .content {
            line-height: 1.6;
        }
        .history-message.assistant .content p {
            margin: 0.3em 0;
        }
        .history-message.assistant .content code {
            background: #0f3460;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 13px;
        }
        .history-message.assistant .content pre {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .history-message.assistant .content pre code {
            background: none;
            padding: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.85; }
        }

        /* ===== Chat Components ===== */
        .chat-component {
            margin: 8px 0;
            border-radius: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            overflow: hidden;
        }
        .chat-component.permission-request {
            border-color: #f59e0b;
        }
        .chat-component-header {
            padding: 12px 16px;
            background: rgba(245, 158, 11, 0.1);
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-component-header .icon {
            font-size: 18px;
        }
        .chat-component-header .title {
            font-weight: 500;
            color: #f59e0b;
        }
        .chat-component-header .tool-name {
            color: #94a3b8;
            font-size: 12px;
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
        }
        .chat-component-body {
            padding: 16px;
        }
        .chat-component-body .input-preview {
            background: #0f172a;
            border-radius: 6px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
            margin-bottom: 16px;
            color: #94a3b8;
        }
        .chat-component-body .input-preview pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .chat-component-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .chat-component-btn {
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .chat-component-btn.approve {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
        .chat-component-btn.approve:hover {
            filter: brightness(1.1);
        }
        .chat-component-btn.deny {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
        }
        .chat-component-btn.deny:hover {
            background: #dc2626;
            border-color: #dc2626;
            color: white;
        }
        .chat-component-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chat-component-timeout {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin-top: 12px;
        }
        .chat-component.resolved {
            opacity: 0.6;
            pointer-events: none;
        }
        .chat-component.resolved .chat-component-actions {
            display: none;
        }
        .chat-component.resolved::after {
            content: attr(data-resolution);
            display: block;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: #64748b;
            background: rgba(0,0,0,0.2);
        }

        /* Todo List Component */
        .chat-component.todo-list {
            border-color: #3b82f6;
        }
        .chat-component.todo-list .chat-component-header {
            background: rgba(59, 130, 246, 0.1);
        }
        .chat-component.todo-list .chat-component-header .title {
            color: #3b82f6;
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
        }
        .todo-item:last-child {
            border-bottom: none;
        }
        .todo-item .status-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .todo-item.pending .status-icon {
            border: 2px solid #475569;
        }
        .todo-item.in_progress .status-icon {
            background: #3b82f6;
            animation: pulse 1.5s infinite;
        }
        .todo-item.completed .status-icon {
            background: #22c55e;
        }
        .todo-item .content {
            flex: 1;
            color: #e2e8f0;
        }
        .todo-item.completed .content {
            text-decoration: line-through;
            color: #64748b;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* User Prompt Component */
        .chat-component.user-prompt {
            border-color: #6366f1;
        }
        .chat-component.user-prompt .chat-component-header {
            background: rgba(99, 102, 241, 0.1);
        }
        .chat-component.user-prompt .chat-component-header .title {
            color: #6366f1;
        }
        .prompt-description {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .prompt-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            color: #e2e8f0;
            margin-bottom: 16px;
        }
        .prompt-input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .chat-component-btn.submit {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        /* ===== Right Panel - Debug/Activity ===== */
        .debug-content {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
        }
        .debug-entry {
            padding: 4px 0;
            color: #8b949e;
            display: flex;
            flex-direction: column;
            gap: 2px;
            border-bottom: 1px solid #21262d;
        }
        .debug-entry .meta {
            display: flex;
            gap: 8px;
        }
        .debug-entry .timestamp {
            color: #6e7681;
        }
        .debug-entry .category {
            color: #58a6ff;
        }
        .debug-entry .message {
            color: #c9d1d9;
        }
        .debug-entry.error .category {
            color: #f85149;
        }
        .debug-entry .data {
            color: #7ee787;
            word-break: break-all;
            font-size: 10px;
        }

        /* ===== Left Panel - Content/Show ===== */
        .content-pane {
            padding: 16px;
        }
        .content-pane .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .content-pane .welcome h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #888;
        }
        .pane-content h1, .pane-content h2, .pane-content h3 {
            margin: 1em 0 0.5em;
            color: #fff;
        }
        .pane-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }
        .pane-content code {
            background: #0f3460;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        .pane-content pre {
            background: #0f3460;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1em 0;
        }
        .pane-content pre code {
            background: none;
            padding: 0;
        }
        .pane-content img {
            max-width: 100%;
            border-radius: 8px;
        }

        /* Typing indicator */
        .typing-indicator {
            color: #888;
            font-size: 14px;
            padding: 8px 0;
        }
        .typing-indicator::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            .side-panel {
                position: absolute;
                z-index: 100;
                height: calc(100vh - 44px);
            }
            .side-panel.left {
                left: 0;
            }
            .side-panel.right {
                right: 0;
            }
            .chat-container {
                padding: 0 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button id="toggle-left-panel" class="panel-toggle" title="Toggle Left Panel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
            </button>
            <h1 id="header-title" title="Vantage Point">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 22H22L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 2L8 10L12 8L16 10L12 2Z" fill="currentColor" opacity="0.3"/>
                    <circle cx="12" cy="6" r="2" fill="currentColor"/>
                </svg>
            </h1>
            <span id="project-name" class="project-name"></span>
            <span id="status" class="status disconnected">Disconnected</span>
            <span id="debug-indicator" class="debug-indicator"></span>
        </div>
        <div class="header-center">
        </div>
        <div class="header-right">
            <button id="toggle-right-panel" class="panel-toggle" title="Toggle Debug Panel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="15" y1="3" x2="15" y2="21"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="main-container">
        <!-- Left Panel - Content/Show -->
        <div id="left-panel" class="side-panel left collapsed">
            <div class="side-panel-header">
                <span>Content</span>
            </div>
            <div class="side-panel-content">
                <div id="pane-main" class="content-pane">
                    <div class="pane-content">
                        <div class="welcome">
                            <h2>Vantage Point</h2>
                            <p>Waiting for content...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="resize-left" class="resize-handle" style="display: none;"></div>

        <!-- Center Panel - Chat -->
        <div class="center-panel">
            <div id="chat-container" class="chat-container">
                <!-- Context Area - 自動切替コンテキスト表示 -->
                <div id="response-area" class="response-area drop-zone" data-position="0">
                    <!-- Mode Indicator Bar -->
                    <div id="context-mode-bar" class="context-mode-bar">
                        <div id="context-mode-indicator" class="context-mode-indicator idle"></div>
                        <span id="context-mode-label" class="context-mode-label">待機中</span>
                        <span id="context-mode-detail" class="context-mode-detail"></span>
                    </div>
                    <!-- Context Stack -->
                    <div id="context-stack" class="context-stack">
                        <div id="current-response" class="current-response empty context-item">
                            <div class="content"></div>
                        </div>
                        <div id="typing-indicator" class="typing-indicator context-item" style="display: none;">
                            Stand is thinking
                        </div>
                    </div>
                </div>

                <!-- Input Area - ドラッグ可能 -->
                <div id="input-area" class="input-area" draggable="true" data-position="1">
                    <div class="drag-handle" title="Drag to reorder"></div>
                    <div class="chat-input-wrapper">
                        <textarea
                            id="chat-input"
                            class="chat-input"
                            placeholder="Message the Stand..."
                            rows="1"
                            autofocus
                        ></textarea>
                        <button id="chat-cancel-btn" class="chat-cancel-btn" title="Cancel Request">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 6l12 12M6 18L18 6"/>
                            </svg>
                        </button>
                        <button id="chat-send-btn" class="chat-send-btn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- History Area - 過去のメッセージ -->
                <div id="history-area" class="history-area drop-zone" data-position="2">
                    <div class="system-message">Connected to Stand</div>
                </div>
            </div>
        </div>

        <div id="resize-right" class="resize-handle" style="display: none;"></div>

        <!-- Right Panel - Debug/Activity -->
        <div id="right-panel" class="side-panel right collapsed">
            <div class="side-panel-header">
                <span>Debug Log</span>
                <button id="debug-clear-btn" class="header-btn" style="margin-left: auto;">Clear</button>
            </div>
            <div class="side-panel-content debug-content">
                <div id="debug-entries"></div>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${location.host}/ws`;
        let ws = null;
        let reconnectTimer = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_DELAY = 30000;
        let isStreaming = false;
        let currentStreamContent = '';

        // AG-UI state tracking
        let agUiMessages = new Map(); // message_id → { role, content }
        let agUiCurrentRunId = null;
        let agUiActivities = new Map(); // activity_id → activity
        let debugMode = 'none';
        let isComposing = false;
        let justFinishedComposing = false;

        // Elements
        const currentResponse = document.getElementById('current-response');
        const currentResponseContent = currentResponse.querySelector('.content');
        const typingIndicator = document.getElementById('typing-indicator');
        const historyArea = document.getElementById('history-area');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const chatCancelBtn = document.getElementById('chat-cancel-btn');
        const debugEntries = document.getElementById('debug-entries');
        const debugClearBtn = document.getElementById('debug-clear-btn');
        const debugIndicator = document.getElementById('debug-indicator');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const toggleLeftBtn = document.getElementById('toggle-left-panel');
        const toggleRightBtn = document.getElementById('toggle-right-panel');
        const resizeLeft = document.getElementById('resize-left');
        const resizeRight = document.getElementById('resize-right');

        // Context Mode Elements
        const contextModeBar = document.getElementById('context-mode-bar');
        const contextModeIndicator = document.getElementById('context-mode-indicator');
        const contextModeLabel = document.getElementById('context-mode-label');
        const contextModeDetail = document.getElementById('context-mode-detail');
        const contextStack = document.getElementById('context-stack');

        // Panel Toggle Functions
        function toggleLeftPanel() {
            leftPanel.classList.toggle('collapsed');
            toggleLeftBtn.classList.toggle('active');
            resizeLeft.style.display = leftPanel.classList.contains('collapsed') ? 'none' : 'block';
        }

        function toggleRightPanel() {
            rightPanel.classList.toggle('collapsed');
            toggleRightBtn.classList.toggle('active');
            resizeRight.style.display = rightPanel.classList.contains('collapsed') ? 'none' : 'block';
        }

        toggleLeftBtn.addEventListener('click', toggleLeftPanel);
        toggleRightBtn.addEventListener('click', toggleRightPanel);

        // ===== Context Mode Management =====
        // モード定義（優先度順: 高い数字 = 高優先度）
        const CONTEXT_MODES = {
            idle: { priority: 0, label: '待機中', color: 'idle' },
            thinking: { priority: 10, label: '考え中', color: 'thinking' },
            responding: { priority: 20, label: '返答中', color: 'responding' },
            todo: { priority: 30, label: 'タスク進行中', color: 'todo' },
            prompt: { priority: 40, label: '入力待ち', color: 'prompt' },
            permission: { priority: 50, label: '許可待ち', color: 'permission' }
        };

        let currentContextMode = 'idle';
        let activeContextItems = new Set(); // 現在アクティブなコンテキストアイテムのID

        function setContextMode(mode, detail = '') {
            const modeConfig = CONTEXT_MODES[mode] || CONTEXT_MODES.idle;
            currentContextMode = mode;

            // Update indicator
            contextModeIndicator.className = `context-mode-indicator ${modeConfig.color}`;
            contextModeLabel.textContent = modeConfig.label;
            contextModeDetail.textContent = detail;

            // Show/hide mode bar
            if (mode === 'idle' && activeContextItems.size === 0) {
                contextModeBar.classList.remove('visible');
            } else {
                contextModeBar.classList.add('visible');
            }
        }

        function updateContextModeFromState() {
            // 優先度に基づいてモードを決定
            let highestPriority = 0;
            let selectedMode = 'idle';
            let detail = '';

            // Permission request check
            const pendingPermission = document.querySelector('.chat-component.permission-request:not(.resolved)');
            if (pendingPermission) {
                const toolName = pendingPermission.querySelector('.tool-name')?.textContent || '';
                setContextMode('permission', toolName);
                return;
            }

            // User prompt check
            const pendingPrompt = document.querySelector('.chat-component.user-prompt:not(.resolved)');
            if (pendingPrompt) {
                const title = pendingPrompt.querySelector('.title')?.textContent || '';
                setContextMode('prompt', title);
                return;
            }

            // Todo list check
            const todoList = document.querySelector('.chat-component.todo-list');
            if (todoList) {
                const inProgress = todoList.querySelectorAll('.todo-item.in_progress').length;
                if (inProgress > 0) {
                    setContextMode('todo', `${inProgress}件実行中`);
                    return;
                }
            }

            // Streaming/Responding check
            if (isStreaming) {
                setContextMode('responding');
                return;
            }

            // Thinking check
            if (typingIndicator.style.display !== 'none') {
                setContextMode('thinking');
                return;
            }

            // Default to idle
            setContextMode('idle');
        }

        // コンテキストアイテムの追加（アニメーション付き）
        function addContextItem(element, id) {
            if (id) activeContextItems.add(id);
            element.classList.add('context-item');
            element.classList.remove('exiting');
            updateContextModeFromState();
        }

        // コンテキストアイテムの削除（アニメーション付き）
        function removeContextItem(element, id) {
            if (id) activeContextItems.delete(id);
            element.classList.add('exiting');
            setTimeout(() => {
                if (element.classList.contains('exiting')) {
                    element.style.display = 'none';
                    element.classList.remove('exiting');
                }
                updateContextModeFromState();
            }, 200);
        }

        // Resize functionality
        let isResizing = null;

        function startResize(panel, handle, e) {
            isResizing = { panel, handle, startX: e.clientX, startWidth: panel.offsetWidth };
            handle.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        }

        resizeLeft.addEventListener('mousedown', (e) => startResize(leftPanel, resizeLeft, e));
        resizeRight.addEventListener('mousedown', (e) => startResize(rightPanel, resizeRight, e));

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const { panel, startX, startWidth } = isResizing;
            const isLeft = panel === leftPanel;
            const delta = isLeft ? (e.clientX - startX) : (startX - e.clientX);
            const newWidth = Math.max(200, Math.min(500, startWidth + delta));
            panel.style.width = newWidth + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing.handle.classList.remove('dragging');
                isResizing = null;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = async () => {
                console.log('Connected to vpa');
                reconnectAttempts = 0;
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status connected';
                chatSendBtn.disabled = false;
                ws.send(JSON.stringify({ type: 'ready' }));

                try {
                    const response = await fetch('/api/health');
                    const health = await response.json();
                    if (health.project_dir) {
                        const projectName = health.project_dir.split('/').pop();
                        const projectNameEl = document.getElementById('project-name');
                        projectNameEl.textContent = projectName;
                        projectNameEl.classList.add('visible');
                        document.title = `${projectName} - Vantage Point`;

                        // Update Stand name in UI elements
                        document.getElementById('typing-indicator').textContent = `${projectName} is thinking`;
                        document.querySelector('.history-area .system-message').textContent = `Connected to ${projectName}`;
                        document.getElementById('chat-input').placeholder = `Message ${projectName}...`;
                    }
                } catch (e) {
                    console.log('Could not fetch project info:', e);
                }

                // Auto focus input
                chatInput.focus();
            };

            ws.onclose = () => {
                console.log('Disconnected from vpa');
                document.getElementById('status').className = 'status disconnected';
                chatSendBtn.disabled = true;

                reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), MAX_RECONNECT_DELAY);
                document.getElementById('status').textContent = `Reconnecting in ${Math.round(delay/1000)}s...`;

                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, delay);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        function handleMessage(msg) {
            console.log('Received:', msg);

            switch (msg.type) {
                case 'show':
                    showContent(msg.pane_id || 'main', msg.content, msg.append);
                    if (leftPanel.classList.contains('collapsed')) {
                        toggleLeftPanel();
                    }
                    break;
                case 'clear':
                    clearPane(msg.pane_id || 'main');
                    break;
                case 'toggle_pane':
                    handleTogglePane(msg.pane_id, msg.visible);
                    break;
                case 'ping':
                    ws.send(JSON.stringify({ type: 'pong' }));
                    break;
                case 'chat_message':
                    addChatMessage(msg.message.role, msg.message.content);
                    break;
                case 'chat_chunk':
                    handleChatChunk(msg.content, msg.done);
                    break;
                case 'debug_info':
                    handleDebugInfo(msg);
                    break;
                case 'debug_mode_changed':
                    setDebugMode(msg.mode);
                    break;
                case 'chat_component':
                    renderChatComponent(msg.component, msg.interactive);
                    break;
                case 'component_dismissed':
                    dismissComponent(msg.request_id);
                    break;
                case 'ag_ui':
                    handleAgUiEvent(msg.event);
                    break;
            }
        }

        // AG-UI Event Handler
        function handleAgUiEvent(event) {
            console.log('AG-UI Event:', event.type, event);
            switch (event.type) {
                // === Lifecycle Events ===
                case 'RUN_STARTED':
                    agUiCurrentRunId = event.run_id;
                    addDebugEntry('lifecycle', `Run started: ${event.run_id}`, 'running');
                    showTypingIndicator();
                    break;

                case 'RUN_FINISHED':
                    addDebugEntry('lifecycle', `Run finished: ${event.run_id}`, 'done');
                    hideTypingIndicator();
                    agUiCurrentRunId = null;
                    agUiMessages.clear();
                    break;

                case 'RUN_ERROR':
                    addDebugEntry('lifecycle', `Run error: ${event.error?.message || 'Unknown error'}`, 'error');
                    hideTypingIndicator();
                    if (event.error?.message) {
                        addToHistory('assistant', `⚠️ Error: ${event.error.message}`);
                    }
                    agUiCurrentRunId = null;
                    break;

                // === Text Message Events ===
                case 'TEXT_MESSAGE_START':
                    agUiMessages.set(event.message_id, { role: event.role, content: '' });
                    if (event.role === 'assistant') {
                        // Start streaming display
                        if (!isStreaming) {
                            isStreaming = true;
                            currentStreamContent = '';
                            chatCancelBtn.classList.add('visible');
                            currentResponse.classList.remove('empty');
                            updateContextModeFromState();
                        }
                    }
                    addDebugEntry('message', `Message start: ${event.message_id} (${event.role})`, 'running');
                    break;

                case 'TEXT_MESSAGE_CONTENT':
                    const msg = agUiMessages.get(event.message_id);
                    if (msg) {
                        msg.content += event.delta;
                        if (msg.role === 'assistant') {
                            currentStreamContent += event.delta;
                            currentResponseContent.innerHTML = marked.parse(currentStreamContent);
                        }
                    }
                    break;

                case 'TEXT_MESSAGE_END':
                    const endMsg = agUiMessages.get(event.message_id);
                    if (endMsg && endMsg.role === 'assistant' && currentStreamContent) {
                        // Move to history
                        addToHistory('assistant', currentStreamContent);
                        // Clear response area
                        currentResponse.classList.add('exiting');
                        setTimeout(() => {
                            currentResponse.classList.add('empty');
                            currentResponse.classList.remove('exiting');
                            currentResponseContent.innerHTML = '';
                        }, 200);
                        isStreaming = false;
                        currentStreamContent = '';
                        chatCancelBtn.classList.remove('visible');
                        updateContextModeFromState();
                    }
                    agUiMessages.delete(event.message_id);
                    addDebugEntry('message', `Message end: ${event.message_id}`, 'done');
                    break;

                // === Tool Call Events ===
                case 'TOOL_CALL_START':
                    addDebugEntry('tool', `Tool: ${event.tool_name}`, 'running');
                    break;

                case 'TOOL_CALL_END':
                    const status = event.error ? 'error' : 'done';
                    const result = event.error || (event.result ? JSON.stringify(event.result).substring(0, 100) : 'OK');
                    addDebugEntry('tool', `Tool ${event.tool_call_id}: ${result}`, status);
                    break;

                // === User Prompt Events ===
                case 'USER_PROMPT':
                    renderUserPrompt(event, true);
                    break;

                // === Activity Events ===
                case 'ACTIVITY_SNAPSHOT':
                    agUiActivities.clear();
                    if (event.activities) {
                        event.activities.forEach(a => agUiActivities.set(a.id, a));
                    }
                    renderActivities();
                    break;

                case 'ACTIVITY_DELTA':
                    if (event.upsert) {
                        event.upsert.forEach(a => agUiActivities.set(a.id, a));
                    }
                    if (event.remove) {
                        event.remove.forEach(id => agUiActivities.delete(id));
                    }
                    renderActivities();
                    break;

                // === State Sync Events ===
                case 'STATE_SNAPSHOT':
                    addDebugEntry('state', 'State snapshot received', 'info');
                    break;

                case 'STATE_DELTA':
                    addDebugEntry('state', `State delta: ${event.delta?.length || 0} ops`, 'info');
                    break;

                // === Custom Events ===
                case 'CUSTOM':
                    addDebugEntry('custom', `${event.name}: ${JSON.stringify(event.data).substring(0, 50)}`, 'info');
                    break;

                default:
                    addDebugEntry('agui', `Unknown event: ${event.type}`, 'info');
            }
        }

        // Render activity list in debug panel
        function renderActivities() {
            if (agUiActivities.size === 0) return;

            const activities = Array.from(agUiActivities.values());
            activities.forEach(a => {
                const statusEmoji = {
                    'pending': '⏳',
                    'running': '🔄',
                    'completed': '✅',
                    'error': '❌',
                    'cancelled': '🚫'
                }[a.status] || '❓';

                const progress = a.progress ? ` (${a.progress.current}/${a.progress.total})` : '';
                addDebugEntry('activity', `${statusEmoji} ${a.label}${progress}`, a.status);
            });
        }

        function addDebugEntry(category, message, status) {
            const entry = document.createElement('div');
            entry.className = 'debug-entry';
            const timestamp = new Date().toLocaleTimeString('ja-JP', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            entry.innerHTML = `
                <div class="meta">
                    <span class="timestamp">${timestamp}</span>
                    <span class="category">[${category}]</span>
                    <span class="message">${escapeHtml(message)}</span>
                </div>
            `;
            debugEntries.appendChild(entry);
            debugEntries.scrollTop = debugEntries.scrollHeight;
        }

        function renderChatComponent(component, interactive) {
            switch (component.component) {
                case 'permission_request':
                    renderPermissionRequest(component, interactive);
                    break;
                case 'todo_list':
                    renderTodoList(component);
                    break;
                case 'tool_execution':
                    addDebugEntry('tool', `Executing: ${component.tool_name || 'unknown'}`, 'running');
                    break;
            }
        }

        function renderPermissionRequest(data, interactive) {
            const { request_id, tool_name, description, input, timeout_seconds } = data;
            const componentEl = document.createElement('div');
            componentEl.className = 'chat-component permission-request';
            componentEl.id = `component-${request_id}`;
            componentEl.dataset.requestId = request_id;
            const inputStr = typeof input === 'object' ? JSON.stringify(input, null, 2) : String(input);
            componentEl.innerHTML = `
                <div class="chat-component-header">
                    <span class="icon">🔐</span>
                    <span class="title">Permission Request</span>
                    <span class="tool-name">${escapeHtml(tool_name)}</span>
                </div>
                <div class="chat-component-body">
                    ${description ? `<p style="margin-bottom: 12px; color: #94a3b8;">${escapeHtml(description)}</p>` : ''}
                    <div class="input-preview">
                        <pre>${escapeHtml(inputStr)}</pre>
                    </div>
                    ${interactive ? `
                    <div class="chat-component-actions">
                        <button class="chat-component-btn deny" onclick="handlePermissionDeny('${request_id}')">Deny</button>
                        <button class="chat-component-btn approve" onclick="handlePermissionApprove('${request_id}')">Allow</button>
                    </div>
                    <div class="chat-component-timeout">Timeout in ${timeout_seconds}s</div>
                    ` : ''}
                </div>
            `;
            // Show in context stack (above input)
            componentEl.classList.add('context-item');
            contextStack.appendChild(componentEl);
            currentResponse.classList.add('empty'); // Hide default response area
            addContextItem(componentEl, request_id);

            if (interactive && timeout_seconds > 0) {
                startTimeoutCountdown(request_id, timeout_seconds);
            }
            updateContextModeFromState();
        }

        function renderTodoList(data) {
            const { items, title } = data;
            let componentEl = document.querySelector('.chat-component.todo-list');
            const isNew = !componentEl;
            if (!componentEl) {
                componentEl = document.createElement('div');
                componentEl.className = 'chat-component todo-list context-item';
                // Show in context stack
                contextStack.appendChild(componentEl);
            }
            const itemsHtml = items.map(item => `
                <div class="todo-item ${item.status}">
                    <div class="status-icon">${item.status === 'completed' ? '✓' : item.status === 'in_progress' ? '●' : ''}</div>
                    <span class="content">${escapeHtml(item.status === 'in_progress' && item.active_form ? item.active_form : item.content)}</span>
                </div>
            `).join('');
            componentEl.innerHTML = `
                <div class="chat-component-header">
                    <span class="icon">📋</span>
                    <span class="title">${title || 'Tasks'}</span>
                </div>
                <div class="chat-component-body">${itemsHtml}</div>
            `;
            if (isNew) addContextItem(componentEl, 'todo-list');
            updateContextModeFromState();
        }

        function renderUserPrompt(event, interactive) {
            const { request_id, prompt_type, title, description, options, default_value, timeout_seconds } = event;
            const componentEl = document.createElement('div');
            componentEl.className = `chat-component user-prompt prompt-${prompt_type}`;
            componentEl.id = `component-${request_id}`;
            componentEl.dataset.requestId = request_id;
            const icon = { 'confirm': '❓', 'input': '✏️', 'select': '📋', 'multi_select': '☑️' }[prompt_type] || '💬';
            let bodyContent = description ? `<p class="prompt-description">${escapeHtml(description)}</p>` : '';

            switch (prompt_type) {
                case 'confirm':
                    bodyContent += `
                        <div class="chat-component-actions">
                            <button class="chat-component-btn deny" onclick="handleUserPromptResponse('${request_id}', 'rejected')">No</button>
                            <button class="chat-component-btn approve" onclick="handleUserPromptResponse('${request_id}', 'approved')">Yes</button>
                        </div>
                    `;
                    break;
                case 'input':
                    bodyContent += `
                        <input type="text" id="prompt-input-${request_id}" class="prompt-input" placeholder="Type your response..." value="${default_value || ''}" onkeydown="if(event.key==='Enter') handleUserPromptInputSubmit('${request_id}')">
                        <div class="chat-component-actions">
                            <button class="chat-component-btn submit" onclick="handleUserPromptInputSubmit('${request_id}')">Submit</button>
                        </div>
                    `;
                    break;
                case 'select':
                    if (options && options.length > 0) {
                        bodyContent += options.map(opt => `
                            <button class="chat-component-btn" style="margin: 4px;" onclick="handleUserPromptSelect('${request_id}', '${opt.id}')">
                                ${escapeHtml(opt.label)}
                            </button>
                        `).join('');
                    }
                    break;
            }

            componentEl.innerHTML = `
                <div class="chat-component-header">
                    <span class="icon">${icon}</span>
                    <span class="title">${escapeHtml(title)}</span>
                </div>
                <div class="chat-component-body">
                    ${bodyContent}
                    ${interactive ? `<div class="chat-component-timeout">Timeout in ${timeout_seconds || 300}s</div>` : ''}
                </div>
            `;
            // コンテキストスタックに追加
            contextStack.insertBefore(componentEl, contextStack.firstChild);
            addContextItem(componentEl, `prompt-${request_id}`);
            updateContextModeFromState();
        }

        function handleUserPromptResponse(requestId, outcome, message, selectedOptions) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({
                type: 'component_action',
                action: { action: 'user_prompt_submit', request_id: requestId, outcome, message: message || null, selected_options: selectedOptions || null }
            }));
            const componentEl = document.getElementById(`component-${requestId}`);
            if (componentEl) {
                componentEl.classList.add('resolved');
                componentEl.dataset.resolution = outcome === 'approved' ? '✓ Submitted' : '✗ Cancelled';
                // コンテキストスタックから削除（アニメーション付き）
                setTimeout(() => {
                    removeContextItem(componentEl, `prompt-${requestId}`);
                    setTimeout(() => componentEl.remove(), 300);
                }, 500);
            }
        }

        function handleUserPromptInputSubmit(requestId) {
            const inputEl = document.getElementById(`prompt-input-${requestId}`);
            handleUserPromptResponse(requestId, 'approved', inputEl ? inputEl.value.trim() : '', null);
        }

        function handleUserPromptSelect(requestId, optionId) {
            handleUserPromptResponse(requestId, 'approved', null, [optionId]);
        }

        function startTimeoutCountdown(requestId, timeoutSeconds) {
            let remaining = timeoutSeconds;
            const componentEl = document.getElementById(`component-${requestId}`);
            if (!componentEl) return;
            const timeoutEl = componentEl.querySelector('.chat-component-timeout');
            if (!timeoutEl) return;
            const interval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(interval);
                    timeoutEl.textContent = 'Timed out';
                    handlePermissionDeny(requestId);
                } else {
                    timeoutEl.textContent = `Timeout in ${remaining}s`;
                }
            }, 1000);
            componentEl.dataset.intervalId = interval;
        }

        function handlePermissionApprove(requestId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'component_action', action: { action: 'permission_approve', request_id: requestId } }));
            const componentEl = document.getElementById(`component-${requestId}`);
            if (componentEl) {
                componentEl.classList.add('resolved');
                componentEl.dataset.resolution = '✓ Allowed';
                clearComponentInterval(componentEl);
                // コンテキストスタックから削除（アニメーション付き）
                setTimeout(() => {
                    removeContextItem(componentEl, requestId);
                    setTimeout(() => componentEl.remove(), 300);
                }, 500);
            }
        }

        function handlePermissionDeny(requestId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'component_action', action: { action: 'permission_deny', request_id: requestId, message: 'User denied permission' } }));
            const componentEl = document.getElementById(`component-${requestId}`);
            if (componentEl) {
                componentEl.classList.add('resolved');
                componentEl.dataset.resolution = '✗ Denied';
                clearComponentInterval(componentEl);
                // コンテキストスタックから削除（アニメーション付き）
                setTimeout(() => {
                    removeContextItem(componentEl, requestId);
                    setTimeout(() => componentEl.remove(), 300);
                }, 500);
            }
        }

        function dismissComponent(requestId) {
            const componentEl = document.getElementById(`component-${requestId}`);
            if (componentEl) {
                componentEl.classList.add('resolved');
                clearComponentInterval(componentEl);
            }
        }

        function clearComponentInterval(componentEl) {
            const intervalId = componentEl.dataset.intervalId;
            if (intervalId) clearInterval(parseInt(intervalId));
        }

        function setDebugMode(mode) {
            debugMode = mode;
            if (mode === 'none') {
                debugIndicator.classList.remove('visible');
            } else {
                debugIndicator.classList.add('visible');
                debugIndicator.textContent = mode === 'simple' ? 'DEBUG' : 'DEBUG (detail)';
                debugIndicator.className = `debug-indicator visible ${mode}`;
            }
        }

        function handleDebugInfo(msg) {
            const entry = document.createElement('div');
            entry.className = `debug-entry ${msg.category === 'error' ? 'error' : ''}`;
            const timestamp = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.innerHTML = `
                <div class="meta">
                    <span class="timestamp">${timestamp}</span>
                    <span class="category">[${msg.category}]</span>
                    <span class="message">${escapeHtml(msg.message)}</span>
                </div>
                ${msg.data && debugMode === 'detail' ? `<div class="data">${JSON.stringify(msg.data, null, 2)}</div>` : ''}
            `;
            debugEntries.appendChild(entry);
            debugEntries.scrollTop = debugEntries.scrollHeight;
        }

        function getPane(paneId) {
            let pane = document.getElementById(`pane-${paneId}`);
            if (!pane) {
                pane = document.createElement('div');
                pane.id = `pane-${paneId}`;
                pane.className = 'content-pane';
                pane.innerHTML = '<div class="pane-content"></div>';
                document.querySelector('#left-panel .side-panel-content').appendChild(pane);
            }
            return pane.querySelector('.pane-content');
        }

        function showContent(paneId, content, append) {
            const paneContent = getPane(paneId);
            let html = '';
            if (content.log) {
                html = `<div class="log-entry">${escapeHtml(content.log)}</div>`;
            } else if (content.markdown) {
                html = marked.parse(content.markdown);
            } else if (content.image_base64) {
                html = `<img src="data:${content.image_base64.mime_type};base64,${content.image_base64.data}" alt="Image">`;
            } else if (content.html) {
                html = content.html;
            }
            if (append) {
                paneContent.innerHTML += html;
            } else {
                paneContent.innerHTML = html;
            }
        }

        function clearPane(paneId) {
            const paneContent = getPane(paneId);
            paneContent.innerHTML = '';
        }

        function handleTogglePane(paneId, visible) {
            if (paneId === 'left') {
                if (visible === true && leftPanel.classList.contains('collapsed')) {
                    toggleLeftPanel();
                } else if (visible === false && !leftPanel.classList.contains('collapsed')) {
                    toggleLeftPanel();
                } else if (visible === undefined || visible === null) {
                    toggleLeftPanel();
                }
            } else if (paneId === 'right') {
                if (visible === true && rightPanel.classList.contains('collapsed')) {
                    toggleRightPanel();
                } else if (visible === false && !rightPanel.classList.contains('collapsed')) {
                    toggleRightPanel();
                } else if (visible === undefined || visible === null) {
                    toggleRightPanel();
                }
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Chat functions - New Flow Layout
        function addChatMessage(role, content) {
            hideTypingIndicator();

            if (role === 'assistant') {
                // Show in response area first
                currentResponse.classList.remove('empty');
                currentResponseContent.innerHTML = marked.parse(content);
            } else if (role === 'user') {
                // User messages go directly to history
                addToHistory('user', content);
            }
        }

        function handleChatChunk(content, done) {
            hideTypingIndicator();

            if (!isStreaming && content) {
                isStreaming = true;
                currentStreamContent = '';
                chatCancelBtn.classList.add('visible');
                currentResponse.classList.remove('empty');
                updateContextModeFromState();
            }

            if (content) {
                currentStreamContent += content;
                currentResponseContent.innerHTML = marked.parse(currentStreamContent);
            }

            if (done) {
                // Move completed response to history
                if (currentStreamContent) {
                    addToHistory('assistant', currentStreamContent);
                }

                // Clear response area with animation
                currentResponse.classList.add('exiting');
                setTimeout(() => {
                    currentResponse.classList.add('empty');
                    currentResponse.classList.remove('exiting');
                    currentResponseContent.innerHTML = '';
                }, 200);

                isStreaming = false;
                currentStreamContent = '';
                chatCancelBtn.classList.remove('visible');
                updateContextModeFromState();
            }
        }

        function addToHistory(role, content) {
            const messageEl = document.createElement('div');
            messageEl.className = `history-message ${role}`;

            if (role === 'assistant') {
                const contentEl = document.createElement('div');
                contentEl.className = 'content';
                contentEl.innerHTML = marked.parse(content);
                messageEl.appendChild(contentEl);
            } else {
                messageEl.textContent = content;
            }

            // Insert at the top of history (newest first)
            const firstChild = historyArea.firstChild;
            if (firstChild) {
                historyArea.insertBefore(messageEl, firstChild);
            } else {
                historyArea.appendChild(messageEl);
            }
        }

        function showTypingIndicator() {
            typingIndicator.style.display = 'block';
            updateContextModeFromState();
        }

        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
            updateContextModeFromState();
        }

        function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;

            // Add user message to history
            addToHistory('user', message);

            ws.send(JSON.stringify({ type: 'chat', message: message }));
            chatInput.value = '';
            autoResizeTextarea();
            showTypingIndicator();
            chatCancelBtn.classList.add('visible');
        }

        function cancelChatRequest() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'cancel_chat' }));
            hideTypingIndicator();
            chatCancelBtn.classList.remove('visible');

            if (isStreaming) {
                // Move incomplete response to history with [Cancelled] marker
                if (currentStreamContent) {
                    addToHistory('assistant', currentStreamContent + '\n\n[Cancelled]');
                }
                currentResponse.classList.add('empty');
                currentResponseContent.innerHTML = '';
                isStreaming = false;
                currentStreamContent = '';
            }
        }

        function autoResizeTextarea() {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
        }

        // Event listeners
        chatInput.addEventListener('input', () => {
            autoResizeTextarea();
            chatSendBtn.disabled = !chatInput.value.trim();
        });

        chatInput.addEventListener('compositionstart', () => { isComposing = true; });
        chatInput.addEventListener('compositionend', () => {
            isComposing = false;
            justFinishedComposing = true;
            setTimeout(() => { justFinishedComposing = false; }, 100);
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                if (e.isComposing || isComposing || justFinishedComposing || e.keyCode === 229) return;
                e.preventDefault();
                sendChatMessage();
            }
        });

        chatSendBtn.addEventListener('click', sendChatMessage);
        chatCancelBtn.addEventListener('click', cancelChatRequest);
        debugClearBtn.addEventListener('click', () => { debugEntries.innerHTML = ''; });

        // Keep input focused
        document.addEventListener('keydown', (e) => {
            // If not typing in an input field, focus the chat input
            if (document.activeElement.tagName !== 'INPUT' &&
                document.activeElement.tagName !== 'TEXTAREA' &&
                !e.metaKey && !e.ctrlKey && !e.altKey) {
                chatInput.focus();
            }
        });

        // ===== Input Area Drag & Drop =====
        const chatContainer = document.getElementById('chat-container');
        const inputArea = document.getElementById('input-area');
        const responseArea = document.getElementById('response-area');
        const dragHandle = inputArea.querySelector('.drag-handle');
        let isDraggingInput = false;

        // ドラッグ開始（ハンドルからのみ）
        inputArea.addEventListener('dragstart', (e) => {
            // ハンドル以外からのドラッグは無効
            if (!e.target.classList.contains('drag-handle') && !dragHandle.contains(e.target)) {
                // テキスト選択などは許可
                const isFromHandle = e.offsetY < 20; // 上部20pxはハンドル領域
                if (!isFromHandle) {
                    e.preventDefault();
                    return;
                }
            }
            isDraggingInput = true;
            inputArea.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', 'input-area');
        });

        inputArea.addEventListener('dragend', () => {
            isDraggingInput = false;
            inputArea.classList.remove('dragging');
            clearDropIndicators();
        });

        // ドロップゾーンの設定
        const dropZones = document.querySelectorAll('.drop-zone');
        dropZones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                if (!isDraggingInput) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';

                const rect = zone.getBoundingClientRect();
                const midY = rect.top + rect.height / 2;

                clearDropIndicators();
                zone.classList.add('drag-over');
                if (e.clientY < midY) {
                    zone.classList.add('drag-over-top');
                } else {
                    zone.classList.add('drag-over-bottom');
                }
            });

            zone.addEventListener('dragleave', (e) => {
                // 子要素への移動は無視
                if (zone.contains(e.relatedTarget)) return;
                zone.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
            });

            zone.addEventListener('drop', (e) => {
                if (!isDraggingInput) return;
                e.preventDefault();

                const rect = zone.getBoundingClientRect();
                const midY = rect.top + rect.height / 2;
                const insertBefore = e.clientY < midY;

                if (insertBefore) {
                    chatContainer.insertBefore(inputArea, zone);
                } else {
                    chatContainer.insertBefore(inputArea, zone.nextSibling);
                }

                clearDropIndicators();
                saveInputPosition();
            });
        });

        function clearDropIndicators() {
            dropZones.forEach(z => {
                z.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
            });
        }

        // 位置の保存と復元
        function saveInputPosition() {
            const children = Array.from(chatContainer.children);
            const position = children.indexOf(inputArea);
            localStorage.setItem('vp-input-position', position);
        }

        function restoreInputPosition() {
            const savedPosition = localStorage.getItem('vp-input-position');
            if (savedPosition !== null) {
                const position = parseInt(savedPosition, 10);
                const children = Array.from(chatContainer.children);
                if (position >= 0 && position < children.length) {
                    const targetElement = children[position];
                    if (targetElement !== inputArea) {
                        if (position === 0) {
                            chatContainer.insertBefore(inputArea, chatContainer.firstChild);
                        } else if (position >= children.length - 1) {
                            chatContainer.appendChild(inputArea);
                        } else {
                            chatContainer.insertBefore(inputArea, children[position + 1]);
                        }
                    }
                }
            }
        }

        // 初期化時に位置を復元
        restoreInputPosition();

        // Start connection
        connect();
    </script>
</body>
</html>
