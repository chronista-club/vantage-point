<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Point</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .header {
            background: #16213e;
            padding: 12px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 500;
        }
        .status {
            font-size: 12px;
            color: #888;
        }
        .status.connected {
            color: #4ade80;
        }
        .status.disconnected {
            color: #f87171;
        }
        .project-name {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
            padding: 4px 10px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 4px;
            display: none;
        }
        .project-name.visible {
            display: inline-block;
        }
        .container {
            display: flex;
            height: calc(100vh - 50px);
        }
        .pane {
            flex: 1;
            padding: 20px;
            overflow: auto;
            background: #1a1a2e;
            min-width: 200px;
        }
        /* Resize Handle */
        .resize-handle {
            width: 6px;
            background: #0f3460;
            cursor: col-resize;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .resize-handle:hover,
        .resize-handle.dragging {
            background: #667eea;
        }
        .pane-content {
            max-width: 800px;
            margin: 0 auto;
        }
        /* Markdown styles */
        .pane-content h1, .pane-content h2, .pane-content h3 {
            margin: 1em 0 0.5em;
            color: #fff;
        }
        .pane-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }
        .pane-content code {
            background: #0f3460;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        .pane-content pre {
            background: #0f3460;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1em 0;
        }
        .pane-content pre code {
            background: none;
            padding: 0;
        }
        .pane-content img {
            max-width: 100%;
            border-radius: 8px;
        }
        .pane-content ul, .pane-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }
        .log-entry {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid #0f3460;
        }
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .welcome h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #888;
        }

        /* Chat Panel Styles */
        .chat-panel {
            display: flex;
            flex-direction: column;
            background: #16213e;
            width: 400px;
            min-width: 280px;
            max-width: 800px;
            flex-shrink: 0;
        }
        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid #0f3460;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
        }
        .chat-header-actions {
            display: flex;
            gap: 8px;
        }
        .header-btn {
            background: transparent;
            border: 1px solid #0f3460;
            color: #888;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-btn:hover {
            background: #0f3460;
            color: #eee;
        }
        .header-btn.danger:hover {
            background: #dc2626;
            border-color: #dc2626;
            color: #fff;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-message {
            max-width: 90%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
        }
        .chat-message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #fff;
        }
        .chat-message.assistant {
            align-self: flex-start;
            background: #1a1a2e;
            color: #eee;
            border: 1px solid #0f3460;
        }
        .chat-message.system {
            align-self: center;
            background: transparent;
            color: #888;
            font-size: 12px;
            padding: 4px 8px;
        }
        .chat-message.assistant .content {
            white-space: pre-wrap;
        }
        .chat-message.assistant .content p {
            margin: 0.3em 0;
        }
        .chat-message.assistant .content code {
            background: #0f3460;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 13px;
        }
        .chat-message.assistant .content pre {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .chat-message.assistant .content pre code {
            background: none;
            padding: 0;
        }
        .chat-typing {
            align-self: flex-start;
            padding: 10px 14px;
            color: #888;
            font-size: 14px;
        }
        .chat-typing::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .chat-input-container {
            padding: 12px;
            border-top: 1px solid #0f3460;
        }
        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            background: #1a1a2e;
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid #0f3460;
        }
        .chat-input-wrapper:focus-within {
            border-color: #667eea;
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #eee;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            font-family: inherit;
        }
        .chat-input::placeholder {
            color: #666;
        }
        .chat-send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .chat-send-btn:hover {
            opacity: 0.9;
        }
        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chat-send-btn svg {
            width: 16px;
            height: 16px;
        }
        .chat-cancel-btn {
            background: #dc2626;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .chat-cancel-btn:hover {
            opacity: 0.9;
        }
        .chat-cancel-btn.visible {
            display: flex;
        }
        .chat-cancel-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Debug Panel Styles */
        .debug-panel {
            background: #0d1117;
            border-top: 1px solid #0f3460;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            display: none;
        }
        .debug-panel.visible {
            display: block;
        }
        .debug-header {
            position: sticky;
            top: 0;
            background: #0d1117;
            padding: 6px 12px;
            border-bottom: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8b949e;
        }
        .debug-header span {
            font-weight: 500;
        }
        .debug-clear-btn {
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 10px;
        }
        .debug-clear-btn:hover {
            color: #c9d1d9;
        }
        .debug-entries {
            padding: 8px 12px;
        }
        .debug-entry {
            padding: 2px 0;
            color: #8b949e;
            display: flex;
            gap: 8px;
        }
        .debug-entry .timestamp {
            color: #6e7681;
            min-width: 80px;
        }
        .debug-entry .category {
            color: #58a6ff;
            min-width: 70px;
        }
        .debug-entry .message {
            color: #c9d1d9;
        }
        .debug-entry.error .category {
            color: #f85149;
        }
        .debug-entry.error .message {
            color: #f85149;
        }
        .debug-entry .data {
            color: #7ee787;
            margin-left: 158px;
            word-break: break-all;
        }

        /* Debug mode indicator */
        .debug-indicator {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 8px;
        }
        .debug-indicator.simple {
            background: #3b82f6;
            color: white;
        }
        .debug-indicator.detail {
            background: #f59e0b;
            color: black;
        }

        /* Session Tabs */
        .session-tabs {
            display: flex;
            gap: 2px;
            padding: 8px 12px 0;
            background: #0d1117;
            border-bottom: 1px solid #0f3460;
            overflow-x: auto;
            scrollbar-width: thin;
        }
        .session-tabs::-webkit-scrollbar {
            height: 4px;
        }
        .session-tabs::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 2px;
        }
        .session-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: transparent;
            border: none;
            border-radius: 6px 6px 0 0;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .session-tab:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #bbb;
        }
        .session-tab.active {
            background: #16213e;
            color: #eee;
        }
        .session-tab .tab-name {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-tab .tab-close {
            display: none;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 10px;
            line-height: 1;
            padding: 0;
        }
        .session-tab:hover .tab-close,
        .session-tab.active .tab-close {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .session-tab .tab-close:hover {
            background: #dc2626;
            color: white;
        }
        .session-tab-new {
            padding: 6px 10px;
            background: transparent;
            border: 1px dashed #0f3460;
            border-radius: 6px 6px 0 0;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .session-tab-new:hover {
            border-color: #667eea;
            color: #667eea;
        }

        /* Chat Components - Permission Dialog */
        .chat-component {
            margin: 8px 0;
            border-radius: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            overflow: hidden;
            max-width: 90%;
        }
        .chat-component.permission-request {
            border-color: #f59e0b;
        }
        .chat-component-header {
            padding: 12px 16px;
            background: rgba(245, 158, 11, 0.1);
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-component-header .icon {
            font-size: 18px;
        }
        .chat-component-header .title {
            font-weight: 500;
            color: #f59e0b;
        }
        .chat-component-header .tool-name {
            color: #94a3b8;
            font-size: 12px;
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
        }
        .chat-component-body {
            padding: 16px;
        }
        .chat-component-body .input-preview {
            background: #0f172a;
            border-radius: 6px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
            margin-bottom: 16px;
            color: #94a3b8;
        }
        .chat-component-body .input-preview pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .chat-component-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .chat-component-btn {
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .chat-component-btn.approve {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
        .chat-component-btn.approve:hover {
            filter: brightness(1.1);
        }
        .chat-component-btn.deny {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
        }
        .chat-component-btn.deny:hover {
            background: #dc2626;
            border-color: #dc2626;
            color: white;
        }
        .chat-component-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chat-component-timeout {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin-top: 12px;
        }
        .chat-component.resolved {
            opacity: 0.6;
            pointer-events: none;
        }
        .chat-component.resolved .chat-component-actions {
            display: none;
        }
        .chat-component.resolved::after {
            content: attr(data-resolution);
            display: block;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: #64748b;
            background: rgba(0,0,0,0.2);
        }

        /* Todo List Component */
        .chat-component.todo-list {
            border-color: #3b82f6;
        }
        .chat-component.todo-list .chat-component-header {
            background: rgba(59, 130, 246, 0.1);
        }
        .chat-component.todo-list .chat-component-header .title {
            color: #3b82f6;
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
        }
        .todo-item:last-child {
            border-bottom: none;
        }
        .todo-item .status-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .todo-item.pending .status-icon {
            border: 2px solid #475569;
        }
        .todo-item.in_progress .status-icon {
            background: #3b82f6;
            animation: pulse 1.5s infinite;
        }
        .todo-item.completed .status-icon {
            background: #22c55e;
        }
        .todo-item .content {
            flex: 1;
            color: #e2e8f0;
        }
        .todo-item.completed .content {
            text-decoration: line-through;
            color: #64748b;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Progress Component */
        .chat-component.progress {
            border-color: #8b5cf6;
        }
        .chat-component.progress .chat-component-header {
            background: rgba(139, 92, 246, 0.1);
        }
        .chat-component.progress .chat-component-header .title {
            color: #8b5cf6;
        }
        .progress-bar-container {
            background: #1e293b;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
            transition: width 0.3s ease;
        }
        .progress-label {
            margin-top: 8px;
            font-size: 12px;
            color: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .resize-handle {
                display: none;
            }
            .chat-panel {
                width: 100% !important;
                max-width: none;
                min-width: 0;
                height: 300px;
                border-top: 1px solid #0f3460;
            }
            .pane {
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="header-title">Vantage Point</h1>
        <span id="project-name" class="project-name"></span>
        <span id="status" class="status disconnected">Disconnected</span>
        <span id="debug-indicator" class="debug-indicator" style="display: none;"></span>
    </div>
    <div class="container">
        <div id="pane-main" class="pane">
            <div class="pane-content">
                <div class="welcome">
                    <h2>Vantage Point</h2>
                    <p>Waiting for content from daemon...</p>
                </div>
            </div>
        </div>
        <div id="resize-handle" class="resize-handle"></div>
        <div id="chat-panel" class="chat-panel">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-header-icon"></div>
                    <span>Agent Chat</span>
                </div>
                <div class="chat-header-actions">
                    <button id="debug-toggle-btn" class="header-btn" title="Toggle Debug Panel">Debug</button>
                </div>
            </div>
            <div id="session-tabs" class="session-tabs">
                <button id="new-session-btn" class="session-tab-new" title="New Session">+</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="chat-message system">
                    Connected to Vantage Point Agent
                </div>
            </div>
            <div id="debug-panel" class="debug-panel">
                <div class="debug-header">
                    <span>Debug Log</span>
                    <button id="debug-clear-btn" class="debug-clear-btn">Clear</button>
                </div>
                <div id="debug-entries" class="debug-entries"></div>
            </div>
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea
                        id="chat-input"
                        class="chat-input"
                        placeholder="Message the agent..."
                        rows="1"
                    ></textarea>
                    <button id="chat-cancel-btn" class="chat-cancel-btn" title="Cancel Request">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 6l12 12M6 18L18 6"/>
                        </svg>
                    </button>
                    <button id="chat-send-btn" class="chat-send-btn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${location.host}/ws`;
        let ws = null;
        let reconnectTimer = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_DELAY = 30000; // 30 seconds max
        let isTyping = false;
        let currentStreamContent = '';
        let debugMode = 'none';
        let isComposing = false; // IME変換中フラグ
        let justFinishedComposing = false; // IME確定直後フラグ
        let sessions = []; // Session list
        let activeSessionId = null;

        // Chat elements
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const chatCancelBtn = document.getElementById('chat-cancel-btn');
        const debugToggleBtn = document.getElementById('debug-toggle-btn');
        const debugPanel = document.getElementById('debug-panel');
        const debugEntries = document.getElementById('debug-entries');
        const debugClearBtn = document.getElementById('debug-clear-btn');
        const debugIndicator = document.getElementById('debug-indicator');
        const sessionTabs = document.getElementById('session-tabs');
        const newSessionBtn = document.getElementById('new-session-btn');

        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = async () => {
                console.log('Connected to vpa');
                reconnectAttempts = 0; // Reset on successful connection
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status connected';
                chatSendBtn.disabled = false;
                ws.send(JSON.stringify({ type: 'ready' }));
                // Request session list on connect
                ws.send(JSON.stringify({ type: 'list_sessions' }));

                // Fetch project info from health endpoint
                try {
                    const response = await fetch('/api/health');
                    const health = await response.json();
                    if (health.project_dir) {
                        const projectName = health.project_dir.split('/').pop();
                        const projectNameEl = document.getElementById('project-name');
                        projectNameEl.textContent = projectName;
                        projectNameEl.classList.add('visible');
                        document.title = `${projectName} - Vantage Point`;
                    }
                } catch (e) {
                    console.log('Could not fetch project info:', e);
                }
            };

            ws.onclose = () => {
                console.log('Disconnected from vpa');
                document.getElementById('status').className = 'status disconnected';
                chatSendBtn.disabled = true;

                // Exponential backoff for reconnection
                reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), MAX_RECONNECT_DELAY);
                document.getElementById('status').textContent = `Reconnecting in ${Math.round(delay/1000)}s...`;

                console.log(`Reconnecting in ${delay}ms (attempt ${reconnectAttempts})`);
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, delay);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        function handleMessage(msg) {
            console.log('Received:', msg);

            switch (msg.type) {
                case 'show':
                    showContent(msg.pane_id || 'main', msg.content, msg.append);
                    break;
                case 'clear':
                    clearPane(msg.pane_id || 'main');
                    break;
                case 'ping':
                    ws.send(JSON.stringify({ type: 'pong' }));
                    break;
                case 'chat_message':
                    addChatMessage(msg.message.role, msg.message.content);
                    break;
                case 'chat_chunk':
                    handleChatChunk(msg.content, msg.done);
                    break;
                case 'debug_info':
                    handleDebugInfo(msg);
                    break;
                case 'debug_mode_changed':
                    setDebugMode(msg.mode);
                    break;
                case 'session_list':
                    updateSessionTabs(msg.sessions, msg.active_id);
                    break;
                case 'session_switched':
                    handleSessionSwitched(msg.session_id, msg.name);
                    break;
                case 'session_history':
                    handleSessionHistory(msg.session_id, msg.messages);
                    break;
                case 'session_closed':
                    // Session list will be updated via session_list message
                    break;
                case 'chat_component':
                    renderChatComponent(msg.component, msg.interactive);
                    break;
                case 'component_dismissed':
                    dismissComponent(msg.request_id);
                    break;
            }
        }

        // Chat Component Rendering
        function renderChatComponent(component, interactive) {
            console.log('Rendering component:', component);

            switch (component.component) {
                case 'permission_request':
                    renderPermissionRequest(component, interactive);
                    break;
                case 'todo_list':
                    renderTodoList(component);
                    break;
                case 'progress':
                    renderProgress(component);
                    break;
                case 'choice_buttons':
                    renderChoiceButtons(component, interactive);
                    break;
                default:
                    console.log('Unknown component type:', component.component);
            }

            scrollChatToBottom();
        }

        function renderPermissionRequest(data, interactive) {
            const { request_id, tool_name, description, input, timeout_seconds } = data;

            const componentEl = document.createElement('div');
            componentEl.className = 'chat-component permission-request';
            componentEl.id = `component-${request_id}`;
            componentEl.dataset.requestId = request_id;

            const inputStr = typeof input === 'object' ? JSON.stringify(input, null, 2) : String(input);

            componentEl.innerHTML = `
                <div class="chat-component-header">
                    <span class="icon">🔐</span>
                    <span class="title">Permission Request</span>
                    <span class="tool-name">${escapeHtml(tool_name)}</span>
                </div>
                <div class="chat-component-body">
                    ${description ? `<p style="margin-bottom: 12px; color: #94a3b8;">${escapeHtml(description)}</p>` : ''}
                    <div class="input-preview">
                        <pre>${escapeHtml(inputStr)}</pre>
                    </div>
                    ${interactive ? `
                    <div class="chat-component-actions">
                        <button class="chat-component-btn deny" onclick="handlePermissionDeny('${request_id}')">Deny</button>
                        <button class="chat-component-btn approve" onclick="handlePermissionApprove('${request_id}')">Allow</button>
                    </div>
                    <div class="chat-component-timeout">Timeout in ${timeout_seconds}s</div>
                    ` : ''}
                </div>
            `;

            chatMessages.appendChild(componentEl);

            // Start timeout countdown if interactive
            if (interactive && timeout_seconds > 0) {
                startTimeoutCountdown(request_id, timeout_seconds);
            }
        }

        function renderTodoList(data) {
            const { items, title } = data;

            // Update existing todo list if it exists
            let componentEl = document.querySelector('.chat-component.todo-list');
            if (!componentEl) {
                componentEl = document.createElement('div');
                componentEl.className = 'chat-component todo-list';
                chatMessages.appendChild(componentEl);
            }

            const itemsHtml = items.map(item => `
                <div class="todo-item ${item.status}">
                    <div class="status-icon">${item.status === 'completed' ? '✓' : item.status === 'in_progress' ? '●' : ''}</div>
                    <span class="content">${escapeHtml(item.status === 'in_progress' && item.active_form ? item.active_form : item.content)}</span>
                </div>
            `).join('');

            componentEl.innerHTML = `
                <div class="chat-component-header">
                    <span class="icon">📋</span>
                    <span class="title">${title || 'Tasks'}</span>
                </div>
                <div class="chat-component-body">
                    ${itemsHtml}
                </div>
            `;
        }

        function renderProgress(data) {
            const { label, current, total, status } = data;
            const percentage = total ? Math.round((current / total) * 100) : 0;

            // Update existing progress if it exists
            let componentEl = document.querySelector('.chat-component.progress');
            if (!componentEl) {
                componentEl = document.createElement('div');
                componentEl.className = 'chat-component progress';
                chatMessages.appendChild(componentEl);
            }

            const statusIcon = status === 'completed' ? '✓' : status === 'error' ? '✗' : '⏳';

            componentEl.innerHTML = `
                <div class="chat-component-header">
                    <span class="icon">${statusIcon}</span>
                    <span class="title">${escapeHtml(label)}</span>
                </div>
                <div class="chat-component-body">
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: ${percentage}%"></div>
                    </div>
                    ${total ? `<div class="progress-label">${current} / ${total} (${percentage}%)</div>` : ''}
                </div>
            `;
        }

        function renderChoiceButtons(data, interactive) {
            const { request_id, prompt, choices, allow_multiple } = data;

            const componentEl = document.createElement('div');
            componentEl.className = 'chat-component choice-buttons';
            componentEl.id = `component-${request_id}`;
            componentEl.dataset.requestId = request_id;

            const choicesHtml = choices.map(choice => `
                <button class="chat-component-btn" data-choice-id="${choice.id}" onclick="handleChoiceSelect('${request_id}', '${choice.id}')">
                    ${escapeHtml(choice.label)}
                    ${choice.description ? `<br><small style="opacity: 0.7;">${escapeHtml(choice.description)}</small>` : ''}
                </button>
            `).join('');

            componentEl.innerHTML = `
                <div class="chat-component-header">
                    <span class="icon">❓</span>
                    <span class="title">Choose an option</span>
                </div>
                <div class="chat-component-body">
                    <p style="margin-bottom: 12px; color: #e2e8f0;">${escapeHtml(prompt)}</p>
                    <div class="chat-component-actions" style="flex-wrap: wrap; justify-content: flex-start;">
                        ${choicesHtml}
                    </div>
                </div>
            `;

            chatMessages.appendChild(componentEl);
        }

        function startTimeoutCountdown(requestId, timeoutSeconds) {
            let remaining = timeoutSeconds;
            const componentEl = document.getElementById(`component-${requestId}`);
            if (!componentEl) return;

            const timeoutEl = componentEl.querySelector('.chat-component-timeout');
            if (!timeoutEl) return;

            const interval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(interval);
                    timeoutEl.textContent = 'Timed out';
                    // Auto-deny on timeout
                    handlePermissionDeny(requestId);
                } else {
                    timeoutEl.textContent = `Timeout in ${remaining}s`;
                }
            }, 1000);

            // Store interval ID for cleanup
            componentEl.dataset.intervalId = interval;
        }

        function handlePermissionApprove(requestId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({
                type: 'component_action',
                action: {
                    action: 'permission_approve',
                    request_id: requestId
                }
            }));

            // Mark component as resolved
            const componentEl = document.getElementById(`component-${requestId}`);
            if (componentEl) {
                componentEl.classList.add('resolved');
                componentEl.dataset.resolution = '✓ Allowed';
                clearComponentInterval(componentEl);
            }
        }

        function handlePermissionDeny(requestId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({
                type: 'component_action',
                action: {
                    action: 'permission_deny',
                    request_id: requestId,
                    message: 'User denied permission'
                }
            }));

            // Mark component as resolved
            const componentEl = document.getElementById(`component-${requestId}`);
            if (componentEl) {
                componentEl.classList.add('resolved');
                componentEl.dataset.resolution = '✗ Denied';
                clearComponentInterval(componentEl);
            }
        }

        function handleChoiceSelect(requestId, choiceId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({
                type: 'component_action',
                action: {
                    action: 'choice_select',
                    request_id: requestId,
                    selected_ids: [choiceId]
                }
            }));

            // Mark component as resolved
            const componentEl = document.getElementById(`component-${requestId}`);
            if (componentEl) {
                componentEl.classList.add('resolved');
                componentEl.dataset.resolution = `Selected: ${choiceId}`;
            }
        }

        function dismissComponent(requestId) {
            const componentEl = document.getElementById(`component-${requestId}`);
            if (componentEl) {
                componentEl.classList.add('resolved');
                clearComponentInterval(componentEl);
            }
        }

        function clearComponentInterval(componentEl) {
            const intervalId = componentEl.dataset.intervalId;
            if (intervalId) {
                clearInterval(parseInt(intervalId));
            }
        }

        function setDebugMode(mode) {
            debugMode = mode;
            if (mode === 'none') {
                debugIndicator.style.display = 'none';
                debugPanel.classList.remove('visible');
            } else {
                debugIndicator.style.display = 'inline';
                debugIndicator.textContent = mode === 'simple' ? 'DEBUG' : 'DEBUG (detail)';
                debugIndicator.className = `debug-indicator ${mode}`;
                debugPanel.classList.add('visible');
            }
        }

        function handleDebugInfo(msg) {
            if (debugMode === 'none') return;

            const entry = document.createElement('div');
            entry.className = `debug-entry ${msg.category === 'error' ? 'error' : ''}`;

            const timestamp = new Date().toLocaleTimeString('ja-JP', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            entry.innerHTML = `
                <span class="timestamp">${timestamp}</span>
                <span class="category">[${msg.category}]</span>
                <span class="message">${escapeHtml(msg.message)}</span>
            `;

            if (msg.data && debugMode === 'detail') {
                const dataEl = document.createElement('div');
                dataEl.className = 'data';
                dataEl.textContent = JSON.stringify(msg.data, null, 2);
                entry.appendChild(dataEl);
            }

            debugEntries.appendChild(entry);
            debugEntries.scrollTop = debugEntries.scrollHeight;
        }

        function getPane(paneId) {
            let pane = document.getElementById(`pane-${paneId}`);
            if (!pane) {
                // Create new pane if doesn't exist
                pane = document.createElement('div');
                pane.id = `pane-${paneId}`;
                pane.className = 'pane';
                pane.innerHTML = '<div class="pane-content"></div>';
                document.querySelector('.container').appendChild(pane);
            }
            return pane.querySelector('.pane-content');
        }

        function showContent(paneId, content, append) {
            const paneContent = getPane(paneId);
            let html = '';

            if (content.log) {
                html = `<div class="log-entry">${escapeHtml(content.log)}</div>`;
            } else if (content.markdown) {
                html = marked.parse(content.markdown);
            } else if (content.image_base64) {
                html = `<img src="data:${content.image_base64.mime_type};base64,${content.image_base64.data}" alt="Image">`;
            } else if (content.html) {
                html = content.html;
            }

            if (append) {
                paneContent.innerHTML += html;
            } else {
                paneContent.innerHTML = html;
            }

            // Scroll to bottom
            paneContent.parentElement.scrollTop = paneContent.parentElement.scrollHeight;
        }

        function clearPane(paneId) {
            const paneContent = getPane(paneId);
            paneContent.innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Chat functions
        function addChatMessage(role, content) {
            // Remove typing indicator if present
            removeTypingIndicator();

            const messageEl = document.createElement('div');
            messageEl.className = `chat-message ${role}`;

            if (role === 'assistant') {
                const contentEl = document.createElement('div');
                contentEl.className = 'content';
                contentEl.innerHTML = marked.parse(content);
                messageEl.appendChild(contentEl);
            } else {
                messageEl.textContent = content;
            }

            chatMessages.appendChild(messageEl);
            scrollChatToBottom();
        }

        function handleChatChunk(content, done) {
            // Remove typing indicator when first chunk arrives
            removeTypingIndicator();

            if (!isTyping && content) {
                // Start new streaming message
                isTyping = true;
                currentStreamContent = '';
                chatCancelBtn.classList.add('visible');

                const messageEl = document.createElement('div');
                messageEl.className = 'chat-message assistant';
                messageEl.id = 'streaming-message';

                const contentEl = document.createElement('div');
                contentEl.className = 'content';
                messageEl.appendChild(contentEl);

                chatMessages.appendChild(messageEl);
            }

            if (content) {
                currentStreamContent += content;

                const streamingEl = document.getElementById('streaming-message');
                if (streamingEl) {
                    const contentEl = streamingEl.querySelector('.content');
                    contentEl.innerHTML = marked.parse(currentStreamContent);
                }

                scrollChatToBottom();
            }

            if (done) {
                isTyping = false;
                currentStreamContent = '';
                chatCancelBtn.classList.remove('visible');
                const streamingEl = document.getElementById('streaming-message');
                if (streamingEl) {
                    streamingEl.removeAttribute('id');
                }
            }
        }

        function showTypingIndicator() {
            if (!document.getElementById('typing-indicator')) {
                const typingEl = document.createElement('div');
                typingEl.id = 'typing-indicator';
                typingEl.className = 'chat-typing';
                typingEl.textContent = 'Agent is thinking';
                chatMessages.appendChild(typingEl);
                scrollChatToBottom();
            }
        }

        function removeTypingIndicator() {
            const typingEl = document.getElementById('typing-indicator');
            if (typingEl) {
                typingEl.remove();
            }
        }

        function scrollChatToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;

            // Add user message to chat
            addChatMessage('user', message);

            // Send to daemon
            ws.send(JSON.stringify({
                type: 'chat',
                message: message
            }));

            // Clear input
            chatInput.value = '';
            autoResizeTextarea();

            // Show typing indicator
            showTypingIndicator();
            chatCancelBtn.classList.add('visible');
        }

        function cancelChatRequest() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({ type: 'cancel_chat' }));
            removeTypingIndicator();
            chatCancelBtn.classList.remove('visible');

            // If streaming, mark it as done
            if (isTyping) {
                isTyping = false;
                currentStreamContent = '';
                const streamingEl = document.getElementById('streaming-message');
                if (streamingEl) {
                    streamingEl.removeAttribute('id');
                    // Add cancelled indicator
                    const contentEl = streamingEl.querySelector('.content');
                    if (contentEl) {
                        contentEl.innerHTML += '<div style="color: #888; font-size: 12px; margin-top: 8px;">[Cancelled]</div>';
                    }
                }
            }
        }

        // Session management functions
        function formatTimeAgo(timestamp) {
            if (!timestamp) return '';
            const now = Date.now();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days}d`;
            if (hours > 0) return `${hours}h`;
            if (minutes > 0) return `${minutes}m`;
            return 'now';
        }

        function updateSessionTabs(newSessions, newActiveId) {
            sessions = newSessions;
            activeSessionId = newActiveId;

            // Clear existing tabs (except new button)
            const existingTabs = sessionTabs.querySelectorAll('.session-tab');
            existingTabs.forEach(tab => tab.remove());

            // Create tabs for each session
            sessions.forEach(session => {
                const tab = document.createElement('button');
                tab.className = `session-tab ${session.id === activeSessionId ? 'active' : ''}`;
                tab.dataset.sessionId = session.id;

                const nameSpan = document.createElement('span');
                nameSpan.className = 'tab-name';
                const timeAgo = formatTimeAgo(session.created_at);
                nameSpan.textContent = timeAgo ? `${session.name} (${timeAgo})` : session.name;
                nameSpan.title = `${session.name}\n${session.message_count} messages\nCreated: ${session.created_at ? new Date(session.created_at).toLocaleString() : 'Unknown'}`;

                const closeBtn = document.createElement('button');
                closeBtn.className = 'tab-close';
                closeBtn.innerHTML = '×';
                closeBtn.title = 'Close session';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    closeSession(session.id);
                };

                tab.appendChild(nameSpan);
                tab.appendChild(closeBtn);

                tab.onclick = () => switchSession(session.id);

                // Double-click to rename
                tab.ondblclick = () => renameSession(session.id, session.name);

                sessionTabs.insertBefore(tab, newSessionBtn);
            });
        }

        function switchSession(sessionId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            if (sessionId === activeSessionId) return;

            ws.send(JSON.stringify({
                type: 'switch_session',
                session_id: sessionId
            }));
        }

        function handleSessionSwitched(sessionId, name) {
            activeSessionId = sessionId;
            // Update tab UI
            document.querySelectorAll('.session-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.sessionId === sessionId);
            });
            // Clear chat and show switch message
            clearChatMessages();
            addChatMessage('system', `Switched to: ${name}`);
        }

        function handleSessionHistory(sessionId, messages) {
            // Only restore if this is the current session
            if (sessionId !== activeSessionId) return;

            // Restore messages from history
            messages.forEach(msg => {
                addChatMessage(msg.role, msg.content);
            });

            scrollChatToBottom();
        }

        function clearChatMessages() {
            // Remove all messages except keep a welcome system message
            chatMessages.innerHTML = '';
        }

        function createNewSession() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'new_session' }));
        }

        function closeSession(sessionId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            if (sessions.length <= 1) {
                // Don't close the last session
                return;
            }
            ws.send(JSON.stringify({
                type: 'close_session',
                session_id: sessionId
            }));
        }

        function renameSession(sessionId, currentName) {
            const newName = prompt('Rename session:', currentName);
            if (newName && newName !== currentName) {
                ws.send(JSON.stringify({
                    type: 'rename_session',
                    session_id: sessionId,
                    name: newName
                }));
            }
        }

        function autoResizeTextarea() {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
        }

        // Event listeners
        chatInput.addEventListener('input', autoResizeTextarea);

        // IME変換中の追跡
        chatInput.addEventListener('compositionstart', (e) => {
            console.log('[IME] compositionstart', { data: e.data });
            isComposing = true;
        });

        chatInput.addEventListener('compositionupdate', (e) => {
            console.log('[IME] compositionupdate', { data: e.data, isComposing });
        });

        chatInput.addEventListener('compositionend', (e) => {
            console.log('[IME] compositionend', { data: e.data });
            isComposing = false;
            // IME確定直後のEnterを無視するためのフラグ
            justFinishedComposing = true;
            // 少し遅延してフラグをリセット（確定のEnterキーイベントが先に来るため）
            setTimeout(() => {
                console.log('[IME] Resetting justFinishedComposing flag');
                justFinishedComposing = false;
            }, 100);
        });

        chatInput.addEventListener('keydown', (e) => {
            console.log('[KEY] keydown', {
                key: e.key,
                code: e.code,
                isComposing: e.isComposing,
                isComposingFlag: isComposing,
                justFinishedComposing: justFinishedComposing,
                keyCode: e.keyCode,
                shiftKey: e.shiftKey
            });

            // IME変換中または確定直後はEnterを無視
            // e.isComposing: ブラウザネイティブのIME状態チェック
            // isComposing: フォールバック用のフラグ
            // justFinishedComposing: IME確定直後（compositionend直後）のEnterを無視
            // keyCode 229: IME処理中を示す特殊なキーコード
            if (e.key === 'Enter' && !e.shiftKey) {
                if (e.isComposing || isComposing || justFinishedComposing || e.keyCode === 229) {
                    console.log('[KEY] Ignoring Enter (IME or just finished)');
                    return; // デフォルト動作を許可（IME確定）
                }
                console.log('[KEY] Sending message!');
                e.preventDefault();
                sendChatMessage();
            }
        });

        chatSendBtn.addEventListener('click', sendChatMessage);
        chatCancelBtn.addEventListener('click', cancelChatRequest);
        newSessionBtn.addEventListener('click', createNewSession);

        debugToggleBtn.addEventListener('click', () => {
            debugPanel.classList.toggle('visible');
        });

        debugClearBtn.addEventListener('click', () => {
            debugEntries.innerHTML = '';
        });

        // Resize handle functionality
        const resizeHandle = document.getElementById('resize-handle');
        const chatPanel = document.getElementById('chat-panel');
        let isResizing = false;

        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            resizeHandle.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;

            const containerRect = document.querySelector('.container').getBoundingClientRect();
            const newWidth = containerRect.right - e.clientX;

            // Clamp width between min and max
            const clampedWidth = Math.max(280, Math.min(800, newWidth));
            chatPanel.style.width = clampedWidth + 'px';

            // Save to localStorage
            localStorage.setItem('chatPanelWidth', clampedWidth);
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizeHandle.classList.remove('dragging');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        // Restore saved width on load
        const savedWidth = localStorage.getItem('chatPanelWidth');
        if (savedWidth) {
            chatPanel.style.width = savedWidth + 'px';
        }

        // Start connection
        connect();
    </script>
</body>
</html>
