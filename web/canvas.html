<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Point Canvas</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="/vendor/mermaid.min.js"></script>
    <script type="module">
        // VP mdast WASM パーサー初期化
        import init, { parse as wasmParse } from '/wasm/vp_mdast_wasm.js';
        try {
            await init('/wasm/vp_mdast_wasm_bg.wasm');
            window.__vpMdast = { parse: wasmParse, ready: true };
            console.log('[VP] mdast WASM パーサー初期化完了');
        } catch (e) {
            window.__vpMdast = { ready: false };
            console.warn('[VP] mdast WASM 初期化失敗、marked.js にフォールバック:', e);
        }

        // Shiki コードハイライター初期化（ローカルバンドル）
        try {
            const { createVpHighlighter } = await import('/vendor/shiki-vp.mjs');
            const highlighter = await createVpHighlighter(fetch('/vendor/shiki-onig.wasm'));
            window.__vpShiki = { highlighter, ready: true };
            console.log('[VP] Shiki ハイライター初期化完了');
        } catch (e) {
            window.__vpShiki = { ready: false };
            console.warn('[VP] Shiki 初期化失敗、プレーンコードブロックにフォールバック:', e);
        }
    </script>
    <style>
        :root {
            --canvas-bg: oklch(0.10 0.02 230);
            --grid-line: oklch(0.18 0.02 225);
            --grid-size: 32px;

            --color-text-primary: oklch(0.93 0.01 220);
            --color-text-secondary: oklch(0.70 0.03 220);
            --color-text-muted: oklch(0.52 0.03 225);
            --color-bg-elevated: oklch(0.16 0.02 225);
            --color-bg-surface: oklch(0.20 0.02 225);
            --color-border-subtle: oklch(0.25 0.03 225);
            --color-accent-primary: oklch(0.68 0.14 210);
            --color-success: oklch(0.72 0.17 160);
            --color-error: oklch(0.62 0.20 15);
            --radius-sm: 4px;
            --radius-md: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--canvas-bg);
            color: var(--color-text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* グリッド背景 */
        .canvas-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            pointer-events: none;
            z-index: 0;
        }

        /* グリッド交点のドット */
        .canvas-grid::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, oklch(0.30 0.03 225) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            pointer-events: none;
        }

        /* コンテンツ領域 */
        .canvas-content {
            position: relative;
            z-index: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 接続ステータス（左上に小さく表示） */
        .canvas-status {
            position: fixed;
            top: 12px;
            left: 16px;
            z-index: 10;
            font-size: 11px;
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }
        .canvas-status:hover { opacity: 1; }
        .canvas-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-error);
        }
        .canvas-status.connected .dot {
            background: var(--color-success);
        }

        /* ペインカード */
        .pane-card {
            position: relative;
            background: oklch(0.14 0.02 228 / 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            animation: card-in 0.3s ease-out;
        }
        .pane-card-close {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 1;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: var(--color-text-muted);
            background: none; border: none; border-radius: 2px;
            cursor: pointer; opacity: 0; transition: opacity 0.15s;
        }
        .pane-card:hover .pane-card-close { opacity: 1; }
        .pane-card-close:hover { background: oklch(0.30 0.03 225); color: var(--color-error); }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ペインタイトル */
        .pane-card-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--color-border-subtle);
        }

        /* Markdownコンテンツ表示 */
        .pane-card h1, .pane-card h2, .pane-card h3 {
            margin: 0.8em 0 0.4em;
            color: var(--color-text-primary);
        }
        .pane-card h1 { font-size: 1.4em; }
        .pane-card h2 { font-size: 1.2em; }
        .pane-card h3 { font-size: 1.05em; }
        .pane-card p {
            margin: 0.4em 0;
            line-height: 1.7;
            color: var(--color-text-secondary);
        }
        .pane-card code {
            background: oklch(0.08 0.02 230);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 0.9em;
        }
        .pane-card pre {
            background: oklch(0.08 0.02 230);
            padding: 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 0.8em 0;
        }
        .pane-card pre code { background: none; padding: 0; }

        /* Shiki ハイライト済みコードブロック */
        .pane-card .shiki-wrapper pre {
            margin: 0.8em 0;
            border-radius: var(--radius-md);
            overflow-x: auto;
        }
        .pane-card .shiki-wrapper .shiki {
            padding: 16px;
            border-radius: var(--radius-md);
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 0.9em;
            line-height: 1.5;
        }

        /* Frontmatter メタ情報カード */
        .pane-card .frontmatter-card {
            background: oklch(0.14 0.03 225);
            border: 1px solid oklch(0.25 0.04 210);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin-bottom: 1em;
            font-size: 0.85em;
        }
        .pane-card .frontmatter-table {
            width: 100%;
            border-collapse: collapse;
        }
        .pane-card .frontmatter-table th {
            text-align: left;
            color: var(--color-accent-primary);
            padding: 4px 12px 4px 0;
            font-weight: 600;
            white-space: nowrap;
            width: 1%;
        }
        .pane-card .frontmatter-table td {
            color: var(--color-text-secondary);
            padding: 4px 0;
        }

        /* Admonition ブロック */
        .pane-card .admonition {
            border-radius: var(--radius-md);
            margin: 1em 0;
            padding: 0;
            border-left: 4px solid;
            overflow: hidden;
        }
        .pane-card .admonition-header {
            padding: 8px 14px;
            font-weight: 600;
            font-size: 0.9em;
        }
        .pane-card .admonition-body {
            padding: 4px 14px 12px;
        }
        .pane-card .admonition-body p { margin: 0.3em 0; }
        /* カラーバリエーション */
        .pane-card .admonition-note {
            background: oklch(0.14 0.03 225);
            border-color: oklch(0.68 0.14 210);
        }
        .pane-card .admonition-note .admonition-header { color: oklch(0.68 0.14 210); }
        .pane-card .admonition-tip {
            background: oklch(0.14 0.03 150);
            border-color: oklch(0.72 0.17 160);
        }
        .pane-card .admonition-tip .admonition-header { color: oklch(0.72 0.17 160); }
        .pane-card .admonition-warning, .pane-card .admonition-caution {
            background: oklch(0.14 0.03 70);
            border-color: oklch(0.75 0.15 70);
        }
        .pane-card .admonition-warning .admonition-header,
        .pane-card .admonition-caution .admonition-header { color: oklch(0.75 0.15 70); }
        .pane-card .admonition-danger {
            background: oklch(0.14 0.03 20);
            border-color: oklch(0.62 0.20 15);
        }
        .pane-card .admonition-danger .admonition-header { color: oklch(0.62 0.20 15); }
        .pane-card .admonition-important {
            background: oklch(0.14 0.03 300);
            border-color: oklch(0.65 0.18 300);
        }
        .pane-card .admonition-important .admonition-header { color: oklch(0.65 0.18 300); }
        .pane-card .admonition-info {
            background: oklch(0.14 0.03 225);
            border-color: oklch(0.68 0.14 210);
        }
        .pane-card .admonition-info .admonition-header { color: oklch(0.68 0.14 210); }
        .pane-card img {
            max-width: 100%;
            border-radius: var(--radius-md);
        }
        .pane-card ul, .pane-card ol {
            margin: 0.4em 0;
            padding-left: 1.5em;
            color: var(--color-text-secondary);
            line-height: 1.7;
        }
        .pane-card table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.8em 0;
        }
        .pane-card th, .pane-card td {
            padding: 8px 12px;
            border: 1px solid var(--color-border-subtle);
            text-align: left;
            color: var(--color-text-secondary);
        }
        .pane-card th {
            background: oklch(0.12 0.02 228);
            color: var(--color-text-primary);
            font-weight: 600;
        }

        /* 空状態 */
        .canvas-empty {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            pointer-events: none;
        }
        .canvas-empty-label {
            font-size: 13px;
            color: var(--color-text-muted);
            opacity: 0.4;
            letter-spacing: 0.05em;
        }

        /* ===== ログビュワーパネル ===== */

        /* ログパネルトグルボタン（右下固定） */
        .log-toggle-btn {
            position: fixed;
            bottom: 12px;
            right: 16px;
            z-index: 100;
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-muted);
            background: oklch(0.14 0.02 228 / 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-sm);
            padding: 4px 10px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            letter-spacing: 0.05em;
        }
        .log-toggle-btn:hover {
            color: var(--color-text-primary);
            border-color: var(--color-accent-primary);
        }
        .log-toggle-btn.active {
            color: var(--color-accent-primary);
            border-color: var(--color-accent-primary);
            background: oklch(0.14 0.04 210 / 0.9);
        }
        /* ログ件数バッジ */
        .log-toggle-badge {
            display: inline-block;
            margin-left: 6px;
            font-size: 9px;
            font-weight: 700;
            color: var(--color-text-primary);
            background: var(--color-accent-primary);
            border-radius: 8px;
            padding: 1px 5px;
            min-width: 16px;
            text-align: center;
            vertical-align: middle;
        }

        /* ログパネル本体 */
        .log-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40vh;
            z-index: 50;
            background: oklch(0.10 0.02 228 / 0.92);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--color-border-subtle);
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.25s ease;
        }
        .log-panel.open {
            transform: translateY(0);
        }

        /* ログパネルが開いているときコンテンツ領域を縮小 */
        body.log-panel-open .canvas-content {
            height: 60vh;
        }
        body.log-panel-open .log-toggle-btn {
            bottom: calc(40vh + 12px);
        }

        /* フィルターバー */
        .log-filter-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--color-border-subtle);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .log-filter-bar label {
            font-size: 10px;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-right: 2px;
        }
        .log-filter-input {
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 11px;
            background: oklch(0.08 0.02 230);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            padding: 3px 8px;
            width: 120px;
            outline: none;
            transition: border-color 0.2s;
        }
        .log-filter-input:focus {
            border-color: var(--color-accent-primary);
        }
        .log-filter-input::placeholder {
            color: var(--color-text-muted);
            opacity: 0.6;
        }
        /* フィルターボタングループ */
        .log-filter-group {
            display: flex;
            gap: 2px;
        }
        .log-filter-btn {
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 10px;
            font-weight: 500;
            color: var(--color-text-muted);
            background: transparent;
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-sm);
            padding: 2px 8px;
            cursor: pointer;
            transition: color 0.15s, background 0.15s, border-color 0.15s;
        }
        .log-filter-btn:hover {
            color: var(--color-text-secondary);
            border-color: var(--color-text-muted);
        }
        .log-filter-btn.active {
            color: var(--color-text-primary);
            background: oklch(0.22 0.03 225);
            border-color: var(--color-accent-primary);
        }
        /* フィルターセパレータ */
        .log-filter-sep {
            width: 1px;
            height: 16px;
            background: var(--color-border-subtle);
            margin: 0 4px;
        }
        /* クリアボタン */
        .log-clear-btn {
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 10px;
            color: var(--color-text-muted);
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            padding: 2px 8px;
            cursor: pointer;
            margin-left: auto;
            transition: color 0.15s, border-color 0.15s;
        }
        .log-clear-btn:hover {
            color: var(--color-error);
            border-color: var(--color-error);
        }

        /* ログエントリリスト */
        .log-entries {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 0;
        }
        /* スクロール一時停止インジケータ */
        .log-scroll-paused {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--color-text-muted);
            background: oklch(0.14 0.02 228 / 0.95);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-sm);
            padding: 3px 10px;
            cursor: pointer;
            display: none;
            z-index: 51;
            transition: opacity 0.2s;
        }
        .log-scroll-paused:hover {
            color: var(--color-text-secondary);
            border-color: var(--color-accent-primary);
        }

        /* 個別ログエントリ */
        .log-entry {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 3px 12px 3px 12px;
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.5;
            border-left: 3px solid transparent;
            cursor: default;
            transition: background 0.1s;
        }
        .log-entry:hover {
            background: oklch(0.14 0.02 225 / 0.5);
        }
        /* ログエントリにdataがある場合はクリック可能 */
        .log-entry.has-data {
            cursor: pointer;
        }
        /* プロセス別左ボーダー色 */
        .log-entry.process-mcp {
            border-left-color: var(--color-accent-primary);
        }
        .log-entry.process-process {
            border-left-color: var(--color-success);
        }
        /* レベル別テキスト色 */
        .log-entry.level-warn .log-entry-msg {
            color: oklch(0.78 0.14 75);
        }
        .log-entry.level-error .log-entry-msg {
            color: var(--color-error);
        }
        .log-entry.level-error {
            background: oklch(0.12 0.03 15 / 0.3);
        }

        /* エントリ内のフィールド */
        .log-entry-time {
            color: var(--color-text-muted);
            font-size: 10px;
            flex-shrink: 0;
            width: 80px;
        }
        .log-entry-process {
            font-size: 10px;
            font-weight: 600;
            flex-shrink: 0;
            width: 40px;
            text-transform: uppercase;
        }
        .log-entry-process.mcp { color: var(--color-accent-primary); }
        .log-entry-process.process { color: var(--color-success); }

        .log-entry-trace {
            color: var(--color-text-muted);
            font-size: 10px;
            flex-shrink: 0;
            width: 52px;
        }
        .log-entry-step {
            color: var(--color-text-secondary);
            font-size: 10px;
            flex-shrink: 0;
            width: 72px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .log-entry-level {
            font-size: 9px;
            font-weight: 700;
            flex-shrink: 0;
            width: 38px;
            text-align: center;
            border-radius: 2px;
            padding: 0 3px;
        }
        .log-entry-level.debug { color: var(--color-text-muted); }
        .log-entry-level.info { color: var(--color-accent-primary); }
        .log-entry-level.warn { color: oklch(0.78 0.14 75); }
        .log-entry-level.error { color: var(--color-error); }

        .log-entry-msg {
            color: var(--color-text-secondary);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .log-entry-elapsed {
            color: var(--color-text-muted);
            font-size: 10px;
            flex-shrink: 0;
            text-align: right;
            width: 48px;
        }
        /* data展開アイコン */
        .log-entry-expand {
            color: var(--color-text-muted);
            font-size: 10px;
            flex-shrink: 0;
            width: 12px;
            text-align: center;
            transition: transform 0.15s;
        }
        .log-entry.expanded .log-entry-expand {
            transform: rotate(90deg);
        }

        /* JSON展開エリア */
        .log-entry-data {
            display: none;
            padding: 6px 12px 8px 18px;
            margin: 0;
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 11px;
            line-height: 1.4;
            color: var(--color-text-muted);
            background: oklch(0.08 0.02 230 / 0.6);
            border-left: 3px solid var(--color-border-subtle);
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-entry-data.open {
            display: block;
        }

        /* ログパネル空状態 */
        .log-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 11px;
            color: var(--color-text-muted);
            opacity: 0.5;
        }

        /* ===== Lane バー ===== */
        .canvas-lane-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 20;
            display: none; align-items: center;
            gap: 0; padding: 0 8px;
            background: oklch(0.08 0.02 230);
            border-bottom: 1px solid oklch(0.20 0.03 225);
            height: 36px;
        }
        .canvas-lane-bar.visible { display: flex; }

        .lane-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; height: 36px;
            font-size: 12px; font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--color-text-muted);
            background: transparent; border: none;
            cursor: pointer; transition: color 0.15s, background 0.15s;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }
        .lane-btn:hover { color: var(--color-text-secondary); background: oklch(0.12 0.02 225); }
        .lane-btn.active {
            color: var(--color-text-primary);
            border-bottom-color: var(--color-accent-primary);
        }

        .lane-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--color-text-muted);
        }
        .lane-dot.connected { background: var(--color-success); }
        .lane-dot.connecting { background: oklch(0.72 0.15 80); }
        .lane-dot.disconnected { background: var(--color-error); }

        /* Lane バー表示時のコンテンツ余白 */
        :root { --lane-bar-height: 36px; }
        body.has-lanes .canvas-tab-bar { top: var(--lane-bar-height); }
        body.has-lanes .canvas-content { padding-top: calc(var(--lane-bar-height) + var(--tab-bar-height)); }
        body.has-lanes:not(.has-tabs) .canvas-content { padding-top: var(--lane-bar-height); }
        body.has-lanes .canvas-status { top: var(--lane-bar-height); }
        body.has-lanes.has-tabs .canvas-status { top: calc(var(--lane-bar-height) + var(--tab-bar-height)); }

        /* ===== タブバー ===== */
        .canvas-tab-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: none; align-items: center;
            gap: 2px; padding: 4px 8px;
            background: oklch(0.12 0.02 230);
            border-bottom: 1px solid var(--color-border-subtle);
        }
        .canvas-tab-bar.visible { display: flex; }

        .canvas-tab {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px;
            font-size: 13px; color: var(--color-text-secondary);
            background: transparent; border: none; border-radius: var(--radius-sm);
            cursor: pointer; transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .canvas-tab:hover { background: oklch(0.20 0.02 225); color: var(--color-text-primary); }
        .canvas-tab.active { background: oklch(0.22 0.03 220); color: var(--color-text-primary); }

        .canvas-tab-close {
            display: inline-flex; width: 16px; height: 16px;
            align-items: center; justify-content: center;
            font-size: 14px; color: var(--color-text-muted);
            background: none; border: none; border-radius: 2px; cursor: pointer;
            opacity: 0; transition: opacity 0.1s;
        }
        .canvas-tab:hover .canvas-tab-close { opacity: 1; }
        .canvas-tab-close:hover { background: oklch(0.30 0.03 225); color: var(--color-error); }

        /* タブバー表示時のコンテンツ余白 */
        :root { --tab-bar-height: 44px; }
        body.has-tabs .canvas-content { padding-top: var(--tab-bar-height); }
        body.has-tabs .canvas-status { top: var(--tab-bar-height); }

        .tab-container { display: none; }
        .tab-container.active {
            display: flex; flex-direction: column; gap: 16px;
        }
        .tab-container.active.has-split {
            flex: 1;
            min-height: 0;
            gap: 0;
        }

        /* ===== Split Pane ===== */
        .split-container {
            display: flex;
            flex: 1;
            min-height: 0;
            min-width: 0;
        }
        .split-container.horizontal { flex-direction: row; }
        .split-container.vertical { flex-direction: column; }

        .split-handle {
            flex-shrink: 0;
            background: var(--color-border-subtle);
            transition: background 0.15s;
            z-index: 1;
        }
        .split-handle:hover, .split-handle.dragging {
            background: var(--color-accent-primary);
        }
        .split-container.horizontal > .split-handle {
            width: 4px;
            cursor: col-resize;
        }
        .split-container.vertical > .split-handle {
            height: 4px;
            cursor: row-resize;
        }

        /* split 内の pane-card はフレックス子要素として伸縮 */
        .split-container > .pane-card {
            max-width: none;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow-y: hidden;
            min-height: 0;
            min-width: 0;
        }
        .split-container > .pane-card > .pane-card-body {
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        /* ドラッグ中は iframe 等のポインターイベントを無効化 */
        body.split-dragging iframe,
        body.split-dragging .pane-card-body {
            pointer-events: none;
        }

        /* ═══════════════════════════════════════════════
           VP Nord — Mermaid SVG オーバーライド
           ═══════════════════════════════════════════════ */

        /* Mermaid コンテナ */
        .mermaid {
            background: transparent !important;
            margin: 12px 0;
            display: flex;
            justify-content: center;
        }
        .mermaid svg {
            max-width: 100%;
            height: auto;
        }

        /* ノード: 角丸 + 微ドロップシャドウ */
        .mermaid .node rect,
        .mermaid .node circle,
        .mermaid .node polygon {
            rx: 8px;
            ry: 8px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        /* ノードテキスト: 読みやすいサイズ + ウェイト */
        .mermaid .node .nodeLabel,
        .mermaid .node text {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
            font-size: 13px !important;
            fill: #ECEFF4 !important;
        }

        /* エッジ（矢印）: なめらかな線 */
        .mermaid .edge-pattern-solid,
        .mermaid .flowchart-link {
            stroke: #81A1C1 !important;
            stroke-width: 1.5px !important;
        }
        .mermaid marker path {
            fill: #81A1C1 !important;
        }

        /* エッジラベル */
        .mermaid .edgeLabel {
            background: #2E3440 !important;
            color: #D8DEE9 !important;
        }
        .mermaid .edgeLabel rect {
            fill: #2E3440 !important;
            opacity: 0.9;
        }

        /* サブグラフ: 枠線 + 半透明背景 */
        .mermaid .cluster rect {
            rx: 6px !important;
            ry: 6px !important;
            stroke: #4C566A !important;
            stroke-width: 1px !important;
            fill: rgba(59, 66, 82, 0.5) !important;
        }
        .mermaid .cluster text {
            fill: #81A1C1 !important;
            font-weight: 600 !important;
        }

        /* シーケンス図のアクター */
        .mermaid .actor {
            fill: #3B4252 !important;
            stroke: #5E81AC !important;
        }
        .mermaid .actor-line {
            stroke: #4C566A !important;
        }
        .mermaid text.actor {
            fill: #ECEFF4 !important;
            font-weight: 500 !important;
        }

        /* シーケンス図のシグナル線 */
        .mermaid .messageLine0,
        .mermaid .messageLine1 {
            stroke: #81A1C1 !important;
        }
        .mermaid .messageText {
            fill: #D8DEE9 !important;
        }

        /* ノート */
        .mermaid .note {
            fill: #434C5E !important;
            stroke: #4C566A !important;
        }
        .mermaid .noteText {
            fill: #E5E9F0 !important;
        }

        /* ラベル全般 */
        .mermaid .label {
            color: #D8DEE9 !important;
        }
        .mermaid .label text {
            fill: #D8DEE9 !important;
        }
    </style>
</head>
<body>
    <div class="canvas-grid"></div>
    <div class="canvas-lane-bar" id="canvas-lane-bar"></div>
    <div class="canvas-tab-bar" id="canvas-tab-bar"></div>

    <div class="canvas-status" id="status">
        <span class="dot"></span>
        <span id="status-text">Connecting...</span>
    </div>

    <div class="canvas-empty" id="empty-state">
        <span class="canvas-empty-label">VANTAGE POINT</span>
    </div>

    <div class="canvas-content" id="canvas-content"></div>

    <!-- ログビュワートグルボタン -->
    <button class="log-toggle-btn" id="log-toggle" type="button">
        Log
    </button>

    <!-- ログビュワーパネル -->
    <div class="log-panel" id="log-panel">
        <!-- フィルターバー -->
        <div class="log-filter-bar">
            <label for="log-filter-trace">Trace</label>
            <input class="log-filter-input" id="log-filter-trace"
                   type="text" placeholder="trace_id...">

            <div class="log-filter-sep"></div>

            <label>Process</label>
            <div class="log-filter-group" id="log-filter-process">
                <button class="log-filter-btn active" data-value="all" type="button">All</button>
                <button class="log-filter-btn" data-value="mcp" type="button">mcp</button>
                <button class="log-filter-btn" data-value="process" type="button">process</button>
            </div>

            <div class="log-filter-sep"></div>

            <label>Level</label>
            <div class="log-filter-group" id="log-filter-level">
                <button class="log-filter-btn active" data-value="all" type="button">All</button>
                <button class="log-filter-btn" data-value="DEBUG" type="button">DEBUG</button>
                <button class="log-filter-btn" data-value="INFO" type="button">INFO</button>
                <button class="log-filter-btn" data-value="WARN" type="button">WARN</button>
                <button class="log-filter-btn" data-value="ERROR" type="button">ERROR</button>
            </div>

            <button class="log-clear-btn" id="log-clear" type="button">Clear</button>
        </div>

        <!-- ログエントリリスト -->
        <div class="log-entries" id="log-entries">
            <div class="log-empty" id="log-empty">トレースログを待機中...</div>
        </div>

        <!-- スクロール一時停止インジケータ -->
        <div class="log-scroll-paused" id="log-scroll-resume">
            ↓ 新しいログがあります — クリックで最新へ
        </div>
    </div>

    <script>
        // ===== タブ・ペイン管理 =====
        const tabState = {
            tabs: new Map(),      // tabId → { id, title, panes: Map, container: HTMLElement }
            activeTab: null,      // 現在のタブ ID
        };

        const tabBar = document.getElementById('canvas-tab-bar');
        const canvasContent = document.getElementById('canvas-content');
        const emptyState = document.getElementById('empty-state');

        // --- タブ管理関数 ---

        function createTab(tabId, title) {
            if (tabState.tabs.has(tabId)) return;

            const container = document.createElement('div');
            container.className = 'tab-container';
            container.dataset.tabId = tabId;
            canvasContent.appendChild(container);

            tabState.tabs.set(tabId, {
                id: tabId,
                title: title || tabId,
                panes: new Map(),
                container,
                root: null,  // PaneNode ツリー: { type:'leaf', paneId } | { type:'split', direction, first, second, ratio }
            });

            markLayoutDirty();
            switchToTab(tabId);
            // switchToTab 内で updateTabBar() が呼ばれるため、ここでは不要
        }

        function switchToTab(tabId) {
            const tab = tabState.tabs.get(tabId);
            if (!tab) return;

            // 全タブを非アクティブ化
            for (const t of tabState.tabs.values()) {
                t.container.classList.remove('active');
            }
            tab.container.classList.add('active');
            tabState.activeTab = tabId;

            // 空状態: 対象タブにペインがなければ表示
            emptyState.style.display = tab.panes.size === 0 ? '' : 'none';

            updateTabBar();
        }

        function closeTab(tabId) {
            // _default タブは閉じない
            if (tabId === '_default') return;

            const tab = tabState.tabs.get(tabId);
            if (!tab) return;

            tab.container.remove();
            tabState.tabs.delete(tabId);

            if (tabState.tabs.size > 0) {
                // 残タブの先頭に切り替え（switchToTab 内で updateTabBar 呼び出し済み）
                const firstTab = tabState.tabs.keys().next().value;
                switchToTab(firstTab);
            } else {
                tabState.activeTab = null;
                emptyState.style.display = '';
                updateTabBar();
            }
        }

        function removePaneFromTab(tab, paneId) {
            const card = tab.panes.get(paneId);
            if (!card) return;

            tab.panes.delete(paneId);

            // ツリーからも削除（兄弟が昇格）
            if (tab.root) {
                tab.root = removePaneFromTree(tab.root, paneId);
            }

            // renderTabLayout が container を再構築するため card.remove() は不要
            renderTabLayout(tab);

            if (tab.id === tabState.activeTab && tab.panes.size === 0) {
                emptyState.style.display = '';
            }
        }

        function updateTabBar() {
            tabBar.replaceChildren();

            for (const tab of tabState.tabs.values()) {
                const btn = document.createElement('button');
                btn.className = 'canvas-tab';
                btn.type = 'button';
                if (tab.id === tabState.activeTab) btn.classList.add('active');

                const label = document.createElement('span');
                label.textContent = tab.title;
                btn.appendChild(label);

                // _default 以外は閉じるボタン
                if (tab.id !== '_default') {
                    const closeBtn = document.createElement('button');
                    closeBtn.className = 'canvas-tab-close';
                    closeBtn.type = 'button';
                    closeBtn.textContent = '\u00d7';
                    closeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        closeTab(tab.id);
                    });
                    btn.appendChild(closeBtn);
                }

                btn.addEventListener('click', () => switchToTab(tab.id));
                tabBar.appendChild(btn);
            }

            // タブが2つ以上でバー表示
            if (tabState.tabs.size >= 2) {
                tabBar.classList.add('visible');
                document.body.classList.add('has-tabs');
            } else {
                tabBar.classList.remove('visible');
                document.body.classList.remove('has-tabs');
            }
        }

        // --- ペイン管理 ---

        function createPaneCard(paneId, title) {
            const card = document.createElement('div');
            card.className = 'pane-card';
            card.dataset.paneId = paneId;

            const titleEl = document.createElement('div');
            titleEl.className = 'pane-card-title';
            titleEl.textContent = title || paneId;
            card.appendChild(titleEl);

            // ペイン close ボタン（ホバーで表示）
            const closeBtn = document.createElement('button');
            closeBtn.className = 'pane-card-close';
            closeBtn.type = 'button';
            closeBtn.textContent = '\u00d7';
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                for (const tab of tabState.tabs.values()) {
                    if (tab.panes.has(paneId)) {
                        removePaneFromTab(tab, paneId);
                        break;
                    }
                }
            });
            card.appendChild(closeBtn);

            const body = document.createElement('div');
            body.className = 'pane-card-body';
            card.appendChild(body);

            return card;
        }

        function getOrCreatePane(paneId, title, tabId) {
            tabId = tabId || '_default';
            let tab = tabState.tabs.get(tabId);
            if (!tab) {
                createTab(tabId, tabId);
                tab = tabState.tabs.get(tabId);
            }

            // 既存ペイン → タイトル更新のみ
            if (tab.panes.has(paneId)) {
                const card = tab.panes.get(paneId);
                if (title) {
                    const titleEl = card.querySelector('.pane-card-title');
                    if (titleEl) titleEl.textContent = title;
                }
                return card;
            }

            emptyState.style.display = 'none';

            const card = createPaneCard(paneId, title);
            tab.panes.set(paneId, card);

            // ツリーに含まれていなければ直接 container に append（Phase 1 互換）
            if (!isInTree(tab.root, paneId)) {
                tab.container.appendChild(card);
            }
            return card;
        }

        // --- Split Pane ツリー操作 ---

        /** ツリー内にペインが含まれるか判定 */
        function isInTree(node, paneId) {
            if (!node) return false;
            if (node.type === 'leaf') return node.paneId === paneId;
            return isInTree(node.first, paneId) || isInTree(node.second, paneId);
        }

        /** ツリー内の全ペインIDを収集 */
        function collectTreePaneIds(node) {
            if (!node) return new Set();
            if (node.type === 'leaf') return new Set([node.paneId]);
            const set = collectTreePaneIds(node.first);
            for (const id of collectTreePaneIds(node.second)) set.add(id);
            return set;
        }

        /** ソースペインの leaf を split ノードに置換 */
        function replaceLeafWithSplit(node, targetPaneId, direction, newPaneId) {
            if (node.type === 'leaf') {
                if (node.paneId === targetPaneId) {
                    return {
                        type: 'split',
                        direction,
                        first: { type: 'leaf', paneId: targetPaneId },
                        second: { type: 'leaf', paneId: newPaneId },
                        ratio: 0.5,
                    };
                }
                return node;
            }
            // split ノード → 再帰
            return {
                ...node,
                first: replaceLeafWithSplit(node.first, targetPaneId, direction, newPaneId),
                second: replaceLeafWithSplit(node.second, targetPaneId, direction, newPaneId),
            };
        }

        /** ペインをツリーから削除（兄弟が昇格） */
        function removePaneFromTree(node, targetPaneId) {
            if (!node) return null;
            if (node.type === 'leaf') {
                return node.paneId === targetPaneId ? null : node;
            }
            // 再帰的に削除し、片方が null なら残った側を昇格
            const newFirst = removePaneFromTree(node.first, targetPaneId);
            const newSecond = removePaneFromTree(node.second, targetPaneId);
            if (newFirst === null) return newSecond;
            if (newSecond === null) return newFirst;
            return { ...node, first: newFirst, second: newSecond };
        }

        /** PaneNode ツリーから DOM を構築 */
        function buildDomFromTree(tab, node) {
            if (!node) return null;
            if (node.type === 'leaf') {
                const el = tab.panes.get(node.paneId) || null;
                // display:none のペインはツリー構築から除外（toggle_pane 対応）
                return (el && el.style.display !== 'none') ? el : null;
            }

            const container = document.createElement('div');
            container.className = `split-container ${node.direction}`;

            const firstEl = buildDomFromTree(tab, node.first);
            const secondEl = buildDomFromTree(tab, node.second);

            if (firstEl) {
                firstEl.style.flex = `${node.ratio}`;
                container.appendChild(firstEl);
            }

            // 両側が揃っている場合のみハンドルを挿入
            if (firstEl && secondEl) {
                const handle = document.createElement('div');
                handle.className = 'split-handle';
                container.appendChild(handle);

                secondEl.style.flex = `${1 - node.ratio}`;
                container.appendChild(secondEl);

                initSplitHandleDrag(handle, container, node.direction, firstEl, secondEl, node);
            } else if (secondEl) {
                secondEl.style.flex = '1';
                container.appendChild(secondEl);
            } else if (firstEl) {
                // firstEl のみ → 全幅に（toggle_pane で片側非表示時）
                firstEl.style.flex = '1';
            } else {
                // 両側とも非表示 → コンテナごと省略
                return null;
            }

            return container;
        }

        /** タブのレイアウトをツリーから再構築 */
        function renderTabLayout(tab) {
            // 全子要素をデタッチ（DOM から外すが参照は panes Map に残る）
            while (tab.container.firstChild) {
                tab.container.removeChild(tab.container.firstChild);
            }

            const treeIds = collectTreePaneIds(tab.root);
            const hasSplit = tab.root && tab.root.type === 'split';
            tab.container.classList.toggle('has-split', hasSplit);

            // ツリーから DOM を構築して配置
            if (tab.root) {
                const treeDom = buildDomFromTree(tab, tab.root);
                if (treeDom) tab.container.appendChild(treeDom);
            }

            // ツリーに含まれないペインを直接 append（Phase 1 互換）
            for (const [paneId, card] of tab.panes) {
                if (!treeIds.has(paneId) && card.style.display !== 'none') {
                    tab.container.appendChild(card);
                }
            }
        }

        // --- ドラッグリサイズ ---
        let dragState = null;

        function initSplitHandleDrag(handle, container, direction, firstEl, secondEl, node) {
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                dragState = { handle, container, direction, firstEl, secondEl, node };
                handle.classList.add('dragging');
                document.body.classList.add('split-dragging');
            });
        }

        document.addEventListener('mousemove', (e) => {
            if (!dragState) return;
            const { container, direction, firstEl, secondEl, node } = dragState;
            // DOM から切り離されていたらドラッグを中断
            if (!container.isConnected) {
                dragState.handle.classList.remove('dragging');
                document.body.classList.remove('split-dragging');
                dragState = null;
                return;
            }
            const rect = container.getBoundingClientRect();
            let ratio;
            if (direction === 'horizontal') {
                ratio = (e.clientX - rect.left) / rect.width;
            } else {
                ratio = (e.clientY - rect.top) / rect.height;
            }
            ratio = Math.max(0.1, Math.min(0.9, ratio));
            node.ratio = ratio;
            firstEl.style.flex = `${ratio}`;
            secondEl.style.flex = `${1 - ratio}`;
        });

        document.addEventListener('mouseup', () => {
            if (!dragState) return;
            dragState.handle.classList.remove('dragging');
            document.body.classList.remove('split-dragging');
            dragState = null;
        });

        // _default タブを初期作成
        createTab('_default', 'Canvas');

        // Mermaid 初期化（VP Nord テーマ） — ローカルバンドル読み込み失敗時もクラッシュしない
        const mermaidAvailable = typeof mermaid !== 'undefined';
        if (mermaidAvailable) {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'base',
                themeVariables: {
                    // VP Nord カラーパレット
                    darkMode: true,
                    background: '#2E3440',           // Nord 0 — ダイアグラム背景
                    primaryColor: '#3B4252',          // Nord 1 — ノード塗り
                    primaryTextColor: '#ECEFF4',      // Nord 6 — テキスト
                    primaryBorderColor: '#5E81AC',    // Nord 10 — ノード枠線
                    lineColor: '#81A1C1',             // Nord 9 — 矢印・線
                    secondaryColor: '#434C5E',        // Nord 2 — サブグラフ背景
                    tertiaryColor: '#3B4252',         // Nord 1 — 三次色
                    // テキスト
                    textColor: '#D8DEE9',             // Nord 4 — 汎用テキスト
                    secondaryTextColor: '#81A1C1',    // Nord 9 — セカンダリテキスト
                    // ノート・状態
                    noteBkgColor: '#434C5E',          // Nord 2 — ノート背景
                    noteTextColor: '#E5E9F0',         // Nord 5 — ノートテキスト
                    noteBorderColor: '#4C566A',       // Nord 3 — ノート枠線
                    // エッジラベル
                    edgeLabelBackground: '#2E3440',   // Nord 0 — エッジラベル背景
                    // フローチャート
                    clusterBkg: '#3B4252',            // Nord 1 — サブグラフ背景
                    clusterBorder: '#4C566A',         // Nord 3 — サブグラフ枠線
                    // シーケンス図
                    actorBkg: '#3B4252',              // Nord 1 — アクター背景
                    actorBorder: '#5E81AC',           // Nord 10 — アクター枠線
                    actorTextColor: '#ECEFF4',        // Nord 6 — アクターテキスト
                    signalColor: '#81A1C1',           // Nord 9 — シグナル線
                    activationBorderColor: '#88C0D0', // Nord 8 — アクティベーション
                    activationBkgColor: '#434C5E',    // Nord 2 — アクティベーション背景
                    // フォント
                    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                    fontSize: '14px',
                },
            });
        }

        // Mermaid ブロックをレンダリング
        async function renderMermaidBlocks(container) {
            const codeBlocks = container.querySelectorAll('code.language-mermaid');
            for (const code of codeBlocks) {
                const pre = code.parentElement;
                if (!pre || pre.tagName !== 'PRE') continue;
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = code.textContent;
                pre.replaceWith(mermaidDiv);
            }
            if (typeof mermaid !== 'undefined' && container.querySelectorAll('.mermaid').length > 0) {
                try {
                    await mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
                } catch (e) {
                    const errDiv = document.createElement('div');
                    errDiv.style.cssText = 'background:#a00;color:#fff;padding:6px 10px;margin:4px 0;border-radius:4px;font-size:11px';
                    errDiv.textContent = `[MERMAID ERROR] ${e.message}`;
                    container.prepend(errDiv);
                }
            }
        }

        // ===== mdast AST → DOM レンダラー =====

        /**
         * mdast ノードを DOM 要素に変換する
         * WASM パーサーが返す AST を直接 DOM に変換。innerHTML 不使用。
         */
        function renderMdast(node) {
            if (!node) return document.createTextNode('');

            switch (node.type) {
                case 'Root': {
                    const frag = document.createDocumentFragment();
                    (node.children || []).forEach(c => frag.appendChild(renderMdast(c)));
                    return frag;
                }
                case 'Heading': {
                    const el = document.createElement(`h${node.depth || 1}`);
                    (node.children || []).forEach(c => el.appendChild(renderMdast(c)));
                    return el;
                }
                case 'Paragraph': {
                    const el = document.createElement('p');
                    (node.children || []).forEach(c => el.appendChild(renderMdast(c)));
                    return el;
                }
                case 'Text':
                    return document.createTextNode(node.value || '');
                case 'InlineCode': {
                    const code = document.createElement('code');
                    code.textContent = node.value || '';
                    return code;
                }
                case 'Code': {
                    // Mermaid ブロックは専用レンダラーにディスパッチ
                    if (node.lang === 'mermaid') {
                        const mermaidDiv = document.createElement('div');
                        mermaidDiv.className = 'mermaid';
                        mermaidDiv.textContent = node.value || '';
                        return mermaidDiv;
                    }
                    // Shiki ハイライト（利用可能な場合）
                    if (window.__vpShiki && window.__vpShiki.ready && node.lang) {
                        try {
                            const html = window.__vpShiki.highlighter.codeToHtml(
                                node.value || '',
                                { lang: node.lang, theme: 'nord' }
                            );
                            const wrapper = document.createElement('div');
                            wrapper.className = 'shiki-wrapper';
                            const sanitized = DOMPurify.sanitize(html, {
                                ADD_ATTR: ['style'],
                                ADD_TAGS: ['span'],
                            });
                            wrapper.insertAdjacentHTML('beforeend', sanitized);
                            return wrapper;
                        } catch (_) {
                            // 未対応言語の場合はフォールバック
                        }
                    }
                    // フォールバック: プレーンコードブロック
                    const pre = document.createElement('pre');
                    const code = document.createElement('code');
                    if (node.lang) code.className = `language-${node.lang}`;
                    code.textContent = node.value || '';
                    pre.appendChild(code);
                    return pre;
                }
                case 'Strong': {
                    const el = document.createElement('strong');
                    (node.children || []).forEach(c => el.appendChild(renderMdast(c)));
                    return el;
                }
                case 'Emphasis': {
                    const el = document.createElement('em');
                    (node.children || []).forEach(c => el.appendChild(renderMdast(c)));
                    return el;
                }
                case 'Delete': {
                    const el = document.createElement('del');
                    (node.children || []).forEach(c => el.appendChild(renderMdast(c)));
                    return el;
                }
                case 'Link': {
                    const a = document.createElement('a');
                    a.href = DOMPurify.sanitize(node.url || '');
                    if (node.title) a.title = node.title;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    (node.children || []).forEach(c => a.appendChild(renderMdast(c)));
                    return a;
                }
                case 'Image': {
                    const img = document.createElement('img');
                    img.src = DOMPurify.sanitize(node.url || '');
                    img.alt = node.alt || '';
                    if (node.title) img.title = node.title;
                    return img;
                }
                case 'List': {
                    const el = document.createElement(node.ordered ? 'ol' : 'ul');
                    if (node.start != null && node.start !== 1) el.start = node.start;
                    (node.children || []).forEach(c => el.appendChild(renderMdast(c)));
                    return el;
                }
                case 'ListItem': {
                    const li = document.createElement('li');
                    // チェックボックスリスト対応
                    if (node.checked != null) {
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.checked = node.checked;
                        cb.disabled = true;
                        cb.style.marginRight = '6px';
                        li.appendChild(cb);
                    }
                    (node.children || []).forEach(c => li.appendChild(renderMdast(c)));
                    return li;
                }
                case 'BlockQuote': {
                    const bq = document.createElement('blockquote');
                    (node.children || []).forEach(c => bq.appendChild(renderMdast(c)));
                    return bq;
                }
                case 'ThematicBreak':
                    return document.createElement('hr');
                case 'Break':
                    return document.createElement('br');
                case 'Table': {
                    const table = document.createElement('table');
                    const rows = node.children || [];
                    const aligns = node.align || [];
                    if (rows.length > 0) {
                        const thead = document.createElement('thead');
                        thead.appendChild(renderTableRow(rows[0], aligns, true));
                        table.appendChild(thead);
                    }
                    if (rows.length > 1) {
                        const tbody = document.createElement('tbody');
                        for (let i = 1; i < rows.length; i++) {
                            tbody.appendChild(renderTableRow(rows[i], aligns, false));
                        }
                        table.appendChild(tbody);
                    }
                    return table;
                }
                case 'TableRow': {
                    const tr = document.createElement('tr');
                    (node.children || []).forEach(c => tr.appendChild(renderMdast(c)));
                    return tr;
                }
                case 'TableCell': {
                    const td = document.createElement('td');
                    (node.children || []).forEach(c => td.appendChild(renderMdast(c)));
                    return td;
                }
                case 'Html': {
                    // DOMPurify でサニタイズしてから安全に挿入
                    const span = document.createElement('span');
                    const sanitized = DOMPurify.sanitize(node.value || '');
                    span.insertAdjacentHTML('beforeend', sanitized);
                    return span;
                }
                case 'FootnoteReference': {
                    const sup = document.createElement('sup');
                    const a = document.createElement('a');
                    a.textContent = `[${node.identifier || ''}]`;
                    a.href = `#fn-${node.identifier || ''}`;
                    sup.appendChild(a);
                    return sup;
                }
                case 'FootnoteDefinition': {
                    const div = document.createElement('div');
                    div.id = `fn-${node.identifier || ''}`;
                    div.className = 'footnote';
                    const marker = document.createElement('sup');
                    marker.textContent = `[${node.identifier || ''}]`;
                    div.appendChild(marker);
                    (node.children || []).forEach(c => div.appendChild(renderMdast(c)));
                    return div;
                }
                case 'Frontmatter': {
                    // YAML frontmatter → メタ情報カード
                    const card = document.createElement('div');
                    card.className = 'frontmatter-card';
                    const yaml = node.value || '';
                    // YAML をキーバリューで表示
                    const lines = yaml.split('\n').filter(l => l.trim());
                    const table = document.createElement('table');
                    table.className = 'frontmatter-table';
                    for (const line of lines) {
                        const colonIdx = line.indexOf(':');
                        if (colonIdx === -1) continue;
                        const key = line.substring(0, colonIdx).trim();
                        const val = line.substring(colonIdx + 1).trim();
                        const tr = document.createElement('tr');
                        const th = document.createElement('th');
                        th.textContent = key;
                        const td = document.createElement('td');
                        td.textContent = val;
                        tr.appendChild(th);
                        tr.appendChild(td);
                        table.appendChild(tr);
                    }
                    card.appendChild(table);
                    return card;
                }
                case 'Admonition': {
                    // Admonition ブロック — kind に応じたカラーバリエーション
                    const adm = document.createElement('div');
                    const kind = (node.kind || 'note').toLowerCase();
                    adm.className = `admonition admonition-${kind}`;
                    // アイコン + タイトル
                    const header = document.createElement('div');
                    header.className = 'admonition-header';
                    const icons = {
                        note: '\u{1f4dd}', tip: '\u{1f4a1}', warning: '\u{26a0}\ufe0f',
                        danger: '\u{1f6a8}', caution: '\u{26a0}\ufe0f', important: '\u{2757}',
                        info: '\u{2139}\ufe0f',
                    };
                    const icon = icons[kind] || icons.note;
                    const title = node.title || kind.charAt(0).toUpperCase() + kind.slice(1);
                    header.textContent = `${icon} ${title}`;
                    adm.appendChild(header);
                    // 本文
                    const body = document.createElement('div');
                    body.className = 'admonition-body';
                    (node.children || []).forEach(c => body.appendChild(renderMdast(c)));
                    adm.appendChild(body);
                    return adm;
                }
                default: {
                    // 未対応ノード: children があれば再帰、なければテキスト
                    const span = document.createElement('span');
                    if (node.children) {
                        node.children.forEach(c => span.appendChild(renderMdast(c)));
                    } else if (node.value) {
                        span.textContent = node.value;
                    }
                    return span;
                }
            }
        }

        /** テーブル行レンダリング（thead/tbody 判定 + align 適用） */
        function renderTableRow(rowNode, aligns, isHeader) {
            const tr = document.createElement('tr');
            (rowNode.children || []).forEach((cell, i) => {
                const el = document.createElement(isHeader ? 'th' : 'td');
                if (aligns[i] && aligns[i] !== 'None') {
                    el.style.textAlign = aligns[i].toLowerCase();
                }
                (cell.children || []).forEach(c => el.appendChild(renderMdast(c)));
                tr.appendChild(el);
            });
            return tr;
        }

        // NOTE: insertAdjacentHTML は DOMPurify.sanitize() でサニタイズ済みのコンテンツのみ使用
        function renderContent(bodyEl, content, append) {
            if (!append) bodyEl.textContent = '';
            const div = document.createElement('div');
            if (content.markdown) {
                // WASM mdast パーサー優先、フォールバックは marked.js
                if (window.__vpMdast && window.__vpMdast.ready) {
                    try {
                        const ast = window.__vpMdast.parse(content.markdown);
                        div.appendChild(renderMdast(ast));
                    } catch (e) {
                        console.warn('[VP] mdast レンダリング失敗、marked.js にフォールバック:', e);
                        const raw = marked.parse(content.markdown);
                        const sanitized = DOMPurify.sanitize(raw, { ADD_ATTR: ['class'] });
                        div.insertAdjacentHTML('beforeend', sanitized);
                    }
                } else {
                    const raw = marked.parse(content.markdown);
                    const sanitized = DOMPurify.sanitize(raw, { ADD_ATTR: ['class'] });
                    div.insertAdjacentHTML('beforeend', sanitized);
                }
            } else if (content.html) {
                const sanitized = DOMPurify.sanitize(content.html);
                div.insertAdjacentHTML('beforeend', sanitized);
            } else if (content.log) {
                const pre = document.createElement('pre');
                pre.textContent = content.log;
                pre.style.whiteSpace = 'pre-wrap';
                pre.style.wordBreak = 'break-all';
                div.appendChild(pre);
            } else if (content.url) {
                const iframe = document.createElement('iframe');
                iframe.src = content.url;
                iframe.style.cssText = 'width:100%;height:100%;border:none;';
                iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups';
                div.style.cssText = 'min-height:600px;height:100%;';
                div.appendChild(iframe);
            } else if (content.image_base64) {
                const img = document.createElement('img');
                const mimeType = DOMPurify.sanitize(content.image_base64.mime_type);
                img.src = `data:${mimeType};base64,${content.image_base64.data}`;
                div.appendChild(img);
            }
            bodyEl.appendChild(div);

            // Mermaid ブロックを非同期でレンダリング
            renderMermaidBlocks(div);
        }

        // ===== ログビュワー =====

        /** ログエントリの保持上限 */
        const LOG_MAX_ENTRIES = 2000;

        /** 全ログエントリ（フィルタ用に保持） */
        const logStore = [];

        /** 現在のフィルタ状態 */
        const logFilter = {
            traceId: '',
            process: 'all',
            level: 'all',
        };

        /** オートスクロール状態 */
        let logAutoScroll = true;

        /** パネル開閉状態 */
        let logPanelOpen = false;

        // DOM参照キャッシュ
        const logPanel = document.getElementById('log-panel');
        const logToggleBtn = document.getElementById('log-toggle');
        const logEntries = document.getElementById('log-entries');
        const logEmpty = document.getElementById('log-empty');
        const logScrollResume = document.getElementById('log-scroll-resume');
        const logFilterTrace = document.getElementById('log-filter-trace');
        const logClearBtn = document.getElementById('log-clear');

        /** ログパネルの開閉 */
        function toggleLogPanel() {
            logPanelOpen = !logPanelOpen;
            logPanel.classList.toggle('open', logPanelOpen);
            logToggleBtn.classList.toggle('active', logPanelOpen);
            document.body.classList.toggle('log-panel-open', logPanelOpen);
            if (logPanelOpen && logAutoScroll) {
                scrollLogToBottom();
            }
        }

        logToggleBtn.addEventListener('click', toggleLogPanel);

        /** タイムスタンプを HH:MM:SS.mmm 形式に変換 */
        function formatLogTime(ts) {
            try {
                const d = new Date(ts);
                const hh = String(d.getHours()).padStart(2, '0');
                const mm = String(d.getMinutes()).padStart(2, '0');
                const ss = String(d.getSeconds()).padStart(2, '0');
                const ms = String(d.getMilliseconds()).padStart(3, '0');
                return `${hh}:${mm}:${ss}.${ms}`;
            } catch {
                return ts || '--:--:--';
            }
        }

        /** フィルタ条件にマッチするか判定 */
        function matchesFilter(entry) {
            if (logFilter.traceId && !entry.trace_id.includes(logFilter.traceId)) {
                return false;
            }
            if (logFilter.process !== 'all' && entry.process !== logFilter.process) {
                return false;
            }
            if (logFilter.level !== 'all' && entry.level !== logFilter.level) {
                return false;
            }
            return true;
        }

        /** ログエントリのDOM要素を生成（textContentのみ使用） */
        function createLogEntryEl(entry) {
            // メイン行
            const row = document.createElement('div');
            row.className = 'log-entry';
            row.classList.add(`process-${entry.process}`);
            row.classList.add(`level-${entry.level.toLowerCase()}`);
            if (entry.data) row.classList.add('has-data');

            // 時刻
            const timeEl = document.createElement('span');
            timeEl.className = 'log-entry-time';
            timeEl.textContent = formatLogTime(entry.ts);
            row.appendChild(timeEl);

            // プロセス
            const procEl = document.createElement('span');
            procEl.className = `log-entry-process ${entry.process}`;
            procEl.textContent = entry.process;
            row.appendChild(procEl);

            // trace_id
            const traceEl = document.createElement('span');
            traceEl.className = 'log-entry-trace';
            traceEl.textContent = entry.trace_id;
            row.appendChild(traceEl);

            // ステップ
            const stepEl = document.createElement('span');
            stepEl.className = 'log-entry-step';
            stepEl.textContent = entry.step;
            stepEl.title = entry.step;
            row.appendChild(stepEl);

            // レベル
            const levelEl = document.createElement('span');
            levelEl.className = `log-entry-level ${entry.level.toLowerCase()}`;
            levelEl.textContent = entry.level;
            row.appendChild(levelEl);

            // メッセージ
            const msgEl = document.createElement('span');
            msgEl.className = 'log-entry-msg';
            msgEl.textContent = entry.msg;
            msgEl.title = entry.msg;
            row.appendChild(msgEl);

            // 経過時間
            const elapsedEl = document.createElement('span');
            elapsedEl.className = 'log-entry-elapsed';
            elapsedEl.textContent = entry.elapsed_ms != null ? `${entry.elapsed_ms}ms` : '';
            row.appendChild(elapsedEl);

            // data展開アイコン
            const expandEl = document.createElement('span');
            expandEl.className = 'log-entry-expand';
            expandEl.textContent = entry.data ? '\u25B6' : '';
            row.appendChild(expandEl);

            // data展開エリア（クリックで開閉）
            let dataEl = null;
            if (entry.data) {
                dataEl = document.createElement('pre');
                dataEl.className = 'log-entry-data';
                dataEl.textContent = JSON.stringify(entry.data, null, 2);

                row.addEventListener('click', () => {
                    const isOpen = dataEl.classList.toggle('open');
                    row.classList.toggle('expanded', isOpen);
                });
            }

            // Fragment にまとめて返す
            const frag = document.createDocumentFragment();
            frag.appendChild(row);
            if (dataEl) frag.appendChild(dataEl);
            return frag;
        }

        /** ログリストの最下部へスクロール */
        function scrollLogToBottom() {
            logEntries.scrollTop = logEntries.scrollHeight;
        }

        /** ログエントリを追加 */
        function addLogEntry(entry) {
            logStore.push(entry);

            // 上限超過時に古いエントリを削除
            if (logStore.length > LOG_MAX_ENTRIES) {
                const removed = logStore.splice(0, logStore.length - LOG_MAX_ENTRIES);
                // 表示済みDOM も先頭から削除（フィルタ適用中は全リビルド）
                if (logFilter.traceId || logFilter.process !== 'all' || logFilter.level !== 'all') {
                    rebuildLogEntries();
                    return;
                }
                // フィルタ無しの場合、削除分だけDOMから先頭を除去
                for (let i = 0; i < removed.length; i++) {
                    // logEmpty の次の兄弟要素から .log-entry を探して削除
                    const first = logEmpty.nextElementSibling;
                    if (first && first.classList.contains('log-entry')) {
                        // data展開 pre があればそれも先に除去
                        const next = first.nextElementSibling;
                        if (next && next.classList.contains('log-entry-data')) {
                            next.remove();
                        }
                        first.remove();
                    }
                }
            }

            // 空状態メッセージを消す
            if (logEmpty.style.display !== 'none') {
                logEmpty.style.display = 'none';
            }

            if (!matchesFilter(entry)) return;

            const el = createLogEntryEl(entry);
            logEntries.appendChild(el);

            // オートスクロール
            if (logAutoScroll) {
                scrollLogToBottom();
            }

            // トグルボタンのバッジ更新（パネル閉じているときだけ）
            updateLogBadge();
        }

        /** ログエントリ DOM を全削除（logEmpty は残す） */
        function clearLogDom() {
            const children = Array.from(logEntries.children);
            for (const child of children) {
                if (child !== logEmpty) child.remove();
            }
        }

        /** フィルタ変更時にログリストを再構築 */
        function rebuildLogEntries() {
            clearLogDom();
            let hasVisible = false;
            for (const entry of logStore) {
                if (matchesFilter(entry)) {
                    logEntries.appendChild(createLogEntryEl(entry));
                    hasVisible = true;
                }
            }
            logEmpty.style.display = hasVisible ? 'none' : '';
            logEmpty.textContent = hasVisible ? '' : 'フィルタに一致するログがありません';
            if (logAutoScroll) scrollLogToBottom();
        }

        /** ログをクリア */
        function clearLog() {
            logStore.length = 0;
            clearLogDom();
            logEmpty.style.display = '';
            logEmpty.textContent = 'トレースログを待機中...';
            updateLogBadge();
        }

        /** バッジ更新 */
        function updateLogBadge() {
            let badge = logToggleBtn.querySelector('.log-toggle-badge');
            if (logPanelOpen || logStore.length === 0) {
                if (badge) badge.remove();
                return;
            }
            if (!badge) {
                badge = document.createElement('span');
                badge.className = 'log-toggle-badge';
                logToggleBtn.appendChild(badge);
            }
            badge.textContent = logStore.length > 999 ? '999+' : String(logStore.length);
        }

        // --- フィルターバーのイベント ---

        // trace_id テキスト入力
        logFilterTrace.addEventListener('input', () => {
            logFilter.traceId = logFilterTrace.value.trim();
            rebuildLogEntries();
        });

        // プロセスフィルタボタン
        document.getElementById('log-filter-process').addEventListener('click', (e) => {
            const btn = e.target.closest('.log-filter-btn');
            if (!btn) return;
            // 同グループ内のactiveを切り替え
            btn.parentElement.querySelectorAll('.log-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            logFilter.process = btn.dataset.value;
            rebuildLogEntries();
        });

        // レベルフィルタボタン
        document.getElementById('log-filter-level').addEventListener('click', (e) => {
            const btn = e.target.closest('.log-filter-btn');
            if (!btn) return;
            btn.parentElement.querySelectorAll('.log-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            logFilter.level = btn.dataset.value;
            rebuildLogEntries();
        });

        // クリアボタン
        logClearBtn.addEventListener('click', clearLog);

        // --- オートスクロール制御 ---
        logEntries.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = logEntries;
            // 下端から20px以内ならオートスクロール復帰
            const atBottom = scrollHeight - scrollTop - clientHeight < 20;
            logAutoScroll = atBottom;
            logScrollResume.style.display = atBottom ? 'none' : 'block';
        });

        logScrollResume.addEventListener('click', () => {
            logAutoScroll = true;
            scrollLogToBottom();
            logScrollResume.style.display = 'none';
        });

    </script>
    <script>
        // ===== WebSocket（独立スクリプトブロック） =====
        // vp:// protocol 時: __VP_WS_HOST__ が canvas.rs で実際の host:port に置換される
        // HTTP 時: __VP_WS_HOST__ がそのまま残るので location.host を使用
        const wsHost = '__VP_WS_HOST__'.startsWith('__') ? location.host : '__VP_WS_HOST__';

        // Lane モード: デフォルト有効。?direct で直接モードに切り替え
        const urlParams = new URLSearchParams(window.location.search);
        const LANE_MODE = !urlParams.has('direct');
        // 起動元プロジェクトの優先選択（?project=xxx で指定）
        const PREFERRED_LANE = urlParams.get('project');
        let preferredLaneSwitched = false;

        const WS_URL = LANE_MODE
            ? `ws://${wsHost}/ws/lanes`
            : `ws://${wsHost}/ws`;

        let ws = null;
        let reconnectTimer = null;
        let reconnectAttempts = 0;

        // ===== Lane 状態管理 =====
        const laneState = {
            lanes: new Map(),     // name → { name, port, status }
            activeLane: null,     // 現在アクティブな Lane 名
            // Lane 別のタブ状態を保持（Lane 切り替え時に tabState を入れ替え）
            laneTabStates: new Map(), // name → { tabs: Map, activeTab: string }
        };

        const laneBar = document.getElementById('canvas-lane-bar');

        function renderLaneBar() {
            if (!LANE_MODE) return;
            laneBar.replaceChildren();

            if (laneState.lanes.size === 0) {
                laneBar.classList.remove('visible');
                document.body.classList.remove('has-lanes');
                return;
            }

            laneBar.classList.add('visible');
            document.body.classList.add('has-lanes');

            for (const [name, info] of laneState.lanes) {
                const btn = document.createElement('button');
                btn.className = 'lane-btn' + (name === laneState.activeLane ? ' active' : '');
                btn.type = 'button';

                const dot = document.createElement('span');
                dot.className = 'lane-dot ' + info.status;
                btn.appendChild(dot);

                const label = document.createElement('span');
                label.textContent = name;
                btn.appendChild(label);

                btn.addEventListener('click', () => switchLane(name));
                laneBar.appendChild(btn);
            }
        }

        function switchLane(name) {
            if (laneState.activeLane === name) return;

            // 現在の Lane のタブ状態を保存
            if (laneState.activeLane) {
                laneState.laneTabStates.set(laneState.activeLane, {
                    tabs: tabState.tabs,
                    activeTab: tabState.activeTab,
                });
            }

            // コンテンツをクリア（DOM API でクリーンに）
            canvasContent.replaceChildren();
            tabBar.replaceChildren();
            tabBar.classList.remove('visible');
            document.body.classList.remove('has-tabs');

            laneState.activeLane = name;

            // 新しい Lane のタブ状態を復元
            const saved = laneState.laneTabStates.get(name);
            if (saved) {
                tabState.tabs = saved.tabs;
                tabState.activeTab = saved.activeTab;
                // DOM を再構築
                for (const [tabId, tab] of tabState.tabs) {
                    canvasContent.appendChild(tab.container);
                }
                if (tabState.activeTab) {
                    updateTabBar();
                    switchToTab(tabState.activeTab);
                }
            } else {
                tabState.tabs = new Map();
                tabState.activeTab = null;
                emptyState.style.display = '';
            }

            // キューに溜まったメッセージをリプレイ
            if (laneState.messageQueues && laneState.messageQueues[name]) {
                const queue = laneState.messageQueues[name];
                delete laneState.messageQueues[name];
                queue.forEach(msg => handleMessage(msg));
            }

            markLayoutDirty();
            renderLaneBar();
        }

        // ===== WebSocket 接続 =====
        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                reconnectAttempts = 0;
                document.getElementById('status').classList.add('connected');
                document.getElementById('status-text').textContent = LANE_MODE ? 'Lanes' : 'Connected';
                if (!LANE_MODE) {
                    ws.send(JSON.stringify({ type: 'ready' }));
                }
            };

            ws.onclose = () => {
                document.getElementById('status').classList.remove('connected');
                reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
                document.getElementById('status-text').textContent = 'Reconnecting...';
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, delay);
            };

            ws.onerror = (err) => console.error('WebSocket error:', err);

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (LANE_MODE) {
                        handleLaneMessage(data);
                    } else {
                        handleMessage(data);
                    }
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };
