<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Point</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        /* ===== Chronista Design System ===== */
        /* OKLCH tokens fused from shadcn/ui + Tabler benchmarks */
        :root {
            /* Background hierarchy (dark mode) */
            --color-bg-deep: oklch(0.13 0.01 260);
            --color-bg-base: oklch(0.18 0.01 260);
            --color-bg-elevated: oklch(0.22 0.01 260);
            --color-bg-surface: oklch(0.26 0.01 260);

            /* Text hierarchy */
            --color-text-primary: oklch(0.95 0 0);
            --color-text-secondary: oklch(0.72 0.01 260);
            --color-text-muted: oklch(0.55 0.01 260);
            --color-text-placeholder: oklch(0.45 0.01 260);

            /* Border hierarchy */
            --color-border-subtle: oklch(0.28 0.01 260);
            --color-border-default: oklch(0.32 0.01 260);
            --color-border-accent: oklch(0.50 0.12 260);

            /* Accent colors (Tabler-inspired OKLCH) */
            --color-accent-primary: oklch(0.65 0.18 260);
            --color-accent-hover: oklch(0.70 0.20 260);
            --color-brand: oklch(0.65 0.22 15);

            /* Semantic colors (Tabler palette in OKLCH) */
            --color-success: oklch(0.72 0.19 145);
            --color-warning: oklch(0.82 0.18 70);
            --color-error: oklch(0.62 0.22 25);
            --color-info: oklch(0.65 0.15 240);

            /* Component tokens */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.1);
            --shadow-md: 0 4px 12px oklch(0 0 0 / 0.15);

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.2s ease;
            --transition-slow: 0.3s ease-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Header ===== */
        .header {
            background: var(--color-bg-elevated);
            padding: 8px 16px;
            border-bottom: 1px solid var(--color-border-default);
            display: flex;
            align-items: center;
            gap: 12px;
            height: 44px;
        }
        .header h1 {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            color: var(--color-brand);
            cursor: pointer;
        }
        .header h1:hover {
            color: var(--color-error);
        }
        .header h1 svg {
            width: 24px;
            height: 24px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status {
            font-size: 12px;
            color: var(--color-text-muted);
        }
        .status.connected {
            color: var(--color-success);
        }
        .status.disconnected {
            color: var(--color-error);
        }
        .project-name {
            font-size: 14px;
            color: var(--color-accent-primary);
            font-weight: 500;
            padding: 4px 10px;
            background: oklch(0.65 0.18 260 / 0.15);
            border-radius: var(--radius-sm);
            display: none;
        }
        .project-name.visible {
            display: inline-block;
        }
        .debug-indicator {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            display: none;
        }
        .debug-indicator.visible {
            display: inline-block;
        }
        .debug-indicator.simple {
            background: var(--color-info);
            color: white;
        }

        /* Panel Toggle Buttons */
        .panel-toggle {
            background: transparent;
            border: 1px solid var(--color-border-default);
            color: var(--color-text-muted);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .panel-toggle:hover {
            background: var(--color-bg-surface);
            color: var(--color-text-primary);
        }
        .panel-toggle.active {
            background: var(--color-accent-primary);
            border-color: var(--color-accent-primary);
            color: white;
        }
        .panel-toggle svg {
            width: 16px;
            height: 16px;
        }
        .panel-toggle i {
            font-size: 18px;
        }

        /* ===== Main Container ===== */
        .main-container {
            display: flex;
            height: calc(100vh - 44px);
        }

        /* ===== Side Panels ===== */
        .side-panel {
            width: 300px;
            min-width: 200px;
            max-width: 70%;
            background: var(--color-bg-elevated);
            border-right: 1px solid var(--color-border-default);
            display: flex;
            flex-direction: column;
            transition: width 0.2s, margin 0.2s;
            overflow: hidden;
        }
        .side-panel.right {
            border-right: none;
            border-left: 1px solid var(--color-border-default);
        }
        .side-panel.collapsed {
            width: 0;
            min-width: 0;
            border: none;
        }
        .side-panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--color-border-default);
            font-weight: 500;
            font-size: 13px;
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .side-panel-header i {
            font-size: 16px;
            color: var(--color-text-secondary);
        }
        .header-btn {
            background: transparent;
            border: 1px solid var(--color-border-subtle);
            color: var(--color-text-muted);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all var(--transition-fast);
        }
        .header-btn:hover {
            background: var(--color-bg-surface);
            color: var(--color-text-primary);
            border-color: var(--color-border-default);
        }
        .header-btn i {
            font-size: 14px;
        }
        .side-panel-content {
            flex: 1;
            overflow: auto;
            padding: 12px;
        }

        /* Resize Handle */
        .resize-handle {
            width: 4px;
            background: transparent;
            cursor: col-resize;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .resize-handle:hover,
        .resize-handle.dragging {
            background: var(--color-accent-primary);
        }

        /* ===== Center Panel (Chat) ===== */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 400px;
            background: var(--color-bg-base);
            overflow: hidden;
            position: relative;
        }

        /* ===== New Chat Layout ===== */
        .chat-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 0 16px;
        }

        /* Chat Area - メッセージ表示エリア */
        .chat-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 80px; /* 入力エリアの高さ分 */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Context Mode Indicator */
        .context-mode-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: oklch(0.22 0.01 260 / 0.8);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--color-text-secondary);
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .context-mode-bar.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .context-mode-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-text-muted);
            animation: pulse-soft 2s infinite;
        }
        .context-mode-indicator.thinking { background: var(--color-info); }
        .context-mode-indicator.responding { background: var(--color-success); }
        .context-mode-indicator.permission { background: var(--color-warning); }
        .context-mode-indicator.prompt { background: var(--color-accent-primary); }
        .context-mode-indicator.todo { background: var(--color-info); }
        .context-mode-indicator.idle { background: var(--color-text-muted); animation: none; }

        .context-mode-label {
            font-weight: 500;
        }
        .context-mode-detail {
            color: var(--color-text-muted);
            margin-left: auto;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Context Content Stack - ストリーミング応答・コンポーネント表示 */
        .context-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .context-item {
            animation: contextSlideIn 0.25s ease-out;
        }
        .context-item.exiting {
            animation: contextSlideOut 0.2s ease-in forwards;
        }
        @keyframes contextSlideIn {
            from { opacity: 0; transform: translateY(-15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes contextSlideOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(10px) scale(0.98); }
        }
        .current-response {
            background: var(--color-bg-surface);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: 16px;
            animation: slideDown 0.3s ease-out;
            max-height: 100%;
            overflow-y: auto;
        }
        .current-response.empty {
            display: none;
        }
        .current-response .content {
            line-height: 1.6;
            font-size: 14px;
        }
        .current-response .content p {
            margin: 0.3em 0;
        }
        .current-response .content code {
            background: var(--color-bg-deep);
            padding: 1px 4px;
            border-radius: var(--radius-sm);
            font-size: 13px;
        }
        .current-response .content pre {
            background: var(--color-bg-deep);
            padding: 10px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .current-response .content pre code {
            background: none;
            padding: 0;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* System message in response area */
        .system-message {
            text-align: center;
            color: var(--color-text-muted);
            font-size: 13px;
            padding: 8px;
        }

        /* Input Area - 下部固定 */
        .input-area {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            padding: 12px 16px;
            border-top: 1px solid var(--color-border-default);
            background: var(--color-bg-elevated);
        }
        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            background: var(--color-bg-base);
            border-radius: var(--radius-md);
            padding: 8px 12px;
            border: 1px solid var(--color-border-default);
        }
        .chat-input-wrapper:focus-within {
            border-color: var(--color-accent-primary);
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--color-text-primary);
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            font-family: inherit;
        }
        .chat-input::placeholder {
            color: var(--color-text-placeholder);
        }
        .chat-send-btn {
            background: linear-gradient(135deg, var(--color-accent-primary) 0%, var(--color-brand) 100%);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .chat-send-btn:hover {
            opacity: 0.9;
        }
        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chat-send-btn svg {
            width: 16px;
            height: 16px;
        }
        .chat-send-btn i,
        .chat-cancel-btn i {
            font-size: 16px;
        }
        .chat-cancel-btn {
            background: var(--color-error);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .chat-cancel-btn.visible {
            display: flex;
        }
        .chat-cancel-btn svg {
            width: 16px;
            height: 16px;
        }

        /* History Area - チャット履歴（下から積み上げ） */
        .history-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 12px;
        }
        .history-area .history-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .history-message {
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.3s ease-out;
        }
        .history-message.user {
            align-self: flex-end;
            background: var(--color-accent-primary);
            color: #fff;
            max-width: 85%;
        }
        .history-message.assistant {
            background: var(--color-bg-surface);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border-default);
            opacity: 0.85;
        }
        .history-message.assistant .content {
            line-height: 1.6;
        }
        .history-message.assistant .content p {
            margin: 0.3em 0;
        }
        .history-message.assistant .content code {
            background: var(--color-bg-deep);
            padding: 1px 4px;
            border-radius: var(--radius-sm);
            font-size: 13px;
        }
        .history-message.assistant .content pre {
            background: var(--color-bg-deep);
            padding: 10px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .history-message.assistant .content pre code {
            background: none;
            padding: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.85; }
        }

        /* ===== Chat Components ===== */
        .chat-component {
            margin: 8px 0;
            border-radius: var(--radius-lg);
            background: var(--color-bg-surface);
            border: 1px solid var(--color-border-default);
            overflow: hidden;
        }
        .chat-component.permission-request {
            border-color: var(--color-warning);
        }
        .chat-component-header {
            padding: 12px 16px;
            background: oklch(0.82 0.18 70 / 0.1);
            border-bottom: 1px solid var(--color-border-default);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-component-header .icon {
            font-size: 18px;
        }
        .chat-component-header .title {
            font-weight: 500;
            color: var(--color-warning);
        }
        .chat-component-header .tool-name {
            color: var(--color-text-secondary);
            font-size: 12px;
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
        }
        .chat-component-body {
            padding: 16px;
        }
        .chat-component-body .input-preview {
            background: var(--color-bg-deep);
            border-radius: var(--radius-md);
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
            margin-bottom: 16px;
            color: var(--color-text-secondary);
        }
        .chat-component-body .input-preview pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .chat-component-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .chat-component-btn {
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .chat-component-btn.approve {
            background: linear-gradient(135deg, var(--color-success) 0%, oklch(0.60 0.19 145) 100%);
            color: white;
        }
        .chat-component-btn.approve:hover {
            filter: brightness(1.1);
        }
        .chat-component-btn.deny {
            background: transparent;
            border: 1px solid var(--color-border-default);
            color: var(--color-text-secondary);
        }
        .chat-component-btn.deny:hover {
            background: var(--color-error);
            border-color: var(--color-error);
            color: white;
        }
        .chat-component-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chat-component-timeout {
            font-size: 11px;
            color: var(--color-text-muted);
            text-align: center;
            margin-top: 12px;
        }
        .chat-component.resolved {
            opacity: 0.6;
            pointer-events: none;
        }
        .chat-component.resolved .chat-component-actions {
            display: none;
        }
        .chat-component.resolved::after {
            content: attr(data-resolution);
            display: block;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: var(--color-text-muted);
            background: oklch(0 0 0 / 0.2);
        }

        /* Todo List Component */
        .chat-component.todo-list {
            border-color: var(--color-info);
        }
        .chat-component.todo-list .chat-component-header {
            background: oklch(0.65 0.15 240 / 0.1);
        }
        .chat-component.todo-list .chat-component-header .title {
            color: var(--color-info);
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--color-bg-surface);
        }
        .todo-item:last-child {
            border-bottom: none;
        }
        .todo-item .status-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .todo-item.pending .status-icon {
            border: 2px solid var(--color-border-default);
        }
        .todo-item.in_progress .status-icon {
            background: var(--color-info);
            animation: pulse 1.5s infinite;
        }
        .todo-item.completed .status-icon {
            background: var(--color-success);
        }
        .todo-item .content {
            flex: 1;
            color: var(--color-text-primary);
        }
        .todo-item.completed .content {
            text-decoration: line-through;
            color: var(--color-text-muted);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* User Prompt Component */
        .chat-component.user-prompt {
            border-color: var(--color-accent-primary);
        }
        .chat-component.user-prompt .chat-component-header {
            background: oklch(0.65 0.18 260 / 0.1);
        }
        .chat-component.user-prompt .chat-component-header .title {
            color: var(--color-accent-primary);
        }
        .prompt-description {
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .prompt-input {
            width: 100%;
            background: var(--color-bg-deep);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-md);
            padding: 12px;
            font-size: 14px;
            color: var(--color-text-primary);
            margin-bottom: 16px;
        }
        .prompt-input:focus {
            outline: none;
            border-color: var(--color-accent-primary);
        }
        .chat-component-btn.submit {
            background: linear-gradient(135deg, var(--color-accent-primary) 0%, oklch(0.55 0.20 260) 100%);
            color: white;
        }

        /* Debug panel CSS removed */

        /* ===== Terminal Container (Main) ===== */
        #terminal-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background: oklch(0.13 0.01 260);
            overflow: hidden;
        }
        #terminal-container canvas {
            display: block;
        }

        /* ===== Left Panel - Content/Show ===== */
        .content-pane {
            padding: 16px;
        }
        .content-pane .welcome {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-muted);
        }
        .content-pane .welcome h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--color-text-secondary);
        }
        .pane-content h1, .pane-content h2, .pane-content h3 {
            margin: 1em 0 0.5em;
            color: var(--color-text-primary);
        }
        .pane-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }
        .pane-content code {
            background: var(--color-bg-deep);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-family: 'JetBrains Mono', monospace;
        }
        .pane-content pre {
            background: var(--color-bg-deep);
            padding: 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 1em 0;
        }
        .pane-content pre code {
            background: none;
            padding: 0;
        }
        .pane-content img {
            max-width: 100%;
            border-radius: var(--radius-md);
        }

        /* Typing indicator */
        .typing-indicator {
            color: var(--color-text-muted);
            font-size: 14px;
            padding: 8px 0;
        }
        .typing-indicator::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            .side-panel {
                position: absolute;
                z-index: 100;
                height: calc(100vh - 44px);
            }
            .side-panel.left {
                left: 0;
            }
            .side-panel.right {
                right: 0;
            }
            .chat-container {
                padding: 0 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1 id="header-title" title="Vantage Point">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 22H22L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 2L8 10L12 8L16 10L12 2Z" fill="currentColor" opacity="0.3"/>
                    <circle cx="12" cy="6" r="2" fill="currentColor"/>
                </svg>
            </h1>
            <span id="project-name" class="project-name"></span>
            <span id="status" class="status disconnected">Disconnected</span>
        </div>
        <div class="header-right">
        </div>
    </div>

    <div class="main-container">
        <!-- Main Terminal -->
        <div id="terminal-container"></div>
    </div>

    <script>
        // ===== WebSocket + Terminal I/O =====
        const WS_URL = `ws://${location.host}/ws`;
        let ws = null;
        let reconnectTimer = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_DELAY = 30000;

        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = async () => {
                console.log('Connected to Stand');
                reconnectAttempts = 0;
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status connected';
                ws.send(JSON.stringify({ type: 'ready' }));

                try {
                    const response = await fetch('/api/health');
                    const health = await response.json();
                    if (health.project_dir) {
                        const projectName = health.project_dir.split('/').pop();
                        const projectNameEl = document.getElementById('project-name');
                        projectNameEl.textContent = projectName;
                        projectNameEl.classList.add('visible');
                        document.title = `${projectName} - Vantage Point`;
                    }
                } catch (e) {
                    console.log('Could not fetch project info:', e);
                }
            };

            ws.onclose = () => {
                document.getElementById('status').className = 'status disconnected';
                reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), MAX_RECONNECT_DELAY);
                document.getElementById('status').textContent = `Reconnecting in ${Math.round(delay/1000)}s...`;
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, delay);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'ping':
                    ws.send(JSON.stringify({ type: 'pong' }));
                    break;
                case 'terminal_output':
                    if (window.terminalWriteCallback && msg.data) {
                        try {
                            const binaryStr = atob(msg.data);
                            const bytes = new Uint8Array(binaryStr.length);
                            for (let i = 0; i < binaryStr.length; i++) {
                                bytes[i] = binaryStr.charCodeAt(i);
                            }
                            window.terminalWriteCallback(bytes);
                        } catch (e) {
                            console.error('Terminal output decode error:', e);
                        }
                    }
                    break;
                case 'terminal_ready':
                    console.log('Terminal PTY session ready');
                    break;
                default:
                    // その他のメッセージはconsoleに記録
                    console.debug('WS:', msg.type, msg);
                    break;
            }
        }

        // ターミナルI/O用グローバル関数
        window.sendTerminalResize = function(cols, rows) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'terminal_resize', cols, rows }));
            }
        };

        window.sendTerminalInput = function(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const encoder = new TextEncoder();
                const bytes = encoder.encode(data);
                const base64 = btoa(String.fromCharCode(...bytes));
                ws.send(JSON.stringify({ type: 'terminal_input', data: base64 }));
            }
        };

        window.terminalWriteCallback = null;

        // 接続開始
        connect();
    </script>

    <!-- ghostty-web ターミナル初期化（ESモジュール） -->
    <script type="module">
        import { init, Terminal, FitAddon } from 'https://cdn.jsdelivr.net/npm/ghostty-web@0.4.0/dist/ghostty-web.js';

        let ghosttyTerm = null;
        let fitAddon = null;

        async function initTerminal() {
            try {
                await init();
                console.log('ghostty-web WASM initialized');

                ghosttyTerm = new Terminal({
                    fontSize: 14,
                    fontFamily: "'JetBrains Mono', 'Fira Code', 'SF Mono', monospace",
                    theme: {
                        background: '#1e1f2e',
                        foreground: '#a9b1d6',
                        cursor: '#c0caf5',
                        selectionBackground: '#33467c',
                    },
                });

                const container = document.getElementById('terminal-container');
                ghosttyTerm.open(container);

                // FitAddon でコンテナに合わせてリサイズ
                fitAddon = new FitAddon();
                ghosttyTerm.loadAddon(fitAddon);

                // 初回フィット
                requestAnimationFrame(() => {
                    fitAddon.fit();
                    const dims = fitAddon.proposeDimensions();
                    if (dims) {
                        window.sendTerminalResize(dims.cols, dims.rows);
                    }
                });

                // キー入力 → WebSocket送信
                ghosttyTerm.onData((data) => {
                    window.sendTerminalInput(data);
                });

                // PTY出力受信コールバックを登録
                window.terminalWriteCallback = (bytes) => {
                    if (ghosttyTerm) {
                        ghosttyTerm.write(bytes);
                    }
                };

                // ResizeObserver でパネルリサイズ追従
                const resizeObserver = new ResizeObserver(() => {
                    if (fitAddon && ghosttyTerm) {
                        fitAddon.fit();
                        const dims = fitAddon.proposeDimensions();
                        if (dims) {
                            window.sendTerminalResize(dims.cols, dims.rows);
                        }
                    }
                });
                resizeObserver.observe(container);

                console.log('Terminal initialized successfully');
            } catch (e) {
                console.error('Failed to initialize ghostty-web terminal:', e);
                // フォールバック: コンテナにエラーメッセージ表示
                const container = document.getElementById('terminal-container');
                container.innerHTML = `<div style="padding: 20px; color: var(--color-text-muted);">
                    <p>Terminal initialization failed</p>
                    <p style="font-size: 12px; margin-top: 8px;">${e.message || e}</p>
                </div>`;
            }
        }

        // ターミナル初期化開始
        initTerminal();
    </script>
</body>
</html>
