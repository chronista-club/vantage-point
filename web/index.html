<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Point</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        /* ===== Chronista Design System: Arctic Nordic Ocean ===== */
        /* OKLCH tokens — deep sea navy + arctic ice + aurora accents */
        :root {
            /* Background hierarchy (Arctic Dark) */
            --color-bg-deep: oklch(0.12 0.02 230);    /* 深海の底 */
            --color-bg-base: oklch(0.16 0.02 225);    /* 北極の夜 */
            --color-bg-elevated: oklch(0.20 0.02 225); /* 浮上する氷山 */
            --color-bg-surface: oklch(0.24 0.02 220);  /* 氷の表面 */

            /* Text hierarchy (Frost) */
            --color-text-primary: oklch(0.93 0.01 220);   /* 氷霜の白 */
            --color-text-secondary: oklch(0.70 0.03 220); /* 薄氷 */
            --color-text-muted: oklch(0.52 0.03 225);     /* 深い霧 */
            --color-text-placeholder: oklch(0.42 0.02 225);

            /* Border hierarchy (Ocean) */
            --color-border-subtle: oklch(0.25 0.03 225);
            --color-border-default: oklch(0.30 0.03 220);
            --color-border-accent: oklch(0.48 0.10 210);  /* オーロラの縁 */

            /* Accent colors (Aurora + Arctic Cyan) */
            --color-accent-primary: oklch(0.68 0.14 210); /* 北極のティール */
            --color-accent-hover: oklch(0.73 0.16 205);   /* オーロラグリーン */
            --color-brand: oklch(0.60 0.18 200);          /* 深海ティール */

            /* Semantic colors (Nordic palette) */
            --color-success: oklch(0.72 0.17 160);   /* 北欧の森 */
            --color-warning: oklch(0.80 0.16 75);    /* 真夜中の太陽 */
            --color-error: oklch(0.62 0.20 15);      /* 火山の赤 */
            --color-info: oklch(0.65 0.12 220);      /* 氷河ブルー */

            /* Component tokens */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.1);
            --shadow-md: 0 4px 12px oklch(0 0 0 / 0.15);

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.2s ease;
            --transition-slow: 0.3s ease-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Header ===== */
        .header {
            background: var(--color-bg-elevated);
            padding: 8px 16px;
            border-bottom: 1px solid var(--color-border-default);
            display: flex;
            align-items: center;
            gap: 12px;
            height: 44px;
        }
        .header h1 {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            color: var(--color-brand);
            cursor: pointer;
        }
        .header h1:hover {
            color: var(--color-error);
        }
        .header h1 svg {
            width: 24px;
            height: 24px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status {
            font-size: 12px;
            color: var(--color-text-muted);
        }
        .status.connected {
            color: var(--color-success);
        }
        .status.disconnected {
            color: var(--color-error);
        }
        .project-name {
            font-size: 14px;
            color: var(--color-accent-primary);
            font-weight: 500;
            padding: 4px 10px;
            background: oklch(0.65 0.18 260 / 0.15);
            border-radius: var(--radius-sm);
            display: none;
        }
        .project-name.visible {
            display: inline-block;
        }
        .debug-indicator {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            display: none;
        }
        .debug-indicator.visible {
            display: inline-block;
        }
        .debug-indicator.simple {
            background: var(--color-info);
            color: white;
        }

        /* ===== Main Container ===== */
        .main-container {
            display: flex;
            flex-direction: row;
            height: calc(100vh - 44px);
        }

        /* ===== Terminal Area (左側: ターミナル+IME) ===== */
        .terminal-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #1e1f2e;
        }

        /* ===== Terminal Container ===== */
        #terminal-container {
            flex: 1;
            width: 100%;
            background: #1e1f2e;
            overflow: hidden;
            position: relative;
        }
        #terminal-container canvas {
            display: block;
        }

        /* ===== Side Panel (右側: コンテンツ表示) ===== */
        #side-panel {
            width: 0;
            overflow: hidden;
            background: var(--color-bg-base);
            border-left: 1px solid var(--color-border-default);
            display: flex;
            flex-direction: column;
            transition: width var(--transition-normal);
        }
        #side-panel.open {
            width: 420px;
        }
        .side-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--color-bg-elevated);
            border-bottom: 1px solid var(--color-border-default);
            min-height: 36px;
            flex-shrink: 0;
        }
        .side-panel-header span {
            font-size: 12px;
            font-weight: 500;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .side-panel-close {
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            padding: 2px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--transition-fast), background var(--transition-fast);
        }
        .side-panel-close:hover {
            color: var(--color-text-primary);
            background: var(--color-bg-surface);
        }
        .side-panel-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--color-text-muted);
            font-size: 13px;
        }

        /* ===== Header Toggle Button ===== */
        .header-btn {
            background: none;
            border: 1px solid var(--color-border-subtle);
            color: var(--color-text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast);
        }
        .header-btn:hover {
            color: var(--color-text-primary);
            border-color: var(--color-border-default);
            background: var(--color-bg-surface);
        }
        .header-btn.active {
            color: var(--color-accent-primary);
            border-color: var(--color-accent-primary);
        }

        /* ===== IME入力セクション（DOMフロー下部） ===== */
        section#ime-section {
            height: 0;
            overflow: hidden;
            background: var(--color-bg-elevated);
            border-top: 1px solid var(--color-border-default);
            transition: height 0.1s ease;
        }
        section#ime-section.active {
            height: 32px;
        }
        section#ime-section input {
            width: 100%;
            height: 100%;
            background: transparent;
            color: var(--color-text-primary);
            border: none;
            outline: none;
            padding: 4px 12px;
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
            font-size: 16px;
            caret-color: var(--color-text-primary);
        }

        /* ===== Left Panel - Content/Show ===== */
        .content-pane {
            padding: 16px;
        }
        .content-pane .welcome {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-muted);
        }
        .content-pane .welcome h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--color-text-secondary);
        }
        .pane-content h1, .pane-content h2, .pane-content h3 {
            margin: 1em 0 0.5em;
            color: var(--color-text-primary);
        }
        .pane-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }
        .pane-content code {
            background: var(--color-bg-deep);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
        }
        .pane-content pre {
            background: var(--color-bg-deep);
            padding: 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 1em 0;
        }
        .pane-content pre code {
            background: none;
            padding: 0;
        }
        .pane-content img {
            max-width: 100%;
            border-radius: var(--radius-md);
        }

        /* Typing indicator */
        .typing-indicator {
            color: var(--color-text-muted);
            font-size: 14px;
            padding: 8px 0;
        }
        .typing-indicator::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* ===== Pane Tabs ===== */
        .pane-tabs {
            display: none;
            flex-shrink: 0;
            background: var(--color-bg-elevated);
            border-bottom: 1px solid var(--color-border-default);
            padding: 0 8px;
            gap: 2px;
            overflow-x: auto;
            align-items: stretch;
        }
        .pane-tabs.visible {
            display: flex;
        }
        .pane-tab {
            background: none;
            border: none;
            color: var(--color-text-muted);
            font-size: 12px;
            padding: 6px 12px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: color var(--transition-fast), border-color var(--transition-fast);
        }
        .pane-tab:hover {
            color: var(--color-text-secondary);
        }
        .pane-tab.active {
            color: var(--color-accent-primary);
            border-bottom-color: var(--color-accent-primary);
        }
        .pane-tab .tab-close {
            margin-left: 6px;
            opacity: 0;
            font-size: 10px;
            cursor: pointer;
            transition: opacity var(--transition-fast);
        }
        .pane-tab:hover .tab-close {
            opacity: 0.6;
        }
        .pane-tab .tab-close:hover {
            opacity: 1;
        }

        /* ===== Pane Container ===== */
        .pane-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .pane-container.split-horizontal {
            flex-direction: row;
        }
        .pane-container.split-vertical {
            flex-direction: column;
        }
        .pane-container > .pane-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: none;
        }
        .pane-container > .pane-content.active {
            display: block;
        }
        .pane-container.split-horizontal > .pane-content,
        .pane-container.split-vertical > .pane-content {
            display: block;
        }
        .pane-split-handle {
            flex-shrink: 0;
            background: var(--color-border-default);
            transition: background var(--transition-fast);
        }
        .pane-split-handle:hover {
            background: var(--color-accent-primary);
        }
        .split-horizontal > .pane-split-handle {
            width: 4px;
            cursor: col-resize;
        }
        .split-vertical > .pane-split-handle {
            height: 4px;
            cursor: row-resize;
        }

    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1 id="header-title" title="Vantage Point">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 22H22L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 2L8 10L12 8L16 10L12 2Z" fill="currentColor" opacity="0.3"/>
                    <circle cx="12" cy="6" r="2" fill="currentColor"/>
                </svg>
            </h1>
            <span id="project-name" class="project-name"></span>
            <span id="status" class="status disconnected">Disconnected</span>
        </div>
        <div class="header-right">
            <button id="toggle-panel-btn" class="header-btn" title="Toggle side panel (Ctrl+B)">
                <i class="ti ti-layout-sidebar-right"></i>
            </button>
        </div>
    </div>

    <div class="main-container">
        <!-- 左: ターミナル + IME -->
        <div class="terminal-area">
            <div id="terminal-container"></div>
            <section id="ime-section">
                <input id="ime-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            </section>
        </div>
        <!-- 右: サイドパネル（MCP show/clear/toggle_paneで制御） -->
        <div id="side-panel">
            <div class="side-panel-header">
                <span id="side-panel-title">Content</span>
                <button class="side-panel-close" title="Close panel">
                    <i class="ti ti-x" style="font-size: 16px;"></i>
                </button>
            </div>
            <div class="pane-tabs" id="pane-tabs"></div>
            <div class="pane-container" id="pane-container">
                <div class="pane-content active" id="pane-main" data-pane-id="main">
                    <div class="side-panel-empty">No content</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== WebSocket + Terminal I/O =====
        const WS_URL = `ws://${location.host}/ws`;
        let ws = null;
        let reconnectTimer = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_DELAY = 30000;

        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = async () => {
                console.log('Connected to Stand');
                reconnectAttempts = 0;
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status connected';
                ws.send(JSON.stringify({ type: 'ready' }));

                try {
                    const response = await fetch('/api/health');
                    const health = await response.json();
                    if (health.project_dir) {
                        const projectName = health.project_dir.split('/').pop();
                        const projectNameEl = document.getElementById('project-name');
                        projectNameEl.textContent = projectName;
                        projectNameEl.classList.add('visible');
                        document.title = `${projectName} - Vantage Point`;
                    }
                } catch (e) {
                    console.log('Could not fetch project info:', e);
                }
            };

            ws.onclose = () => {
                document.getElementById('status').className = 'status disconnected';
                reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), MAX_RECONNECT_DELAY);
                document.getElementById('status').textContent = `Reconnecting in ${Math.round(delay/1000)}s...`;
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, delay);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
        }

        // ===== サイドパネル制御 =====
        function toggleSidePanel(forceState) {
            const panel = document.getElementById('side-panel');
            const btn = document.getElementById('toggle-panel-btn');
            if (forceState === true) {
                panel.classList.add('open');
            } else if (forceState === false) {
                panel.classList.remove('open');
            } else {
                panel.classList.toggle('open');
            }
            btn.classList.toggle('active', panel.classList.contains('open'));
        }

        // ===== マルチペイン管理 =====
        const paneState = {
            panes: new Map(),
            activePane: 'main',
            splitMode: null,
        };
        paneState.panes.set('main', { title: 'Main' });

        function createPane(paneId, title) {
            if (paneState.panes.has(paneId)) return;
            paneState.panes.set(paneId, { title: title || paneId });
            const container = document.getElementById('pane-container');
            const paneEl = document.createElement('div');
            paneEl.className = 'pane-content';
            paneEl.id = 'pane-' + paneId;
            paneEl.dataset.paneId = paneId;
            const empty = document.createElement('div');
            empty.className = 'side-panel-empty';
            empty.textContent = 'No content';
            paneEl.appendChild(empty);
            container.appendChild(paneEl);
            updateTabs();
            switchToPane(paneId);
        }

        function removePane(paneId) {
            if (paneId === 'main' && paneState.panes.size <= 1) return;
            if (!paneState.panes.has(paneId)) return;
            if (paneState.splitMode && paneState.splitMode.panes.includes(paneId)) {
                exitSplitMode();
            }
            const el = document.getElementById('pane-' + paneId);
            if (el) el.remove();
            paneState.panes.delete(paneId);
            if (paneState.activePane === paneId) {
                const firstId = paneState.panes.keys().next().value;
                switchToPane(firstId);
            }
            updateTabs();
        }

        function switchToPane(paneId) {
            if (!paneState.panes.has(paneId)) return;
            if (paneState.splitMode) return;
            paneState.activePane = paneId;
            document.querySelectorAll('#pane-container > .pane-content').forEach(el => {
                el.classList.toggle('active', el.dataset.paneId === paneId);
            });
            document.querySelectorAll('.pane-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.paneId === paneId);
            });
            const info = paneState.panes.get(paneId);
            if (info) {
                document.getElementById('side-panel-title').textContent = info.title;
            }
        }

        function updateTabs() {
            const tabsEl = document.getElementById('pane-tabs');
            tabsEl.textContent = '';
            if (paneState.panes.size <= 1) {
                tabsEl.classList.remove('visible');
                return;
            }
            tabsEl.classList.add('visible');
            for (const [id, info] of paneState.panes) {
                const tab = document.createElement('button');
                tab.className = 'pane-tab' + (id === paneState.activePane ? ' active' : '');
                tab.dataset.paneId = id;
                const label = document.createElement('span');
                label.textContent = info.title;
                tab.appendChild(label);
                if (id !== 'main' || paneState.panes.size > 1) {
                    const closeBtn = document.createElement('span');
                    closeBtn.className = 'tab-close';
                    closeBtn.textContent = '\u00d7';
                    closeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        removePane(id);
                    });
                    tab.appendChild(closeBtn);
                }
                tab.addEventListener('click', () => switchToPane(id));
                tabsEl.appendChild(tab);
            }
        }

        function enterSplitMode(direction, paneIds) {
            paneState.splitMode = { direction, panes: paneIds };
            const container = document.getElementById('pane-container');
            container.querySelectorAll('.pane-content').forEach(el => {
                el.classList.remove('active');
                el.style.display = 'none';
            });
            container.className = 'pane-container split-' + direction;
            paneIds.forEach(id => {
                const el = document.getElementById('pane-' + id);
                if (el) el.style.display = 'block';
            });
            const firstPane = document.getElementById('pane-' + paneIds[0]);
            if (firstPane && !container.querySelector('.pane-split-handle')) {
                const handle = document.createElement('div');
                handle.className = 'pane-split-handle';
                firstPane.after(handle);
            }
        }

        function exitSplitMode() {
            paneState.splitMode = null;
            const container = document.getElementById('pane-container');
            container.className = 'pane-container';
            container.querySelectorAll('.pane-split-handle').forEach(h => h.remove());
            container.querySelectorAll('.pane-content').forEach(el => {
                el.style.display = '';
            });
            switchToPane(paneState.activePane);
        }

        function renderContent(paneEl, content, append) {
            if (!append) {
                paneEl.textContent = '';
            }
            const div = document.createElement('div');
            if (content.markdown) {
                div.innerHTML = DOMPurify.sanitize(marked.parse(content.markdown));
            } else if (content.html) {
                div.innerHTML = DOMPurify.sanitize(content.html);
            } else if (content.log) {
                const pre = document.createElement('pre');
                pre.textContent = content.log;
                pre.style.whiteSpace = 'pre-wrap';
                pre.style.wordBreak = 'break-all';
                div.appendChild(pre);
            } else if (content.image_base64) {
                const img = document.createElement('img');
                img.src = `data:${DOMPurify.sanitize(content.image_base64.mime_type)};base64,${content.image_base64.data}`;
                div.appendChild(img);
            }
            paneEl.appendChild(div);
            paneEl.scrollTop = paneEl.scrollHeight;
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'ping':
                    ws.send(JSON.stringify({ type: 'pong' }));
                    break;
                case 'terminal_output':
                    if (window.terminalWriteCallback && msg.data) {
                        try {
                            const binaryStr = atob(msg.data);
                            const bytes = new Uint8Array(binaryStr.length);
                            for (let i = 0; i < binaryStr.length; i++) {
                                bytes[i] = binaryStr.charCodeAt(i);
                            }
                            window.terminalWriteCallback(bytes);
                        } catch (e) {
                            console.error('Terminal output decode error:', e);
                        }
                    }
                    break;
                case 'terminal_ready':
                    console.log('Terminal PTY session ready');
                    break;
                case 'show': {
                    const paneId = msg.pane_id || 'main';
                    if (!paneState.panes.has(paneId)) {
                        createPane(paneId, msg.title);
                    } else if (msg.title) {
                        paneState.panes.get(paneId).title = msg.title;
                        updateTabs();
                    }
                    const paneEl = document.getElementById('pane-' + paneId);
                    if (paneEl) {
                        renderContent(paneEl, msg.content, msg.append || false);
                        toggleSidePanel(true);
                    }
                    break;
                }
                case 'clear': {
                    const paneId = msg.pane_id || 'main';
                    const paneEl = document.getElementById('pane-' + paneId);
                    if (paneEl) {
                        paneEl.textContent = '';
                        const empty = document.createElement('div');
                        empty.className = 'side-panel-empty';
                        empty.textContent = 'No content';
                        paneEl.appendChild(empty);
                    }
                    break;
                }
                case 'split': {
                    const sourcePaneId = msg.pane_id || 'main';
                    const newPaneId = msg.new_pane_id;
                    const direction = msg.direction || 'horizontal';
                    if (!paneState.panes.has(newPaneId)) {
                        createPane(newPaneId, newPaneId);
                    }
                    enterSplitMode(direction, [sourcePaneId, newPaneId]);
                    toggleSidePanel(true);
                    break;
                }
                case 'close': {
                    removePane(msg.pane_id);
                    break;
                }
                case 'toggle_pane': {
                    if (msg.visible === true || msg.visible === false) {
                        toggleSidePanel(msg.visible);
                    } else {
                        toggleSidePanel();
                    }
                    break;
                }
                default:
                    console.debug('WS:', msg.type, msg);
                    break;
            }
        }

        // ターミナルI/O用グローバル関数
        window.sendTerminalResize = function(cols, rows) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'terminal_resize', cols, rows }));
            }
        };

        window.sendTerminalInput = function(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const encoder = new TextEncoder();
                const bytes = encoder.encode(data);
                const base64 = btoa(String.fromCharCode(...bytes));
                ws.send(JSON.stringify({ type: 'terminal_input', data: base64 }));
            }
        };

        window.terminalWriteCallback = null;

        // サイドパネル トグルボタン
        document.getElementById('toggle-panel-btn').addEventListener('click', () => toggleSidePanel());
        document.querySelector('.side-panel-close').addEventListener('click', () => toggleSidePanel(false));
        // キーボードショートカット: Ctrl+B でパネル切り替え
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                toggleSidePanel();
            }
        });

        // 接続開始
        connect();
    </script>

    <!-- ghostty-web ターミナル初期化（ESモジュール） -->
    <script type="module">
        import { init, Terminal, FitAddon } from 'https://cdn.jsdelivr.net/npm/ghostty-web@0.4.0/dist/ghostty-web.js';

        let ghosttyTerm = null;
        let fitAddon = null;

        async function initTerminal() {
            try {
                await init();
                console.log('ghostty-web WASM initialized');

                ghosttyTerm = new Terminal({
                    fontSize: 16,
                    fontFamily: "'FiraCode Nerd Font', 'Fira Code', 'JetBrains Mono', monospace",
                    theme: {
                        background: '#1e1f2e',
                        foreground: '#a9b1d6',
                        cursor: '#c0caf5',
                        selectionBackground: '#33467c',
                    },
                });

                const container = document.getElementById('terminal-container');
                ghosttyTerm.open(container);

                // === IME入力管理 ===
                // WKWebViewではCSS positionでIME位置を変えられないため、
                // DOMフロー上で物理的にターミナル直下に配置したinputを使う
                const imeSection = document.getElementById('ime-section');
                const imeInput = document.getElementById('ime-input');

                // --- IME状態管理（container keydown handler と共有） ---
                // e.isComposing はモード切替時に不整合になるため、明示的に追跡する
                let isComposingExplicit = false;
                // keyCode:229 の遅延送信キュー
                // compositionstart が先に発火すればキャンセルされる
                let deferredKeys = [];
                let deferredTimer = null;

                function flushDeferredKeys() {
                    deferredTimer = null;
                    for (const k of deferredKeys) {
                        window.sendTerminalInput(k);
                    }
                    deferredKeys = [];
                }

                function cancelDeferredKeys() {
                    if (deferredTimer) {
                        clearTimeout(deferredTimer);
                        deferredTimer = null;
                    }
                    deferredKeys = [];
                }

                if (imeInput && imeSection) {
                    // IME組成開始（imeInput上）→ セクションを展開
                    imeInput.addEventListener('compositionstart', () => {
                        isComposingExplicit = true;
                        cancelDeferredKeys();
                        imeSection.classList.add('active');
                    });
                    // ターミナルtextareaでIME組成が始まった場合もIMEセクションに誘導
                    if (ghosttyTerm.textarea) {
                        ghosttyTerm.textarea.addEventListener('compositionstart', () => {
                            isComposingExplicit = true;
                            cancelDeferredKeys();
                            imeSection.classList.add('active');
                            imeInput.focus();
                        });
                    }
                    // IME組成確定 → テキストをターミナルに送信してクリア
                    imeInput.addEventListener('compositionend', (e) => {
                        isComposingExplicit = false;
                        if (e.data) {
                            window.sendTerminalInput(e.data);
                        }
                        imeInput.value = '';
                        imeSection.classList.remove('active');
                        if (ghosttyTerm.textarea) {
                            ghosttyTerm.textarea.focus();
                        }
                    });
                    // ターミナルにフォーカスを戻すヘルパー
                    const returnToTerminal = () => {
                        isComposingExplicit = false;
                        imeInput.value = '';
                        imeSection.classList.remove('active');
                        if (ghosttyTerm.textarea) {
                            ghosttyTerm.textarea.focus();
                        }
                    };
                    // 非IMEのキー入力 → ターミナルに送信してフォーカスを戻す
                    imeInput.addEventListener('keydown', (e) => {
                        // 明示的な組成状態 OR ブラウザ報告の組成中 → IMEに委ねる
                        if (isComposingExplicit || e.isComposing) return;
                        e.preventDefault();
                        if (e.key === 'Escape') {
                            returnToTerminal();
                            return;
                        }
                        if (e.key === 'Enter') {
                            window.sendTerminalInput('\r');
                        } else if (e.key === 'Backspace') {
                            window.sendTerminalInput('\x7f');
                        } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
                            window.sendTerminalInput(e.key);
                        }
                        returnToTerminal();
                    });
                }

                // FitAddon でコンテナに合わせてリサイズ
                fitAddon = new FitAddon();
                ghosttyTerm.loadAddon(fitAddon);

                // デバッグ用にグローバル公開
                window._ghosttyTerm = ghosttyTerm;
                window._fitAddon = fitAddon;

                // 初回フィット
                requestAnimationFrame(() => {
                    fitAddon.fit();
                    const dims = fitAddon.proposeDimensions();
                    if (dims) {
                        window.sendTerminalResize(dims.cols, dims.rows);
                    }
                });

                // キー入力 → WebSocket送信
                ghosttyTerm.onData((data) => {
                    window.sendTerminalInput(data);
                });

                // WKWebView キー入力ワークアラウンド (capturing phase):
                // 1. Tab/Shift+Tab: WKWebViewがフォーカスナビゲーション用に横取りする問題
                // 2. IME入力検出: keyCode:229で遅延判定 → 組成開始 or 直接送信
                container.addEventListener('keydown', (e) => {
                    // Tab / Shift+Tab → WKWebViewのフォーカス移動を阻止してPTYに送信
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        e.stopPropagation();
                        if (e.shiftKey) {
                            window.sendTerminalInput('\x1b[Z');
                        } else {
                            window.sendTerminalInput('\t');
                        }
                        return;
                    }
                    // macOS日本語IME: keyCode:229は英字モードでも発火する
                    // ghostty-webはkeyCode:229をIMEイベントとして無視するため、ここで処理する
                    if (e.keyCode === 229 && imeInput) {
                        // 組成中 → IMEセクションにリダイレクト
                        if (e.isComposing || isComposingExplicit) {
                            cancelDeferredKeys();
                            imeSection.classList.add('active');
                            imeInput.focus();
                            return;
                        }
                        // keyCode:229だが未組成
                        // 即送信ではなく遅延キューに入れる（20ms）
                        // この間に compositionstart が発火すればキューはキャンセルされ、
                        // 文字は組成に含まれる（＝最初の1文字問題を解決）
                        // 発火しなければ英字モード等 → PTYに直接送信
                        let keyToSend = null;
                        if (e.key === 'Enter') keyToSend = '\r';
                        else if (e.key === 'Backspace') keyToSend = '\x7f';
                        else if (e.key && e.key.length === 1 && !e.ctrlKey && !e.metaKey) keyToSend = e.key;

                        if (keyToSend) {
                            deferredKeys.push(keyToSend);
                            if (deferredTimer) clearTimeout(deferredTimer);
                            deferredTimer = setTimeout(flushDeferredKeys, 20);
                        }
                        return;
                    }
                }, true);

                // PTY出力受信コールバックを登録
                window.terminalWriteCallback = (bytes) => {
                    if (ghosttyTerm) {
                        ghosttyTerm.write(bytes);
                    }
                };

                // ResizeObserver でパネルリサイズ追従
                const resizeObserver = new ResizeObserver(() => {
                    if (fitAddon && ghosttyTerm) {
                        fitAddon.fit();
                        const dims = fitAddon.proposeDimensions();
                        if (dims) {
                            window.sendTerminalResize(dims.cols, dims.rows);
                        }
                    }
                });
                resizeObserver.observe(container);

                console.log('Terminal initialized successfully');
            } catch (e) {
                console.error('Failed to initialize ghostty-web terminal:', e);
                // フォールバック: コンテナにエラーメッセージ表示
                const container = document.getElementById('terminal-container');
                container.innerHTML = `<div style="padding: 20px; color: var(--color-text-muted);">
                    <p>Terminal initialization failed</p>
                    <p style="font-size: 12px; margin-top: 8px;">${e.message || e}</p>
                </div>`;
            }
        }

        // ターミナル初期化開始
        initTerminal();
    </script>
</body>
