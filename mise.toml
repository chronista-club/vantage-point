# Vantage Point - mise設定

[env]
_.file = ".env"

[tools]
bun = "latest"
node = "22"

[tasks.agent]
description = "Start Vantage Agent TUI (TypeScript + Claude SDK)"
run = "bun run packages/agent/src/tui.ts ."

[tasks."agent:cli"]
description = "Start Vantage Agent CLI (simple mode)"
run = "bun run packages/agent/src/cli.ts"

[tasks."agent:server"]
description = "Start Vantage Agent stdio server (for Rust TUI)"
run = "bun run packages/agent/src/server.ts"

[tasks.tui]
description = "Start Vantage TUI (Rust/Ratatui)"
run = "cargo run -p vantage-tui"

[tasks.build]
description = "Build Rust crates"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.mac]
description = "Build & run macOS native app (VantagePoint.app)"
run = """
echo "🔨 Building vp-bridge (staticlib)..."
cargo build --release -p vp-bridge
echo "🔨 Building VantagePoint (Swift)..."
cd apple/VantagePoint && swift build -c release
echo "🚀 Launching VantagePoint..."
exec .build/release/VantagePoint
"""

[tasks."mac:build"]
description = "Build macOS native app without launching"
run = """
cargo build --release -p vp-bridge
cd apple/VantagePoint && swift build -c release
echo "✅ Built: apple/VantagePoint/.build/release/VantagePoint"
"""
