name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build (aarch64-apple-darwin)
        run: cargo build --release --target aarch64-apple-darwin -p vantage-point

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/vp release/vp-aarch64-apple-darwin
          ls -la release/

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" release/* \
            --title "$TAG" \
            --generate-notes \
            --latest
